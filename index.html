<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #08111d;
      --panel: rgba(12, 28, 46, 0.75);
      --panel-border: rgba(116, 175, 255, 0.35);
      --accent: #31ffe6;
      --accent-2: #ffb347;
      --danger: #ff5d7d;
      --text: #e8f1ff;
      --muted: #9cb0cc;
      --good: #81f495;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Space Grotesk", system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 20%, #163153 0%, transparent 48%),
        radial-gradient(circle at 85% 20%, #2d1945 0%, transparent 42%),
        linear-gradient(140deg, #050b13, #081425 52%, #0f1424);
      display: flex;
      justify-content: center;
      padding: 16px;
    }

    .page {
      width: min(1120px, 100%);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .page-head {
      padding: 2px 2px 0;
    }

    .shell {
      width: min(1120px, 100%);
      display: grid;
      grid-template-columns: 1fr 290px;
      gap: 14px;
    }

    .game-wrap {
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.45), inset 0 0 24px rgba(49, 255, 230, 0.08);
      background: linear-gradient(160deg, rgba(11, 25, 43, 0.8), rgba(13, 29, 48, 0.95));
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 10px;
    }

    canvas {
      width: 100%;
      height: auto;
      display: block;
      aspect-ratio: 16 / 9;
      background: linear-gradient(160deg, #0f243a, #101e2f 40%, #102237);
      border-radius: 12px;
    }

    .hud {
      display: flex;
      gap: 8px;
      flex-wrap: nowrap;
      align-items: center;
    }

    .chip {
      background: rgba(8, 20, 34, 0.8);
      border: 1px solid rgba(133, 180, 244, 0.35);
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      color: var(--muted);
    }

    .chip strong { color: var(--text); margin-left: 4px; }
    #gold { color: #ffd85a; }
    #health { color: #ff6a78; }

    .status-chip {
      margin-left: auto;
      text-align: right;
      max-width: 46%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #cde1ff;
      font-size: 12px;
      transition: opacity 260ms ease;
    }

    .pause-chip {
      border-radius: 999px;
      min-width: 38px;
      padding: 6px 10px;
      text-align: center;
      font-size: 16px;
      line-height: 1;
    }

    .panel {
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      background: var(--panel);
      backdrop-filter: blur(4px);
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    h1 {
      margin: 0;
      font-family: "Bungee", sans-serif;
      font-size: 22px;
      letter-spacing: 0.04em;
      color: var(--accent);
      text-shadow: 0 0 16px rgba(49, 255, 230, 0.32);
    }

    .sub {
      margin: 0;
      font-size: 13px;
      color: var(--muted);
    }

    .group-title {
      margin: 2px 0;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
    }

    .tower-grid {
      display: grid;
      gap: 8px;
    }

    .tower-option {
      display: flex;
      align-items: center;
      gap: 10px;
      text-align: left;
    }

    .tower-option.inactive {
      opacity: 0.45;
      cursor: not-allowed;
      border-color: rgba(149, 194, 255, 0.2);
    }

    .tower-option.inactive:hover {
      transform: none;
      border-color: rgba(149, 194, 255, 0.2);
      box-shadow: none;
    }

    .tower-art {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.28);
      flex: 0 0 28px;
    }

    .tower-art.dart { background: radial-gradient(circle at 35% 35%, #d3d9e1, #7c8794); }
    .tower-art.cannon { background: radial-gradient(circle at 40% 30%, #ffe2a3, #de7b1f); }
    .tower-art.frost { background: radial-gradient(circle at 35% 35%, #dce3ff, #7c8be8); }
    .tower-art.rail { background: radial-gradient(circle at 35% 35%, #ffc0c0, #d64f5d); }
    .tower-art.venom { background: radial-gradient(circle at 35% 35%, #c8ffd2, #35b151); }
    .tower-art.ember { background: radial-gradient(circle at 35% 35%, #ffd8a1, #de5f2e); }
    .tower-art.storm { background: radial-gradient(circle at 35% 35%, #d8f8ff, #4aa4dc); }
    .tower-art.mortar { background: radial-gradient(circle at 35% 35%, #f4efdd, #8e7d5e); }
    .tower-art.ion { background: radial-gradient(circle at 35% 35%, #dbfff2, #31ba9e); }
    .tower-art.scatter { background: radial-gradient(circle at 35% 35%, #ffe5f2, #d273b4); }

    .tower-copy {
      display: flex;
      flex-direction: column;
      gap: 1px;
      line-height: 1.25;
    }

    .tower-copy strong {
      font-size: 13px;
      color: var(--text);
    }

    .tower-copy span {
      font-size: 11px;
      color: var(--muted);
    }

    button {
      border: 1px solid rgba(149, 194, 255, 0.45);
      background: linear-gradient(180deg, rgba(17, 41, 68, 0.9), rgba(10, 27, 45, 0.9));
      border-radius: 11px;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      padding: 10px;
      cursor: pointer;
      text-align: left;
      transition: transform 0.18s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover:enabled {
      transform: translateY(-1px);
      border-color: var(--accent);
      box-shadow: 0 6px 14px rgba(49, 255, 230, 0.15);
    }

    button.active {
      border-color: var(--accent-2);
      box-shadow: inset 0 0 0 1px rgba(255, 179, 71, 0.55);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .actions {
      grid-template-columns: repeat(4, 1fr);
    }

    .icon-btn {
      text-align: center;
      font-size: 18px;
      padding: 9px 0;
      font-weight: 700;
    }

    .primary {
      text-align: center;
      background: linear-gradient(180deg, #1f5f94, #194673);
      border-color: rgba(125, 203, 255, 0.6);
      font-weight: 700;
    }

    .warn {
      background: linear-gradient(180deg, #653253, #49253b);
      border-color: rgba(255, 143, 181, 0.6);
    }

    .upgrade-btn {
      background: linear-gradient(180deg, #9a5a1d, #6f3f12);
      border-color: rgba(255, 185, 112, 0.7);
    }

    .sell-btn {
      background: linear-gradient(180deg, #a68f1f, #796713);
      border-color: rgba(255, 234, 129, 0.7);
    }

    .tip {
      margin-top: 2px;
      border-top: 1px dashed rgba(148, 193, 255, 0.35);
      padding-top: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.42;
    }

    .stats-card {
      border: 1px solid rgba(149, 194, 255, 0.3);
      background: rgba(9, 21, 35, 0.62);
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 11px;
      line-height: 1.28;
      color: #c9dbf5;
      min-height: 45px;
    }

    .upgrade-preview {
      color: #ffb765;
    }

    .under-canvas {
      margin-top: 8px;
      display: grid;
      grid-template-columns: 1fr 330px;
      gap: 8px;
      align-items: start;
    }

    .canvas-actions {
      margin-top: 0;
      min-height: 45px;
    }

    .pulse {
      animation: pulse 1.7s infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 rgba(255, 179, 71, 0); }
      50% { box-shadow: 0 0 22px rgba(255, 179, 71, 0.4); }
    }

    @media (max-width: 960px) {
      .shell { grid-template-columns: 1fr; }
      .panel { order: -1; }
      .hud { flex-wrap: wrap; }
      .status-chip { max-width: 100%; margin-left: 0; text-align: left; }
      .under-canvas { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="page">
  <header class="page-head">
    <h1>TD</h1>
    <p class="sub">Build towers. Stop the swarm. Don’t let the core crack.</p>
  </header>
  <main class="shell">
    <section class="game-wrap">
      <div class="hud">
        <div class="chip">Gold <strong id="gold">120</strong></div>
        <div class="chip">Core HP <strong id="health">20</strong></div>
        <div class="chip">Wave <strong id="wave">0</strong></div>
        <div class="chip">Score <strong id="score">0</strong></div>
        <div id="statusText" class="chip status-chip"></div>
        <button id="pause" class="pause-chip" title="Pause (P)">⏸</button>
      </div>
      <canvas id="game" width="960" height="560"></canvas>
      <div class="under-canvas">
        <div id="selectionStats" class="stats-card"></div>
        <div class="canvas-actions">
          <div class="button-row actions">
            <button id="startWave" class="primary icon-btn" title="Call Wave (Space)">▶</button>
            <button id="meteor" class="warn icon-btn" title="Meteor (M)">☄</button>
            <button id="upgrade" class="icon-btn upgrade-btn" title="Upgrade Selected (U)">⇧</button>
            <button id="sell" class="icon-btn sell-btn" title="Sell Selected">$</button>
          </div>
        </div>
      </div>
    </section>

    <aside class="panel">
      <p class="group-title">Build Towers</p>
      <div class="tower-grid">
        <button data-build="dart" class="tower-option"><span class="tower-art dart"></span><span class="tower-copy"><strong>Dart Node ($50)</strong><span>rapid single-target</span></span></button>
        <button data-build="scatter" class="tower-option"><span class="tower-art scatter"></span><span class="tower-copy"><strong>Scatter Bloom ($220)</strong><span>shoots multiple projectiles at once</span></span></button>
        <button data-build="cannon" class="tower-option"><span class="tower-art cannon"></span><span class="tower-copy"><strong>Pulse Cannon ($350)</strong><span>splash blast</span></span></button>
        <button data-build="frost" class="tower-option"><span class="tower-art frost"></span><span class="tower-copy"><strong>Cryo Prism ($400)</strong><span>slows enemies</span></span></button>
        <button data-build="storm" class="tower-option"><span class="tower-art storm"></span><span class="tower-copy"><strong>Storm Arc ($500)</strong><span>long-range with light chain arcs</span></span></button>
        <button data-build="venom" class="tower-option"><span class="tower-art venom"></span><span class="tower-copy"><strong>Venom Spire ($420)</strong><span>poison over time</span></span></button>
        <button data-build="ion" class="tower-option"><span class="tower-art ion"></span><span class="tower-copy"><strong>Ion Lattice ($460)</strong><span>marked damage amplifier</span></span></button>
        <button data-build="ember" class="tower-option"><span class="tower-art ember"></span><span class="tower-copy"><strong>Ember Forge ($520)</strong><span>slow molten shots + burning field</span></span></button>
        <button data-build="rail" class="tower-option"><span class="tower-art rail"></span><span class="tower-copy"><strong>Rail Lance ($560)</strong><span>burst shots pierce through enemies</span></span></button>
        <button data-build="mortar" class="tower-option"><span class="tower-art mortar"></span><span class="tower-copy"><strong>Siege Mortar ($650)</strong><span>huge long-range area blast</span></span></button>
      </div>

      <p class="tip">
        Build on highlighted pads only. Select a tower and press ⇧ to upgrade. Waves auto-start on a timer, but ▶ can call early.
      </p>
    </aside>
  </main>
  </div>
  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const hud = {
      gold: document.getElementById("gold"),
      health: document.getElementById("health"),
      wave: document.getElementById("wave"),
      score: document.getElementById("score")
    };

    const towerButtons = Array.from(document.querySelectorAll("[data-build]"));
    const towerHotkeys = [
      ["1", "q"], ["2", "w"], ["3", "e"], ["4", "r"], ["5", "a"],
      ["6", "s"], ["7", "d"], ["8", "f"], ["9", "z"], ["0", "x"]
    ];
    const startWaveBtn = document.getElementById("startWave");
    const pauseBtn = document.getElementById("pause");
    const meteorBtn = document.getElementById("meteor");
    const upgradeBtn = document.getElementById("upgrade");
    const sellBtn = document.getElementById("sell");
    const selectionStats = document.getElementById("selectionStats");
    const statusText = document.getElementById("statusText");
    let lastStatusMessage = "";

    const W = canvas.width;
    const H = canvas.height;
    const grid = 48;
    const PAD_HALF = 22;
    const METEOR_CD_MS = 120000;
    const WAVE_INTERVAL_S = 35;
    const METEOR_RADIUS = 56;
    const METEOR_DAMAGE = 180;
    const METEOR_WAVE_BONUS = 24;

    const path = [
      { x: -48, y: 432 },
      { x: 96, y: 432 },
      { x: 96, y: 336 },
      { x: 240, y: 336 },
      { x: 240, y: 480 },
      { x: 432, y: 480 },
      { x: 432, y: 288 },
      { x: 336, y: 288 },
      { x: 336, y: 144 },
      { x: 528, y: 144 },
      { x: 528, y: 240 },
      { x: 672, y: 240 },
      { x: 672, y: 96 },
      { x: 816, y: 96 },
      { x: 816, y: 192 },
      { x: 912, y: 192 },
      { x: 912, y: 96 },
      { x: 1008, y: 96 }
    ];

    const towerTypes = {
      dart: {
        name: "Dart Node",
        cost: 50,
        range: 134,
        fireRate: 0.22,
        damage: 24,
        color: "#aab6c4",
        projectileSpeed: 620
      },
      cannon: {
        name: "Pulse Cannon",
        cost: 350,
        range: 160,
        fireRate: 1.12,
        damage: 196,
        splash: 38,
        color: "#ffb347",
        projectileSpeed: 560
      },
      frost: {
        name: "Cryo Prism",
        cost: 400,
        range: 156,
        fireRate: 0.76,
        damage: 18,
        slow: 0.85,
        slowTime: 1.0,
        color: "#a6b9ff",
        projectileSpeed: 520
      },
      rail: {
        name: "Rail Lance",
        cost: 3200,
        range: 300,
        fireRate: 0.58,
        damage: 1120,
        burstCycle: 5,
        burstPierce: 3,
        color: "#ff7e7e",
        projectileSpeed: 1100
      },
      venom: {
        name: "Venom Spire",
        cost: 800,
        range: 196,
        fireRate: 0.3,
        damage: 75,
        poisonDps: 190,
        poisonTime: 4.2,
        color: "#87ff94",
        projectileSpeed: 760
      },
      ember: {
        name: "Ember Forge",
        cost: 2200,
        range: 196,
        fireRate: 1.28,
        damage: 132,
        armorShred: 0.02,
        burningCycle: 3,
        burningDps: 250,
        burningTime: 3.6,
        burningRadius: 62,
        dotLabel: "Burning",
        color: "#ff8f50",
        projectileSpeed: 395
      },
      storm: {
        name: "Storm Arc",
        cost: 500,
        range: 202,
        fireRate: 0.72,
        damage: 250,
        chainTargets: 2,
        chainRange: 108,
        chainDamageFalloff: 0.75,
        color: "#7dd9ff",
        projectileSpeed: 760
      },
      mortar: {
        name: "Siege Mortar",
        cost: 6000,
        range: 286,
        fireRate: 1.95,
        damage: 990,
        splash: 108,
        color: "#dbc8a5",
        projectileSpeed: 580
      },
      ion: {
        name: "Ion Lattice",
        cost: 1000,
        range: 216,
        fireRate: 0.62,
        damage: 142,
        ionMarkAmp: 1.36,
        ionMarkTime: 2.8,
        color: "#72ffd0",
        projectileSpeed: 760
      },
      scatter: {
        name: "Scatter Bloom",
        cost: 220,
        range: 145,
        fireRate: 0.12,
        damage: 16,
        pellets: 3,
        spread: 0.18,
        color: "#ff9ad8",
        projectileSpeed: 680
      }
    };

    function syncTowerGridFromTypes() {
      towerButtons.forEach((btn) => {
        const type = btn.dataset.build;
        const t = towerTypes[type];
        if (!t) return;
        const title = btn.querySelector("strong");
        if (title) title.textContent = `${t.name} ($${t.cost})`;
        const i = towerButtons.indexOf(btn);
        const keys = towerHotkeys[i] || [];
        btn.title = keys.length ? `${t.name} [${keys.join("/")}]` : t.name;
      });
    }

    let state = null;
    let isLoopRunning = false;

    function resetGame() {
      state = {
        gold: 120,
        health: 20,
        wave: 0,
        score: 0,
        selectedBuild: null,
        selectedTower: null,
        selectedEnemy: null,
        hoverBuild: null,
        statsMode: "unit",
        towers: [],
        enemies: [],
        projectiles: [],
        particles: [],
        hazards: [],
        meteorEffects: [],
        waveInProgress: false,
        toSpawn: 0,
        spawnTimer: 0,
        nextWaveTimer: WAVE_INTERVAL_S,
        waveReadyGlow: false,
        clearedWave: 0,
        meteorReadyAt: 0,
        aimingMeteor: false,
        paused: false,
        messageAt: Date.now(),
        gameOver: false,
        message: "Set up quickly. First wave auto-starts in 35s."
      };
      updateHUD();
      updateButtons();
    }

    function updateHUD() {
      hud.gold.textContent = Math.floor(state.gold);
      hud.health.textContent = state.health;
      hud.wave.textContent = state.wave;
      hud.score.textContent = state.score;
    }

    function updateButtons() {
      towerButtons.forEach((btn) => {
        const type = btn.dataset.build;
        btn.classList.toggle("active", state.selectedBuild === type);
        btn.disabled = state.paused || (!state.gameOver && state.gold < towerTypes[type].cost);
        btn.classList.toggle("inactive", state.gameOver);
      });
      sellBtn.disabled = state.paused || !state.selectedTower || state.gameOver;
      const upgradeCostNow = state.selectedTower ? getUpgradeCost(state.selectedTower) : Infinity;
      upgradeBtn.disabled = state.paused || !state.selectedTower || state.gameOver || state.gold < upgradeCostNow;
      startWaveBtn.disabled = state.paused || state.waveInProgress || state.gameOver;
      const secs = Math.max(0, Math.ceil(state.nextWaveTimer));
      startWaveBtn.textContent = `▶${secs}s`;
      startWaveBtn.title = state.waveInProgress
        ? `Next wave in ${secs}s (Space/N)`
        : `Call Wave (${secs}s) (Space/N)`;
      startWaveBtn.classList.toggle("pulse", state.waveReadyGlow && !state.gameOver);
      pauseBtn.disabled = false;
      pauseBtn.textContent = state.gameOver ? "↻" : (state.paused ? "▶" : "⏸");
      pauseBtn.title = state.gameOver ? "Restart (P)" : (state.paused ? "Resume (P)" : "Pause (P)");
      const meteorOnCooldown = Date.now() < state.meteorReadyAt;
      meteorBtn.disabled = state.paused || state.gameOver || (meteorOnCooldown && !state.aimingMeteor);
      if (state.aimingMeteor) {
        meteorBtn.textContent = "✕";
      } else if (meteorOnCooldown) {
        meteorBtn.textContent = `☄${Math.ceil((state.meteorReadyAt - Date.now()) / 1000)}s`;
      } else {
        meteorBtn.textContent = "☄";
      }
      const meteorDamageNow = METEOR_DAMAGE + state.wave * METEOR_WAVE_BONUS;
      meteorBtn.title = state.aimingMeteor
        ? "Cancel Meteor (Esc/M)"
        : `Meteor (M) DMG ${meteorDamageNow} R${METEOR_RADIUS} CD ${METEOR_CD_MS / 1000}s`;
      meteorBtn.classList.toggle("pulse", !state.gameOver && state.waveInProgress && Date.now() >= state.meteorReadyAt && !state.aimingMeteor);
      if (state.selectedTower) {
        const c = getUpgradeCost(state.selectedTower);
        upgradeBtn.title = `Upgrade (U) Lv.${state.selectedTower.level} ($${c})`;
        upgradeBtn.textContent = `⇧${c}`;
        const invested = state.selectedTower.totalInvested || state.selectedTower.cost;
        sellBtn.textContent = `$${Math.floor(invested * 0.6)}`;
        sellBtn.title = "Sell Selected (V)";
      } else {
        upgradeBtn.title = "Upgrade Selected (U)";
        upgradeBtn.textContent = "⇧";
        sellBtn.textContent = "$";
        sellBtn.title = "Sell Selected (V)";
      }
      const msg = state.message || "";
      if (msg !== lastStatusMessage) {
        lastStatusMessage = msg;
        state.messageAt = Date.now();
      }
      const age = (Date.now() - (state.messageAt || Date.now())) / 1000;
      const opacity = msg ? (age < 1.8 ? 1 : Math.max(0, 1 - (age - 1.8) / 0.8)) : 0;
      statusText.textContent = msg;
      statusText.style.opacity = `${opacity}`;
      updateSelectionStats();
    }

    function getProjectedUpgrade(t) {
      const earlyBoost = t.level < 5 ? (1.18 - t.level * 0.03) : 1;
      const nextFireRate = Math.max(0.12, t.fireRate * (0.91 - (earlyBoost - 1) * 0.12));
      const nextDamage = Math.round(t.damage * (1.2 + (earlyBoost - 1) * 0.65) + 6 + t.level * 1.5);
      const nextPellets = t.pellets
        ? (t.type === "scatter" && (t.level + 1) % 5 === 0 ? t.pellets + 1 : t.pellets)
        : 0;
      const nextBurstPierce = t.burstPierce
        ? (t.type === "rail" && (t.level + 1) % 5 === 0 ? t.burstPierce + 1 : t.burstPierce)
        : 0;
      return {
        level: t.level + 1,
        damage: nextDamage,
        range: Math.round(t.range + 2 + (earlyBoost - 1) * 8),
        rate: (1 / nextFireRate).toFixed(2),
        dps: (nextDamage / nextFireRate).toFixed(1),
        splash: t.splash ? Math.round(t.splash) : 0,
        slow: t.slow ? Math.max(0.35, t.slow - 0.04) : 0,
        poison: t.poisonDps ? Math.round(t.poisonDps * 1.3) : 0,
        burning: t.burningDps ? Math.round(t.burningDps * 1.3) : 0,
        chain: t.chainTargets || 0,
        markAmp: t.ionMarkAmp ? `${Math.round((t.ionMarkAmp + 0.02) * 100)}%` : "",
        burstPierce: nextBurstPierce,
        pellets: nextPellets
      };
    }

    function updateSelectionStats() {
      if (state.selectedEnemy && !state.enemies.includes(state.selectedEnemy)) {
        state.selectedEnemy = null;
      }

      if (state.statsMode === "meteor") {
        const cd = Math.max(0, Math.ceil((state.meteorReadyAt - Date.now()) / 1000));
        const meteorDamageNow = METEOR_DAMAGE + state.wave * METEOR_WAVE_BONUS;
        selectionStats.innerHTML =
          `METEOR | DMG ${meteorDamageNow} | Radius ${METEOR_RADIUS}<br><span class=\"upgrade-preview\">Cooldown ${cd}s</span>`;
        return;
      }

      if (state.selectedTower) {
        const t = state.selectedTower;
        const shotsPerSec = (1 / t.fireRate).toFixed(2);
        const dps = (t.damage / t.fireRate).toFixed(1);
        let extra = "";
        if (t.splash) extra += ` | Splash ${Math.round(t.splash)}`;
        if (t.slow) extra += ` | Slow ${(100 - t.slow * 100).toFixed(0)}%`;
        if (t.poisonDps) extra += ` | ${t.dotLabel || "Poison"} ${Math.round(t.poisonDps)}/s`;
        if (t.burningDps) extra += ` | Burning ${Math.round(t.burningDps)}/s`;
        if (t.pellets) extra += ` | Projectiles ${t.pellets}`;
        if (t.chainTargets) extra += ` | Chain x${t.chainTargets}`;
        if (t.ionMarkAmp) extra += ` | Mark +${Math.round((t.ionMarkAmp - 1) * 100)}%`;
        if (t.burstPierce) extra += ` | Burst Pierce ${t.burstPierce}`;
        const next = getProjectedUpgrade(t);
        let nextExtra = "";
        if (next.splash) nextExtra += ` | Splash ${next.splash}`;
        if (next.slow) nextExtra += ` | Slow ${(100 - next.slow * 100).toFixed(0)}%`;
        if (next.poison) nextExtra += ` | ${t.dotLabel || "Poison"} ${next.poison}/s`;
        if (next.burning) nextExtra += ` | Burning ${next.burning}/s`;
        if (next.pellets) nextExtra += ` | Projectiles ${next.pellets}`;
        if (next.chain) nextExtra += ` | Chain x${next.chain}`;
        if (next.markAmp) nextExtra += ` | Mark +${Math.round(Number.parseInt(next.markAmp, 10) - 100)}%`;
        if (next.burstPierce) nextExtra += ` | Burst Pierce ${next.burstPierce}`;
        selectionStats.innerHTML =
          `${t.name} Lv.${t.level} | DMG ${Math.round(t.damage)} | DPS ${dps} | Range ${Math.round(t.range)} | Rate ${shotsPerSec}/s${extra}<br><span class=\"upgrade-preview\">Next Lv.${next.level} | DMG ${next.damage} | DPS ${next.dps} | Range ${next.range} | Rate ${next.rate}/s${nextExtra}</span>`;
        return;
      }

      const hoverBuild = state.hoverBuild || state.selectedBuild;
      if (hoverBuild && towerTypes[hoverBuild]) {
        const t = towerTypes[hoverBuild];
        const preview = { ...t, level: 1 };
        const next = getProjectedUpgrade(preview);
        const shotsPerSec = (1 / t.fireRate).toFixed(2);
        const dps = (t.damage / t.fireRate).toFixed(1);
        let extra = "";
        if (t.splash) extra += ` | Splash ${Math.round(t.splash)}`;
        if (t.slow) extra += ` | Slow ${(100 - t.slow * 100).toFixed(0)}%`;
        if (t.poisonDps) extra += ` | ${t.dotLabel || "Poison"} ${Math.round(t.poisonDps)}/s`;
        if (t.burningDps) extra += ` | Burning ${Math.round(t.burningDps)}/s`;
        if (t.pellets) extra += ` | Projectiles ${t.pellets}`;
        if (t.chainTargets) extra += ` | Chain x${t.chainTargets}`;
        if (t.ionMarkAmp) extra += ` | Mark +${Math.round((t.ionMarkAmp - 1) * 100)}%`;
        if (t.burstPierce) extra += ` | Burst Pierce ${t.burstPierce}`;
        let nextExtra = "";
        if (next.splash) nextExtra += ` | Splash ${next.splash}`;
        if (next.slow) nextExtra += ` | Slow ${(100 - next.slow * 100).toFixed(0)}%`;
        if (next.poison) nextExtra += ` | ${t.dotLabel || "Poison"} ${next.poison}/s`;
        if (next.burning) nextExtra += ` | Burning ${next.burning}/s`;
        if (next.pellets) nextExtra += ` | Projectiles ${next.pellets}`;
        if (next.chain) nextExtra += ` | Chain x${next.chain}`;
        if (next.markAmp) nextExtra += ` | Mark +${Math.round(Number.parseInt(next.markAmp, 10) - 100)}%`;
        if (next.burstPierce) nextExtra += ` | Burst Pierce ${next.burstPierce}`;
        selectionStats.innerHTML =
          `${t.name} ($${t.cost}) | DMG ${Math.round(t.damage)} | DPS ${dps} | Range ${Math.round(t.range)} | Rate ${shotsPerSec}/s${extra}<br><span class=\"upgrade-preview\">Next Lv.${next.level} | DMG ${next.damage} | DPS ${next.dps} | Range ${next.range} | Rate ${next.rate}/s${nextExtra}</span>`;
        return;
      }

      if (state.selectedEnemy) {
        const e = state.selectedEnemy;
        let extra = "";
        if (e.armor) extra += ` | Armor ${Math.round(e.armor * 100)}%`;
        if (e.coreDamage && e.coreDamage > 1) extra += ` | Core DMG ${e.coreDamage}`;
        selectionStats.textContent =
          `${e.kind.toUpperCase()} | HP ${Math.max(0, Math.round(e.hp))}/${e.maxHp} | SPD ${Math.round(e.speed)} | Bounty ${e.reward}${extra}`;
        return;
      }

      selectionStats.textContent = "";
    }

    function newEnemy(kind, wave) {
      const hpScale = (1.78 + wave * 0.48) * (1 + wave * 0.022);
      const speedScale = 1 + wave * 0.022;
      const rewardScale = 1 + wave * 0.03;
      const base = {
        p: 0,
        seg: 0,
        x: path[0].x,
        y: path[0].y,
        slowFactor: 1,
        slowTimer: 0,
        poisonDps: 0,
        poisonTimer: 0,
        burningDps: 0,
        burningTimer: 0,
        damageAmp: 1,
        damageAmpTimer: 0,
        damageAmpColor: "#f58cff"
      };
      if (kind === "swarm") {
        const maxHp = Math.round(42 * hpScale);
        return { ...base, kind, hp: maxHp, maxHp, speed: 132 * speedScale, reward: Math.round(5 * rewardScale), color: "#fff37a", r: 8 };
      }
      if (kind === "fast") {
        const maxHp = Math.round(72 * hpScale);
        return { ...base, kind, hp: maxHp, maxHp, speed: 104 * speedScale, reward: Math.round(7 * rewardScale), color: "#f4d35e", r: 10 };
      }
      if (kind === "armored") {
        const maxHp = Math.round(225 * hpScale);
        return { ...base, kind, hp: maxHp, maxHp, speed: 52 * speedScale, reward: Math.round(16 * rewardScale), color: "#9bb5c9", r: 14, armor: 0.28 };
      }
      if (kind === "striker") {
        const maxHp = Math.round(102 * hpScale);
        return { ...base, kind, hp: maxHp, maxHp, speed: 122 * speedScale, reward: Math.round(10 * rewardScale), color: "#ffb778", r: 11 };
      }
      if (kind === "bulwark") {
        const maxHp = Math.round(305 * hpScale);
        return { ...base, kind, hp: maxHp, maxHp, speed: 45 * speedScale, reward: Math.round(20 * rewardScale), color: "#8aa0b8", r: 16, armor: 0.4 };
      }
      if (kind === "tank") {
        const maxHp = Math.round(175 * hpScale);
        return { ...base, kind, hp: maxHp, maxHp, speed: 56 * speedScale, reward: Math.round(13 * rewardScale), color: "#f16f8a", r: 15, armor: 0.12 };
      }
      if (kind === "leech") {
        const maxHp = Math.round(120 * hpScale);
        return { ...base, kind, hp: maxHp, maxHp, speed: 98 * speedScale, reward: Math.round(10 * rewardScale), color: "#73ffd4", r: 11, coreDamage: 2 };
      }
      if (kind === "boss") {
        const maxHp = Math.round(565 * hpScale);
        return { ...base, kind, hp: maxHp, maxHp, speed: 51 * speedScale, reward: Math.round(36 * rewardScale), color: "#c972ff", r: 18, armor: 0.18 };
      }
      const maxHp = Math.round(88 * hpScale);
      return { ...base, kind: "basic", hp: maxHp, maxHp, speed: 72 * speedScale, reward: Math.round(9 * rewardScale), color: "#75e9a7", r: 12 };
    }

    function startWave(manual = true) {
      if (state.gameOver) return;
      state.wave += 1;
      state.waveInProgress = true;
      state.waveReadyGlow = false;
      state.nextWaveTimer = WAVE_INTERVAL_S;
      if (manual) {
        const now = Date.now();
        if (state.meteorReadyAt > now) {
          state.meteorReadyAt = Math.max(now, state.meteorReadyAt - 6000);
        }
      }

      const count = 12 + state.wave * 3;
      state.toSpawn += count;
      if (state.spawnTimer <= 0) state.spawnTimer = 0.36;
      state.message = manual
        ? `Wave ${state.wave} called early. Hold the line.`
        : `Wave ${state.wave} has begun.`;

      updateHUD();
      updateButtons();
    }

    function pickWavePattern(wave) {
      const cycle = wave % 7;
      if (wave >= 12 && cycle === 0) return "bossRush";
      if (cycle === 1) return "swarmFlood";
      if (cycle === 2) return "armorColumn";
      if (cycle === 3) return "leechRaid";
      if (cycle === 4) return "blitz";
      if (cycle === 5) return "mixedElite";
      return "balanced";
    }

    function pickEnemyType(wave, idx) {
      if (wave <= 2) return "basic";
      const pattern = pickWavePattern(wave);
      if (pattern === "bossRush") {
        if (idx % 8 === 0) return "boss";
        if (idx % 3 === 0) return "tank";
        return "armored";
      }
      if (pattern === "swarmFlood") {
        if (idx % 6 === 0) return "fast";
        return "swarm";
      }
      if (pattern === "armorColumn") {
        if (idx % 6 === 0) return "tank";
        if (idx % 2 === 0) return "bulwark";
        return "armored";
      }
      if (pattern === "leechRaid") {
        if (idx % 4 === 0) return "leech";
        if (idx % 7 === 0) return "fast";
        return "basic";
      }
      if (pattern === "blitz") {
        if (idx % 3 === 0) return "striker";
        if (idx % 2 === 0) return "fast";
        return "swarm";
      }
      if (pattern === "mixedElite") {
        if (idx % 9 === 0) return "boss";
        if (idx % 6 === 0) return "bulwark";
        if (idx % 4 === 0) return "armored";
        if (idx % 3 === 0) return "tank";
        if (idx % 2 === 0) return "striker";
        return "leech";
      }
      if (wave >= 10 && idx % 10 === 0) return "boss";
      if (wave >= 8 && idx % 9 === 0) return "bulwark";
      if (wave >= 7 && idx % 7 === 0) return "armored";
      if (wave >= 6 && idx % 8 === 0) return "leech";
      if (wave >= 5 && idx % 6 === 0) return "striker";
      if (wave >= 4 && idx % 4 === 0) return "tank";
      if (wave >= 3 && idx % 5 === 0) return "swarm";
      if (wave >= 2 && idx % 2 === 0) return "fast";
      return "basic";
    }

    function spawnEnemyBatch(dt) {
      if (!state.waveInProgress || state.toSpawn <= 0) return;
      state.spawnTimer -= dt;
      if (state.spawnTimer <= 0) {
        const total = 12 + state.wave * 3;
        const spawnedIndex = total - state.toSpawn;
        state.enemies.push(newEnemy(pickEnemyType(state.wave, spawnedIndex), state.wave));
        state.toSpawn -= 1;
        const baseGap = Math.max(0.13, 0.47 - state.wave * 0.015);
        state.spawnTimer = baseGap;
      }
    }

    function distance(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function enemyAtEnd(enemy) {
      return enemy.seg >= path.length - 1;
    }

    function updateEnemies(dt) {
      for (let i = state.enemies.length - 1; i >= 0; i--) {
        const e = state.enemies[i];
        if (e.poisonTimer > 0) {
          e.poisonTimer -= dt;
          hitEnemy(e, e.poisonDps * dt, true);
          if (!state.enemies.includes(e)) continue;
        }
        if (e.burningTimer > 0) {
          e.burningTimer -= dt;
          hitEnemy(e, e.burningDps * dt, true);
          if (!state.enemies.includes(e)) continue;
        }
        if (e.slowTimer > 0) {
          e.slowTimer -= dt;
        } else {
          e.slowFactor = 1;
        }
        if (e.damageAmpTimer > 0) {
          e.damageAmpTimer -= dt;
        } else {
          e.damageAmp = 1;
          e.damageAmpColor = "#f58cff";
        }

        let move = e.speed * e.slowFactor * dt;
        while (move > 0 && e.seg < path.length - 1) {
          const a = path[e.seg];
          const b = path[e.seg + 1];
          const segLen = Math.hypot(b.x - a.x, b.y - a.y);
          const remain = segLen - e.p;
          if (move < remain) {
            e.p += move;
            move = 0;
          } else {
            move -= remain;
            e.seg += 1;
            e.p = 0;
          }
        }

        if (enemyAtEnd(e)) {
          state.enemies.splice(i, 1);
          state.health -= e.coreDamage || 1;
          if (state.health <= 0) {
            state.health = 0;
            state.gameOver = true;
            state.message = "Core breached. Restart and try a new layout.";
            updateButtons();
          }
          updateHUD();
          continue;
        }

        const a = path[e.seg];
        const b = path[e.seg + 1];
        const segLen = Math.hypot(b.x - a.x, b.y - a.y);
        const t = segLen ? e.p / segLen : 0;
        e.x = a.x + (b.x - a.x) * t;
        e.y = a.y + (b.y - a.y) * t;
      }
    }

    function acquireTarget(tower) {
      let target = null;
      let bestProgress = -1;
      for (const enemy of state.enemies) {
        const d = Math.hypot(enemy.x - tower.x, enemy.y - tower.y);
        if (d > tower.range) continue;
        const progress = enemy.seg * 2000 + enemy.p;
        if (progress > bestProgress) {
          bestProgress = progress;
          target = enemy;
        }
      }
      return target;
    }

    function updateTowers(dt) {
      for (const tower of state.towers) {
        tower.cooldown -= dt;
        if (tower.cooldown > 0) continue;

        const target = acquireTarget(tower);
        if (!target) continue;
        tower.cooldown = tower.fireRate;

        const angle = Math.atan2(target.y - tower.y, target.x - tower.x);
        tower.angle = angle;

        const pellets = tower.pellets || 1;
        const spread = tower.spread || 0;
        for (let p = 0; p < pellets; p++) {
          const isBurstShot = tower.burstCycle && ((tower.shotCount || 0) + 1) % tower.burstCycle === 0;
          const isBurningShot = tower.burningCycle && ((tower.shotCount || 0) + 1) % tower.burningCycle === 0;
          const baseOffset = pellets > 1 ? ((p / (pellets - 1)) * 2 - 1) * spread : 0;
          const shotAngle = angle + baseOffset + (Math.random() - 0.5) * 0.03;
          state.projectiles.push({
            x: tower.x,
            y: tower.y,
            vx: Math.cos(shotAngle) * tower.projectileSpeed,
            vy: Math.sin(shotAngle) * tower.projectileSpeed,
            life: 1.8,
            type: tower.type,
            damage: tower.damage,
            splash: tower.splash || 0,
            slow: tower.slow || 0,
            slowTime: tower.slowTime || 0,
            poisonDps: tower.poisonDps || 0,
            poisonTime: tower.poisonTime || 0,
            burningDps: isBurningShot ? tower.burningDps || 0 : 0,
            burningTime: isBurningShot ? tower.burningTime || 0 : 0,
            burningRadius: isBurningShot ? tower.burningRadius || 0 : 0,
            armorShred: tower.armorShred || 0,
            chainTargets: tower.chainTargets || 0,
            chainRange: tower.chainRange || 0,
            chainDamageFalloff: tower.chainDamageFalloff || 1,
            ionMarkAmp: tower.ionMarkAmp || 1,
            ionMarkTime: tower.ionMarkTime || 0,
            pierceLeft: isBurstShot ? tower.burstPierce || 0 : 0,
            color: tower.color
          });
        }
        tower.shotCount = (tower.shotCount || 0) + 1;
      }
    }

    function hitEnemy(enemy, damage, quiet = false) {
      const amp = enemy.damageAmpTimer > 0 ? enemy.damageAmp : 1;
      const reduced = enemy.armor ? damage * (1 - enemy.armor) : damage;
      enemy.hp -= reduced * amp;
      if (!quiet) {
        state.particles.push({ x: enemy.x, y: enemy.y, r: 5, life: 0.22, color: "#ffffff" });
      }
      if (enemy.hp <= 0) {
        state.gold += enemy.reward;
        state.score += Math.round(enemy.maxHp * 0.9);
        burst(enemy.x, enemy.y, enemy.color, 10, 34);
        const idx = state.enemies.indexOf(enemy);
        if (idx >= 0) state.enemies.splice(idx, 1);
        updateHUD();
      }
    }

    function explode(x, y, radius, damage, color, slow, slowTime) {
      burst(x, y, color, 18, radius * 0.8);
      if (radius >= 40) burst(x, y, "#ffd18a", 10, radius * 0.55);
      for (const enemy of [...state.enemies]) {
        if (Math.hypot(enemy.x - x, enemy.y - y) <= radius) {
          hitEnemy(enemy, damage);
          if (slow) {
            enemy.slowFactor = slow;
            enemy.slowTimer = Math.max(enemy.slowTimer, slowTime);
            burst(enemy.x, enemy.y, "#b2d3ff", 4, 12);
          }
        }
      }
    }

    function spawnHazard(x, y, radius, dps, time, color) {
      state.hazards.push({ x, y, radius, dps, life: time, color });
    }

    function chainShock(origin, projectile) {
      if (!projectile.chainTargets || projectile.chainTargets <= 0) return;
      let from = origin;
      let damage = projectile.damage * projectile.chainDamageFalloff;
      const visited = new Set([origin]);
      for (let jump = 0; jump < projectile.chainTargets; jump++) {
        let next = null;
        let bestDist = Infinity;
        for (const enemy of state.enemies) {
          if (visited.has(enemy)) continue;
          const d = Math.hypot(enemy.x - from.x, enemy.y - from.y);
          if (d <= projectile.chainRange && d < bestDist) {
            bestDist = d;
            next = enemy;
          }
        }
        if (!next) break;
        visited.add(next);
        hitEnemy(next, damage);
        if (projectile.slow) {
          next.slowFactor = projectile.slow;
          next.slowTimer = Math.max(next.slowTimer, projectile.slowTime);
        }
        if (projectile.ionMarkAmp > 1) {
          next.damageAmp = Math.max(next.damageAmp || 1, projectile.ionMarkAmp);
          next.damageAmpTimer = Math.max(next.damageAmpTimer || 0, projectile.ionMarkTime);
          next.damageAmpColor = projectile.color || "#f58cff";
        }
        burst(next.x, next.y, "#8af7ff", 5, 20);
        from = next;
        damage *= projectile.chainDamageFalloff;
      }
    }

    function updateHazards(dt) {
      for (let i = state.hazards.length - 1; i >= 0; i--) {
        const h = state.hazards[i];
        h.life -= dt;
        if (h.life <= 0) {
          state.hazards.splice(i, 1);
          continue;
        }
        for (const enemy of [...state.enemies]) {
          if (Math.hypot(enemy.x - h.x, enemy.y - h.y) <= h.radius) {
            hitEnemy(enemy, h.dps * dt, true);
            enemy.burningDps = Math.max(enemy.burningDps || 0, h.dps * 0.72);
            enemy.burningTimer = Math.max(enemy.burningTimer || 0, 0.45);
          }
        }
      }
    }

    function updateProjectiles(dt) {
      for (let i = state.projectiles.length - 1; i >= 0; i--) {
        const p = state.projectiles[i];
        p.life -= dt;
        p.x += p.vx * dt;
        p.y += p.vy * dt;

        if (p.life <= 0 || p.x < -60 || p.y < -60 || p.x > W + 60 || p.y > H + 60) {
          state.projectiles.splice(i, 1);
          continue;
        }

        let didHit = false;
        for (const enemy of [...state.enemies]) {
          if (Math.hypot(enemy.x - p.x, enemy.y - p.y) <= enemy.r + 5) {
            if (p.splash > 0) {
              explode(p.x, p.y, p.splash, p.damage, p.color, p.slow, p.slowTime);
            } else {
              hitEnemy(enemy, p.damage);
              if (p.slow) {
                enemy.slowFactor = p.slow;
                enemy.slowTimer = Math.max(enemy.slowTimer, p.slowTime);
              }
              if (p.poisonDps) {
                enemy.poisonDps = Math.max(enemy.poisonDps, p.poisonDps);
                enemy.poisonTimer = Math.max(enemy.poisonTimer, p.poisonTime);
                burst(enemy.x, enemy.y, "#8bff9d", 5, 16);
              }
              if (p.armorShred > 0) {
                enemy.armor = Math.max(0, (enemy.armor || 0) - p.armorShred);
                burst(enemy.x, enemy.y, "#ffcc9a", 3, 8);
              }
              if (p.burningDps) {
                const r = p.burningRadius || 0;
                spawnHazard(enemy.x, enemy.y, r, p.burningDps, p.burningTime, "rgba(255,120,72,0.35)");
                burst(enemy.x, enemy.y, "#ff9c5f", 10, 22);
              }
              if (p.ionMarkAmp > 1) {
                enemy.damageAmp = Math.max(enemy.damageAmp || 1, p.ionMarkAmp);
                enemy.damageAmpTimer = Math.max(enemy.damageAmpTimer || 0, p.ionMarkTime);
                enemy.damageAmpColor = p.color || "#f58cff";
                burst(enemy.x, enemy.y, "#f58cff", 4, 12);
              }
              if (p.chainTargets > 0) {
                chainShock(enemy, p);
              }
              if (p.pierceLeft > 0) {
                p.pierceLeft -= 1;
                p.life -= 0.06;
                p.x += p.vx * 0.01;
                p.y += p.vy * 0.01;
                burst(enemy.x, enemy.y, "#ffd6d6", 5, 12);
                didHit = false;
              } else {
                didHit = true;
              }
            }
            if (p.pierceLeft <= 0) didHit = true;
            break;
          }
        }

        if (didHit) {
          state.projectiles.splice(i, 1);
        }
      }
    }

    function burst(x, y, color, count, spread) {
      for (let i = 0; i < count; i++) {
        const a = Math.random() * Math.PI * 2;
        const s = Math.random() * spread;
        state.particles.push({
          x,
          y,
          vx: Math.cos(a) * s,
          vy: Math.sin(a) * s,
          r: 2 + Math.random() * 2,
          life: 0.28 + Math.random() * 0.42,
          color
        });
      }
    }

    function updateParticles(dt) {
      for (let i = state.particles.length - 1; i >= 0; i--) {
        const p = state.particles[i];
        p.life -= dt;
        p.x += (p.vx || 0) * dt;
        p.y += (p.vy || 0) * dt;
        p.r *= 0.988;
        if (p.life <= 0) state.particles.splice(i, 1);
      }
    }

    function worldPos(evt) {
      const r = canvas.getBoundingClientRect();
      const sx = canvas.width / r.width;
      const sy = canvas.height / r.height;
      return {
        x: (evt.clientX - r.left) * sx,
        y: (evt.clientY - r.top) * sy
      };
    }

    function pointSegDist(px, py, x1, y1, x2, y2) {
      const dx = x2 - x1;
      const dy = y2 - y1;
      const len2 = dx * dx + dy * dy;
      if (len2 === 0) return Math.hypot(px - x1, py - y1);
      let t = ((px - x1) * dx + (py - y1) * dy) / len2;
      t = Math.max(0, Math.min(1, t));
      const x = x1 + t * dx;
      const y = y1 + t * dy;
      return Math.hypot(px - x, py - y);
    }

    function tooCloseToPath(x, y) {
      for (let i = 0; i < path.length - 1; i++) {
        const a = path[i];
        const b = path[i + 1];
        if (pointSegDist(x, y, a.x, a.y, b.x, b.y) < 20) return true;
      }
      return false;
    }

    function towerAt(x, y) {
      for (const t of state.towers) {
        if (Math.hypot(t.x - x, t.y - y) <= 18) return t;
      }
      return null;
    }

    function enemyAt(x, y) {
      for (let i = state.enemies.length - 1; i >= 0; i--) {
        const e = state.enemies[i];
        if (Math.hypot(e.x - x, e.y - y) <= e.r + 2) return e;
      }
      return null;
    }

    function canPlace(x, y) {
      if (!buildSpotSet.has(`${x},${y}`)) return false;
      if (roadSpotSet.has(`${x},${y}`)) return false;
      if (towerAt(x, y)) return false;
      return true;
    }

    function addTower(type, x, y) {
      const t = towerTypes[type];
      if (!t || state.gold < t.cost) return false;

      const tower = {
        type,
        x,
        y,
        cooldown: 0.1,
        angle: -Math.PI / 2,
        level: 1,
        totalInvested: t.cost,
        ...t
      };
      state.towers.push(tower);
      state.gold -= t.cost;
      state.selectedTower = tower;
      state.selectedEnemy = null;
      state.selectedBuild = null;
      state.statsMode = "unit";
      state.message = `${t.name} online.`;
      updateHUD();
      updateButtons();
      return true;
    }

    function getUpgradeCost(tower) {
      const level = tower.level - 1;
      const earlyDiscount = level < 4 ? (0.58 + level * 0.09) : 1;
      const raw = tower.cost * 1.75 * Math.pow(1.2, level) * (1 + Math.max(0, level - 2) * 0.09) * earlyDiscount;
      return Math.ceil(raw / 5) * 5;
    }

    function upgradeTower() {
      if (!state.selectedTower || state.gameOver) return;
      const t = state.selectedTower;
      const upgradeCost = getUpgradeCost(t);
      if (state.gold < upgradeCost) {
        state.message = `Need ${upgradeCost} gold to upgrade.`;
        return;
      }
      state.gold -= upgradeCost;
      t.totalInvested = (t.totalInvested || t.cost) + upgradeCost;
      const earlyBoost = t.level < 5 ? (1.18 - t.level * 0.03) : 1;
      t.level += 1;
      t.damage = t.damage * (1.2 + (earlyBoost - 1) * 0.65) + 6 + (t.level - 1) * 1.5;
      t.range += 2 + (earlyBoost - 1) * 8;
      t.fireRate = Math.max(0.12, t.fireRate * (0.91 - (earlyBoost - 1) * 0.12));
      t.projectileSpeed *= 1.04 + (earlyBoost - 1) * 0.03;
      if (t.slow) t.slow = Math.max(0.35, t.slow - 0.04);
      if (t.slowTime) t.slowTime += 0.12;
      if (t.poisonDps) t.poisonDps *= 1.3;
      if (t.poisonTime) t.poisonTime += 0.2;
      if (t.burningDps) t.burningDps *= 1.3;
      if (t.burningTime) t.burningTime += 0.2;
      if (t.ionMarkAmp) t.ionMarkAmp += 0.02;
      if (t.ionMarkTime) t.ionMarkTime += 0.15;
      if (t.type === "scatter" && t.level % 5 === 0) {
        t.pellets = (t.pellets || 3) + 1;
      }
      if (t.type === "storm" && t.level % 10 === 0) {
        t.chainTargets = (t.chainTargets || 0) + 1;
      }
      if (t.type === "rail" && t.level % 5 === 0) {
        t.burstPierce = (t.burstPierce || 0) + 1;
      }
      t.upgradeFx = 0.45;
      state.message = `${t.name} upgraded to Lv.${t.level}.`;
      updateHUD();
      updateButtons();
    }

    function castMeteor(x, y) {
      const now = Date.now();
      if (now < state.meteorReadyAt) return false;
      state.meteorReadyAt = now + METEOR_CD_MS;
      state.aimingMeteor = false;
      state.meteorEffects.push({ x, y, t: 0, impactAt: 0.34, done: false });
      state.message = "Meteor inbound...";
      updateButtons();
      return true;
    }

    canvas.addEventListener("click", (evt) => {
      if (state.gameOver) return;
      if (state.paused) {
        pauseBtn.click();
        return;
      }
      const { x, y } = worldPos(evt);
      const gx = Math.round(x / grid) * grid;
      const gy = Math.round(y / grid) * grid;

      if (state.aimingMeteor) {
        castMeteor(x, y);
        return;
      }

      const clickedTower = towerAt(x, y);
      const clickedEnemy = enemyAt(x, y);
      if (clickedEnemy && !state.selectedBuild) {
        state.selectedEnemy = clickedEnemy;
        state.selectedTower = null;
        state.statsMode = "unit";
        state.message = `${clickedEnemy.kind.toUpperCase()} selected.`;
        updateButtons();
        return;
      }
      if (clickedTower && !state.selectedBuild) {
        state.selectedTower = clickedTower;
        state.selectedEnemy = null;
        state.statsMode = "unit";
        state.message = `${clickedTower.name} selected.`;
        updateButtons();
        return;
      }

      if (state.selectedBuild) {
        if (canPlace(gx, gy)) {
          addTower(state.selectedBuild, gx, gy);
        } else {
          state.selectedBuild = null;
          state.selectedEnemy = null;
          state.statsMode = "unit";
          state.message = "Build canceled.";
          updateButtons();
        }
      } else {
        state.selectedTower = null;
        state.selectedEnemy = null;
        state.statsMode = "unit";
        updateButtons();
      }
    });

    canvas.addEventListener("contextmenu", (evt) => {
      evt.preventDefault();
      if (state.selectedBuild || state.aimingMeteor) {
        state.selectedBuild = null;
        state.aimingMeteor = false;
        state.statsMode = "unit";
        state.message = "Action canceled.";
        updateButtons();
      }
    });

    towerButtons.forEach((btn) => {
      btn.addEventListener("click", () => {
        if (state.gameOver) return;
        const next = btn.dataset.build;
        state.selectedBuild = state.selectedBuild === next ? null : next;
        if (state.selectedBuild) {
          state.selectedTower = null;
          state.selectedEnemy = null;
          state.statsMode = "unit";
        }
        updateButtons();
      });
      btn.addEventListener("mouseenter", () => {
        state.hoverBuild = btn.dataset.build;
        state.statsMode = "unit";
        updateButtons();
      });
      btn.addEventListener("mouseleave", () => {
        if (state.hoverBuild === btn.dataset.build) {
          state.hoverBuild = null;
          updateButtons();
        }
      });
    });

    sellBtn.addEventListener("click", () => {
      if (!state.selectedTower) return;
      const idx = state.towers.indexOf(state.selectedTower);
      if (idx >= 0) {
        const invested = state.selectedTower.totalInvested || state.selectedTower.cost;
        const value = Math.floor(invested * 0.6);
        state.gold += value;
        state.towers.splice(idx, 1);
        state.selectedTower = null;
        state.message = `Tower sold for ${value} gold.`;
        updateHUD();
        updateButtons();
      }
    });

    meteorBtn.addEventListener("click", () => {
      if (state.gameOver) return;
      state.statsMode = "meteor";
      const now = Date.now();
      if (now < state.meteorReadyAt) {
        const remain = Math.ceil((state.meteorReadyAt - now) / 1000);
        state.message = `Meteor cooldown: ${remain}s`;
        updateButtons();
        return;
      }
      state.aimingMeteor = !state.aimingMeteor;
      state.selectedBuild = null;
      state.selectedTower = null;
      if (!state.aimingMeteor) state.statsMode = "unit";
      state.message = state.aimingMeteor ? "Click battlefield to call meteor." : "Meteor canceled.";
      updateButtons();
    });
    pauseBtn.addEventListener("click", () => {
      if (state.gameOver) {
        resetGame();
        startLoop();
        return;
      }
      state.paused = !state.paused;
      state.message = state.paused ? "Paused." : "Resumed.";
      updateButtons();
    });

    startWaveBtn.addEventListener("click", startWave);
    upgradeBtn.addEventListener("click", upgradeTower);
    window.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();
      if (key === "m") {
        meteorBtn.click();
        return;
      }
      if (key === "p") {
        pauseBtn.click();
        return;
      }
      if (state.paused) return;
      for (let i = 0; i < towerHotkeys.length; i++) {
        if (towerHotkeys[i].includes(key) && towerButtons[i]) {
          towerButtons[i].click();
          return;
        }
      }
      if (key === "u") {
        upgradeTower();
        return;
      }
      if (key === "v") {
        sellBtn.click();
        return;
      }
      if (key === "escape") {
        if (state.selectedBuild || state.aimingMeteor) {
          state.selectedBuild = null;
          state.aimingMeteor = false;
          state.statsMode = "unit";
          state.message = "Action canceled.";
          updateButtons();
        }
        return;
      }
      if (key === "n" || e.key === " ") {
        e.preventDefault();
        if (startWaveBtn.disabled) return;
        startWave();
      }
    });

    function drawGrid() {
      ctx.save();
      ctx.strokeStyle = "rgba(165, 201, 255, 0.07)";
      ctx.lineWidth = 1;
      for (let x = 0; x < W; x += grid) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, H);
        ctx.stroke();
      }
      for (let y = 0; y < H; y += grid) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(W, y);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawMapDecor() {
      ctx.save();
      const rocks = [
        { x: 180, y: 120, r: 34 },
        { x: 780, y: 420, r: 42 },
        { x: 600, y: 360, r: 28 },
        { x: 870, y: 300, r: 30 },
        { x: 180, y: 520, r: 26 }
      ];
      for (const rock of rocks) {
        const g = ctx.createRadialGradient(rock.x - 6, rock.y - 7, 4, rock.x, rock.y, rock.r);
        g.addColorStop(0, "rgba(130, 180, 230, 0.22)");
        g.addColorStop(1, "rgba(26, 48, 72, 0.15)");
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(rock.x, rock.y, rock.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.strokeStyle = "rgba(95, 162, 255, 0.14)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(64, 260);
      ctx.bezierCurveTo(180, 220, 230, 250, 320, 205);
      ctx.moveTo(540, 410);
      ctx.bezierCurveTo(640, 360, 700, 390, 860, 350);
      ctx.stroke();
      ctx.restore();
    }

    const buildSpots = [];
    for (let y = grid; y <= H; y += grid) {
      for (let x = grid; x <= W - grid; x += grid) {
        buildSpots.push({ x, y });
      }
    }
    const buildSpotSet = new Set(buildSpots.map((s) => `${s.x},${s.y}`));
    const roadSpotSet = new Set(
      buildSpots
        .filter((spot) => tooCloseToPath(spot.x, spot.y))
        .map((spot) => `${spot.x},${spot.y}`)
    );

    function drawBuildSpots() {
      ctx.save();
      for (const spot of buildSpots) {
        const blocked = roadSpotSet.has(`${spot.x},${spot.y}`);
        const occupied = !!towerAt(spot.x, spot.y);
        if (blocked) {
          ctx.fillStyle = "rgba(255, 99, 146, 0.18)";
          ctx.strokeStyle = "rgba(255, 145, 176, 0.4)";
        } else {
          ctx.fillStyle = occupied ? "rgba(100, 190, 255, 0.06)" : "rgba(77, 255, 226, 0.11)";
          ctx.strokeStyle = occupied ? "rgba(141, 183, 244, 0.2)" : "rgba(77, 255, 226, 0.35)";
        }
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.rect(spot.x - PAD_HALF, spot.y - PAD_HALF, PAD_HALF * 2, PAD_HALF * 2);
        ctx.fill();
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawPath() {
      ctx.save();
      ctx.lineCap = "round";
      ctx.lineJoin = "round";

      const grad = ctx.createLinearGradient(0, 60, W, 390);
      grad.addColorStop(0, "rgba(240,163,89,0.95)");
      grad.addColorStop(1, "rgba(240,99,146,0.9)");

      ctx.strokeStyle = "rgba(255, 255, 255, 0.14)";
      ctx.lineWidth = 44;
      ctx.beginPath();
      ctx.moveTo(path[0].x, path[0].y);
      for (let i = 1; i < path.length; i++) ctx.lineTo(path[i].x, path[i].y);
      ctx.stroke();

      ctx.strokeStyle = grad;
      ctx.lineWidth = 28;
      ctx.beginPath();
      ctx.moveTo(path[0].x, path[0].y);
      for (let i = 1; i < path.length; i++) ctx.lineTo(path[i].x, path[i].y);
      ctx.stroke();

      ctx.strokeStyle = "rgba(255,255,255,0.3)";
      ctx.setLineDash([10, 18]);
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(path[0].x, path[0].y);
      for (let i = 1; i < path.length; i++) ctx.lineTo(path[i].x, path[i].y);
      ctx.stroke();
      ctx.restore();
    }

    function drawCore() {
      const x = W - 6;
      const y = path[path.length - 1].y;
      ctx.save();
      ctx.translate(x, y);
      ctx.fillStyle = "rgba(20, 48, 65, 0.45)";
      ctx.beginPath();
      ctx.arc(0, 0, 40, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#2f6f8a";
      ctx.beginPath();
      ctx.arc(0, 0, 23, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "#8fc1d7";
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.restore();
    }

    function drawTowers() {
      for (const t of state.towers) {
        ctx.save();
        if (t === state.selectedTower) {
          ctx.strokeStyle = `${t.color}cc`;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(t.x, t.y, t.range, 0, Math.PI * 2);
          ctx.stroke();
        }

        ctx.translate(t.x, t.y);
        const nextShot = (t.shotCount || 0) + 1;
        const emberReady = t.burningCycle && nextShot % t.burningCycle === 0;
        const burstReady = t.burstCycle && nextShot % t.burstCycle === 0;
        const specialReady = emberReady || burstReady;
        if (specialReady) {
          ctx.globalAlpha = 0.22;
          ctx.fillStyle = t.color;
          ctx.beginPath();
          ctx.arc(0, 0, 18.5, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
        }
        if (t.type === "dart") {
          ctx.strokeStyle = "rgba(190, 204, 220, 0.35)";
          ctx.lineWidth = 1.2;
          for (let i = 0; i < 4; i++) {
            const a = performance.now() * 0.003 + i * (Math.PI / 2);
            ctx.beginPath();
            ctx.moveTo(Math.cos(a) * 8, Math.sin(a) * 8);
            ctx.lineTo(Math.cos(a) * 13, Math.sin(a) * 13);
            ctx.stroke();
          }
        }
        if (t.type === "scatter") {
          ctx.fillStyle = "rgba(255, 154, 216, 0.28)";
          for (let i = 0; i < 3; i++) {
            const a = t.angle + i * (Math.PI * 2 / 3);
            ctx.beginPath();
            ctx.ellipse(Math.cos(a) * 9, Math.sin(a) * 9, 4.5, 2.8, a, 0, Math.PI * 2);
            ctx.fill();
          }
        }
        if (t.type === "cannon") {
          ctx.fillStyle = "rgba(255, 179, 71, 0.26)";
          ctx.fillRect(-10, -10, 20, 20);
        }
        if (t.type === "frost") {
          ctx.strokeStyle = "rgba(166, 185, 255, 0.55)";
          ctx.lineWidth = 1.4;
          for (let i = 0; i < 3; i++) {
            const a = t.angle + i * (Math.PI * 2 / 3);
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(Math.cos(a) * 14, Math.sin(a) * 14);
            ctx.stroke();
          }
        }
        if (t.type === "storm") {
          ctx.strokeStyle = "rgba(125, 217, 255, 0.4)";
          ctx.lineWidth = 1.4;
          ctx.beginPath();
          ctx.arc(0, 0, 20, 0, Math.PI * 2);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(-8, -6);
          ctx.lineTo(-1, -1);
          ctx.lineTo(-5, 5);
          ctx.lineTo(7, 7);
          ctx.stroke();
        }
        if (t.type === "venom") {
          ctx.fillStyle = "rgba(135, 255, 148, 0.32)";
          ctx.beginPath();
          ctx.arc(-7, 3, 3, 0, Math.PI * 2);
          ctx.arc(0, -8, 2.4, 0, Math.PI * 2);
          ctx.arc(8, 1, 2.8, 0, Math.PI * 2);
          ctx.fill();
        }
        if (t.type === "rail") {
          ctx.strokeStyle = "rgba(255, 126, 126, 0.45)";
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.moveTo(-12, -6);
          ctx.lineTo(12, -6);
          ctx.moveTo(-12, 6);
          ctx.lineTo(12, 6);
          ctx.stroke();
        }
        if (t.type === "mortar") {
          ctx.strokeStyle = "rgba(219, 200, 165, 0.38)";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(0, 0, 22, 0, Math.PI * 2);
          ctx.stroke();
        }
        if (t.type === "ion") {
          ctx.strokeStyle = "rgba(114, 255, 208, 0.5)";
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.arc(0, 0, 21, 0, Math.PI * 2);
          ctx.stroke();
          for (let i = 0; i < 3; i++) {
            const a = performance.now() * 0.002 + (Math.PI * 2 * i) / 3;
            ctx.fillStyle = "#9fffe3";
            ctx.beginPath();
            ctx.arc(Math.cos(a) * 11, Math.sin(a) * 11, 2.4, 0, Math.PI * 2);
            ctx.fill();
          }
        }
        if ((t.type === "ember" && emberReady) || (t.type === "rail" && burstReady)) {
          const pulse = 0.5 + Math.sin(performance.now() * 0.01 + t.x * 0.03) * 0.5;
          ctx.globalAlpha = 0.14 + pulse * 0.2;
          ctx.fillStyle = t.color;
          ctx.beginPath();
          ctx.arc(0, 0, 22, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
        }
        if (t.type === "ember") {
          ctx.fillStyle = "#2f1b13";
          ctx.fillRect(-6, -6, 12, 12);
          ctx.fillStyle = "#ffb36a";
          ctx.fillRect(-4, -4, 8, 8);
        }
        ctx.fillStyle = "rgba(7, 17, 29, 0.95)";
        ctx.strokeStyle = t.color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, 0, 16, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        if (t.upgradeFx > 0) {
          ctx.globalAlpha = Math.min(1, t.upgradeFx * 2.2);
          ctx.strokeStyle = "#fff0a8";
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(0, 0, 20 + (1 - t.upgradeFx) * 24, 0, Math.PI * 2);
          ctx.stroke();
          ctx.globalAlpha = 1;
        }

        ctx.rotate(t.angle || 0);
        ctx.fillStyle = t.color;
        ctx.fillRect(-3, -4, 22, 8);
        if (t.level > 1) {
          ctx.rotate(-(t.angle || 0));
          ctx.fillStyle = "#f5fbff";
          ctx.font = "700 10px 'Space Grotesk', sans-serif";
          ctx.textAlign = "center";
          ctx.fillText(`L${t.level}`, 0, 28);
          ctx.textAlign = "start";
        }
        ctx.restore();
      }
    }

    function drawPoly(x, y, radius, sides, rotation = 0) {
      ctx.beginPath();
      for (let i = 0; i < sides; i++) {
        const a = rotation + (i * Math.PI * 2) / sides;
        const px = x + Math.cos(a) * radius;
        const py = y + Math.sin(a) * radius;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
    }

    function drawEnemies() {
      for (const e of state.enemies) {
        ctx.save();
        ctx.translate(e.x, e.y);
        ctx.fillStyle = e.color;
        if (e.kind === "swarm") {
          drawPoly(0, 0, e.r + 1, 3, -Math.PI / 2);
          ctx.fill();
        } else if (e.kind === "striker") {
          drawPoly(0, 0, e.r + 1, 4, Math.PI / 4);
          ctx.fill();
          ctx.fillStyle = "#53331f";
          ctx.beginPath();
          ctx.arc(0, 0, e.r * 0.3, 0, Math.PI * 2);
          ctx.fill();
        } else if (e.kind === "fast") {
          ctx.save();
          ctx.rotate(Math.PI / 4);
          ctx.fillRect(-e.r * 0.85, -e.r * 0.85, e.r * 1.7, e.r * 1.7);
          ctx.restore();
        } else if (e.kind === "bulwark") {
          drawPoly(0, 0, e.r + 1, 8, Math.PI / 8);
          ctx.fill();
          ctx.strokeStyle = "#d3e0ec";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(-e.r * 0.55, 0);
          ctx.lineTo(e.r * 0.55, 0);
          ctx.moveTo(0, -e.r * 0.55);
          ctx.lineTo(0, e.r * 0.55);
          ctx.stroke();
        } else if (e.kind === "armored") {
          ctx.fillRect(-e.r, -e.r, e.r * 2, e.r * 2);
          ctx.strokeStyle = "#d6e4ef";
          ctx.lineWidth = 2;
          ctx.strokeRect(-e.r + 2, -e.r + 2, e.r * 2 - 4, e.r * 2 - 4);
        } else if (e.kind === "leech") {
          ctx.beginPath();
          ctx.arc(0, 0, e.r, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#173d3a";
          ctx.beginPath();
          ctx.arc(0, 0, e.r * 0.46, 0, Math.PI * 2);
          ctx.fill();
        } else if (e.kind === "boss") {
          drawPoly(0, 0, e.r + 1, 6, Math.PI / 6);
          ctx.fill();
        } else {
          ctx.beginPath();
          ctx.arc(0, 0, e.r, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.strokeStyle = "rgba(0,0,0,0.4)";
        ctx.lineWidth = 2;
        if (e.kind === "armored") {
          ctx.strokeRect(-e.r, -e.r, e.r * 2, e.r * 2);
        } else if (e.kind === "bulwark") {
          drawPoly(0, 0, e.r + 1, 8, Math.PI / 8);
          ctx.stroke();
        } else if (e.kind === "striker") {
          drawPoly(0, 0, e.r + 1, 4, Math.PI / 4);
          ctx.stroke();
        } else if (e.kind === "fast") {
          ctx.save();
          ctx.rotate(Math.PI / 4);
          ctx.strokeRect(-e.r * 0.85, -e.r * 0.85, e.r * 1.7, e.r * 1.7);
          ctx.restore();
        } else if (e.kind === "swarm") {
          drawPoly(0, 0, e.r + 1, 3, -Math.PI / 2);
          ctx.stroke();
        } else if (e.kind === "boss") {
          drawPoly(0, 0, e.r + 1, 6, Math.PI / 6);
          ctx.stroke();
        } else {
          ctx.beginPath();
          ctx.arc(0, 0, e.r, 0, Math.PI * 2);
          ctx.stroke();
        }

        const hpW = e.r * 2;
        const hpY = -e.r - 10;
        ctx.fillStyle = "rgba(10, 20, 30, 0.7)";
        ctx.fillRect(-hpW / 2, hpY, hpW, 4);
        ctx.fillStyle = e.kind === "bulwark"
          ? "#c5d9eb"
          : e.kind === "armored"
            ? "#b4d0ff"
            : e.kind === "striker"
              ? "#ffd39d"
              : e.kind === "leech"
                ? "#80ffe5"
                : "#7cff95";
        ctx.fillRect(-hpW / 2, hpY, hpW * Math.max(0, e.hp / e.maxHp), 4);

        if (e.slowTimer > 0) {
          ctx.strokeStyle = "rgba(170, 201, 255, 0.8)";
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.arc(0, 0, e.r + 3, 0, Math.PI * 2);
          ctx.stroke();
        }
        if (e.poisonTimer > 0) {
          ctx.strokeStyle = "rgba(128, 255, 173, 0.85)";
          ctx.lineWidth = 1.3;
          ctx.setLineDash([3, 4]);
          ctx.beginPath();
          ctx.arc(0, 0, e.r + 5, 0, Math.PI * 2);
          ctx.stroke();
          ctx.setLineDash([]);
        }
        if (e.burningTimer > 0) {
          const f = 0.25 + Math.random() * 0.2;
          ctx.fillStyle = `rgba(255, 131, 72, ${f})`;
          ctx.beginPath();
          ctx.arc(0, 0, e.r + 2, 0, Math.PI * 2);
          ctx.fill();
        }
        if (e.damageAmpTimer > 0) {
          ctx.strokeStyle = e.damageAmpColor || "#f58cff";
          ctx.lineWidth = 1.4;
          ctx.beginPath();
          ctx.moveTo(0, -e.r - 8);
          ctx.lineTo(4, -e.r - 3);
          ctx.lineTo(-4, -e.r - 3);
          ctx.closePath();
          ctx.stroke();
        }
        ctx.restore();
      }
    }

    function drawProjectiles() {
      for (const p of state.projectiles) {
        ctx.save();
        const tailX = p.x - p.vx * 0.018;
        const tailY = p.y - p.vy * 0.018;
        ctx.strokeStyle = `${p.color}aa`;
        ctx.lineWidth = p.splash ? 2.2 : 1.5;
        ctx.beginPath();
        ctx.moveTo(tailX, tailY);
        ctx.lineTo(p.x, p.y);
        ctx.stroke();
        ctx.fillStyle = p.color;
        if (p.type === "rail") {
          ctx.fillRect(p.x - 2.2, p.y - 2.2, 4.4, 4.4);
        } else if (p.type === "storm" || p.chainTargets > 0) {
          ctx.beginPath();
          ctx.moveTo(p.x + 4, p.y);
          ctx.lineTo(p.x, p.y + 4);
          ctx.lineTo(p.x - 4, p.y);
          ctx.lineTo(p.x, p.y - 4);
          ctx.closePath();
          ctx.fill();
        } else if (p.type === "ember" || p.burningDps > 0) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, 4.6, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "rgba(255, 207, 139, 0.65)";
          ctx.beginPath();
          ctx.arc(p.x - 1, p.y - 1, 2.3, 0, Math.PI * 2);
          ctx.fill();
        } else {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.splash ? 5.5 : 3.8, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }
    }

    function drawParticles() {
      for (const p of state.particles) {
        ctx.save();
        ctx.globalAlpha = Math.max(0, p.life * 1.5);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function drawHazards() {
      for (const h of state.hazards) {
        ctx.save();
        const alpha = Math.min(0.35, Math.max(0.08, h.life * 0.12));
        const g = ctx.createRadialGradient(h.x, h.y, 8, h.x, h.y, h.radius);
        g.addColorStop(0, `rgba(255, 184, 122, ${alpha + 0.12})`);
        g.addColorStop(1, `rgba(255, 93, 72, ${alpha})`);
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(h.x, h.y, h.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function drawPlacementGhost() {
      if (!state.selectedBuild || state.gameOver || state.aimingMeteor) return;
      const t = towerTypes[state.selectedBuild];
      const pos = mouse;
      if (!pos) return;

      const x = Math.round(pos.x / grid) * grid;
      const y = Math.round(pos.y / grid) * grid;
      const ok = canPlace(x, y) && state.gold >= t.cost;

      ctx.save();
      ctx.globalAlpha = 0.75;
      ctx.strokeStyle = ok ? "rgba(129, 244, 149, 0.95)" : "rgba(255, 93, 125, 0.95)";
      ctx.fillStyle = ok ? "rgba(129, 244, 149, 0.15)" : "rgba(255, 93, 125, 0.15)";

      ctx.beginPath();
      ctx.arc(x, y, t.range, 0, Math.PI * 2);
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(x, y, 16, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }

    function drawMeteorMarker() {
      if (!state.aimingMeteor || !mouse) return;
      const now = Date.now();
      if (now < state.meteorReadyAt) return;
      const x = mouse.x;
      const y = mouse.y;

      ctx.save();
      ctx.strokeStyle = "rgba(255, 127, 80, 0.9)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(x, y, METEOR_RADIUS, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x - 14, y);
      ctx.lineTo(x + 14, y);
      ctx.moveTo(x, y - 14);
      ctx.lineTo(x, y + 14);
      ctx.stroke();
      ctx.restore();
    }

    function updateMeteorEffects(dt) {
      for (let i = state.meteorEffects.length - 1; i >= 0; i--) {
        const fx = state.meteorEffects[i];
        fx.t += dt;
        if (!fx.done && fx.t >= fx.impactAt) {
          fx.done = true;
          const meteorDamageNow = METEOR_DAMAGE + state.wave * METEOR_WAVE_BONUS;
          explode(fx.x, fx.y, METEOR_RADIUS, meteorDamageNow, "#ff7f50", 0, 0);
          state.message = "Meteor impact!";
        }
        if (fx.t >= 1.1) state.meteorEffects.splice(i, 1);
      }
    }

    function drawMeteorEffects() {
      for (const fx of state.meteorEffects) {
        const p = Math.min(1, fx.t / fx.impactAt);
        const meteorX = fx.x;
        const meteorY = -90 + (fx.y + 90) * p;
        const meteorR = 4 + p * 10;
        ctx.save();
        ctx.strokeStyle = `rgba(255, 160, 90, ${0.6 * (1 - p)})`;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(meteorX, meteorY - 18);
        ctx.lineTo(fx.x, fx.y);
        ctx.stroke();
        ctx.fillStyle = "#ffcf8b";
        ctx.beginPath();
        ctx.arc(meteorX, meteorY, meteorR, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        if (fx.done) {
          const boom = 1 - (fx.t - fx.impactAt) / 0.55;
          if (boom > 0) {
            ctx.save();
            ctx.strokeStyle = `rgba(255, 127, 80, ${boom})`;
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.arc(fx.x, fx.y, METEOR_RADIUS * (1 - boom * 0.65), 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();
          }
        }
      }
    }

    function drawGameOver() {
      if (!state.gameOver) return;
      ctx.save();
      ctx.fillStyle = "rgba(0, 0, 0, 0.52)";
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = "#ff9db1";
      ctx.textAlign = "center";
      ctx.font = "700 48px 'Bungee', sans-serif";
      ctx.fillText("Core Lost", W / 2, H / 2 - 18);
      ctx.fillStyle = "#dce8ff";
      ctx.font = "600 18px 'Space Grotesk', sans-serif";
      ctx.fillText(`Final Score: ${state.score}`, W / 2, H / 2 + 22);
      const bw = 170;
      const bh = 44;
      const bx = W / 2 - bw / 2;
      const by = H / 2 + 46;
      ctx.fillStyle = "rgba(38, 95, 140, 0.92)";
      ctx.strokeStyle = "rgba(180, 222, 255, 0.85)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.rect(bx, by, bw, bh);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = "#eef6ff";
      ctx.font = "700 18px 'Space Grotesk', sans-serif";
      ctx.fillText("Restart", W / 2, by + 29);
      ctx.textAlign = "start";
      ctx.restore();
    }

    function drawPaused() {
      if (!state.paused || state.gameOver) return;
      ctx.save();
      ctx.fillStyle = "rgba(2, 8, 16, 0.42)";
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = "#cbe3ff";
      ctx.font = "700 42px 'Bungee', sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("Paused", W / 2, H / 2);
      ctx.font = "600 16px 'Space Grotesk', sans-serif";
      ctx.fillText("Press P to resume", W / 2, H / 2 + 30);
      ctx.textAlign = "start";
      ctx.restore();
    }

    const mouse = { x: W / 2, y: H / 2 };
    canvas.addEventListener("mousemove", (e) => {
      const p = worldPos(e);
      mouse.x = p.x;
      mouse.y = p.y;
    });

    canvas.addEventListener("mousedown", (e) => {
      if (!state.gameOver) return;
      const p = worldPos(e);
      const bw = 170;
      const bh = 44;
      const bx = W / 2 - bw / 2;
      const by = H / 2 + 46;
      if (p.x >= bx && p.x <= bx + bw && p.y >= by && p.y <= by + bh) {
        resetGame();
        startLoop();
      }
    });

    let lastTime = performance.now();
    let rafId = 0;

    function startLoop() {
      if (isLoopRunning) return;
      isLoopRunning = true;
      lastTime = performance.now();
      rafId = requestAnimationFrame(frame);
    }

    function frame(t) {
      if (!isLoopRunning) return;
      const dt = Math.min(0.033, (t - lastTime) / 1000);
      lastTime = t;

      if (!state.gameOver && !state.paused) {
        state.nextWaveTimer -= dt;
        if (state.nextWaveTimer <= 0) startWave(false);
        spawnEnemyBatch(dt);
        updateEnemies(dt);
        updateTowers(dt);
        for (const t of state.towers) {
          if (t.upgradeFx > 0) t.upgradeFx = Math.max(0, t.upgradeFx - dt);
        }
        updateProjectiles(dt);
        updateMeteorEffects(dt);
        updateParticles(dt);
        updateHazards(dt);
      }

      if (state.waveInProgress && state.toSpawn <= 0) {
        state.waveInProgress = false;
      }

      if (!state.waveInProgress && state.enemies.length === 0 && state.clearedWave < state.wave) {
        state.clearedWave = state.wave;
        state.waveReadyGlow = true;
        state.gold += 16 + state.wave * 4;
        state.score += 80 + state.wave * 12;
        state.message = `Wave ${state.wave} cleared. Bonus resources awarded.`;
        updateHUD();
        updateButtons();
      }

      if (!state.gameOver) {
        updateButtons();
      }
      render();
      if (state.gameOver) {
        isLoopRunning = false;
        rafId = 0;
        return;
      }
      rafId = requestAnimationFrame(frame);
    }

    function render() {
      ctx.clearRect(0, 0, W, H);
      drawGrid();
      drawMapDecor();
      drawPath();
      drawCore();
      drawBuildSpots();
      drawTowers();
      drawEnemies();
      drawProjectiles();
      drawHazards();
      drawMeteorEffects();
      drawParticles();
      drawPlacementGhost();
      drawMeteorMarker();
      drawPaused();
      drawGameOver();
    }

    syncTowerGridFromTypes();
    resetGame();
    startLoop();
  </script>
</body>
</html>
