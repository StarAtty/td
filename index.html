<html lang="en">
<head>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      --panel-border: rgba(116, 175, 255, 0.35);
      --accent: #31ffe6;
      --accent-2: #ffb347;
      --danger: #ff5d7d;
      --text: #e8f1ff;
      --muted: #9cb0cc;
      --good: #81f495;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Space Grotesk", system-ui, sans-serif;
      color: var(--text);
      background: #0f243a;
      display: flex;
      justify-content: center;
      padding: 8px;
    }

    .page {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .page-head {
      padding: 2px 2px 0;
    }

    .page-head,
    .hud,
    .under-canvas,
    .panel {
      display: none;
    }

    .shell {
      width: 100%;
      height: calc(100vh - 16px);
      display: grid;
      grid-template-columns: 1fr;
      gap: 0;
    }

    .game-wrap {
      overflow: hidden;
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.45), inset 0 0 24px rgba(49, 255, 230, 0.08);
      background: linear-gradient(160deg, rgba(11, 25, 43, 0.8), rgba(13, 29, 48, 0.95));
      display: flex;
      flex-direction: column;
      gap: 0;
      padding: max(6px, env(safe-area-inset-top)) max(6px, env(safe-area-inset-right)) max(6px, env(safe-area-inset-bottom)) max(6px, env(safe-area-inset-left));
      width: 100%;
      height: 100%;
      align-items: center;
      justify-content: center;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: linear-gradient(160deg, #0f243a, #101e2f 40%, #102237);
      touch-action: none;
    }

    .hud {
      display: flex;
      gap: 8px;
      flex-wrap: nowrap;
      align-items: center;
    }

    .chip {
      background: rgba(8, 20, 34, 0.8);
      border: 1px solid rgba(133, 180, 244, 0.35);
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      color: var(--muted);
    }

    .chip strong { color: var(--text); margin-left: 4px; }
    #gold { color: #ffd85a; }
    #health { color: #ff6a78; }

    .status-chip {
      margin-left: auto;
      text-align: right;
      max-width: 46%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #cde1ff;
      font-size: 12px;
      transition: opacity 260ms ease;
    }

    .pause-chip {
      border-radius: 999px;
      min-width: 38px;
      padding: 6px 10px;
      text-align: center;
      font-size: 16px;
      line-height: 1;
    }

    .panel {
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      background: var(--panel);
      backdrop-filter: blur(4px);
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    h1 {
      margin: 0;
      font-family: "Bungee", sans-serif;
      font-size: 22px;
      letter-spacing: 0.04em;
      color: var(--accent);
      text-shadow: 0 0 16px rgba(49, 255, 230, 0.32);
    }

    .sub {
      margin: 0;
      font-size: 13px;
      color: var(--muted);
    }

    .group-title {
      margin: 2px 0;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
    }

    .tower-grid {
      display: grid;
      gap: 8px;
    }

    .tower-option {
      display: flex;
      align-items: center;
      gap: 10px;
      text-align: left;
    }

    .tower-option.inactive {
      opacity: 0.45;
      cursor: not-allowed;
      border-color: rgba(149, 194, 255, 0.2);
    }

    .tower-option.inactive:hover {
      transform: none;
      border-color: rgba(149, 194, 255, 0.2);
      box-shadow: none;
    }

    .tower-art {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.28);
      flex: 0 0 28px;
    }

    .tower-art.frost { background: radial-gradient(circle at 35% 35%, #dce3ff, #7c8be8); }
    .tower-art.rail { background: radial-gradient(circle at 35% 35%, #ffc0c0, #d64f5d); }
    .tower-art.venom { background: radial-gradient(circle at 35% 35%, #c8ffd2, #35b151); }
    .tower-art.ember { background: radial-gradient(circle at 35% 35%, #ffd8a1, #de5f2e); }
    .tower-art.storm { background: radial-gradient(circle at 35% 35%, #d8f8ff, #4aa4dc); }
    .tower-art.mortar { background: radial-gradient(circle at 35% 35%, #f4efdd, #8e7d5e); }
    .tower-art.ion { background: radial-gradient(circle at 35% 35%, #dbfff2, #31ba9e); }
    .tower-art.scatter { background: radial-gradient(circle at 35% 35%, #ffe5f2, #d273b4); }

    .tower-copy {
      display: flex;
      flex-direction: column;
      gap: 1px;
      line-height: 1.25;
    }

    .tower-copy strong {
      font-size: 13px;
      color: var(--text);
    }

    .tower-copy span {
      font-size: 11px;
      color: var(--muted);
    }

    button {
      border: 1px solid rgba(149, 194, 255, 0.45);
      background: linear-gradient(180deg, rgba(17, 41, 68, 0.9), rgba(10, 27, 45, 0.9));
      border-radius: 11px;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      padding: 10px;
      cursor: pointer;
      text-align: left;
      transition: transform 0.18s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover:enabled {
      transform: translateY(-1px);
      border-color: var(--accent);
      box-shadow: 0 6px 14px rgba(49, 255, 230, 0.15);
    }

    button.active {
      border-color: var(--accent-2);
      box-shadow: inset 0 0 0 1px rgba(255, 179, 71, 0.55);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .actions {
      grid-template-columns: repeat(4, 1fr);
    }

    .icon-btn {
      text-align: center;
      font-size: 18px;
      padding: 9px 0;
      font-weight: 700;
    }

    .primary {
      text-align: center;
      background: linear-gradient(180deg, #1f5f94, #194673);
      border-color: rgba(125, 203, 255, 0.6);
      font-weight: 700;
    }

    .warn {
      background: linear-gradient(180deg, #653253, #49253b);
      border-color: rgba(255, 143, 181, 0.6);
    }

    .upgrade-btn {
      background: linear-gradient(180deg, #9a5a1d, #6f3f12);
      border-color: rgba(255, 185, 112, 0.7);
    }

    .sell-btn {
      background: linear-gradient(180deg, #a68f1f, #796713);
      border-color: rgba(255, 234, 129, 0.7);
    }

    .tip {
      margin-top: 2px;
      border-top: 1px dashed rgba(148, 193, 255, 0.35);
      padding-top: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.42;
    }

    .stats-card {
      border: 1px solid rgba(149, 194, 255, 0.3);
      background: rgba(9, 21, 35, 0.62);
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 11px;
      line-height: 1.28;
      color: #c9dbf5;
      min-height: 45px;
    }

    .upgrade-preview {
      color: #ffb765;
    }

    .under-canvas {
      margin-top: 8px;
      display: grid;
      grid-template-columns: 1fr 330px;
      gap: 8px;
      align-items: start;
    }

    .canvas-actions {
      margin-top: 0;
      min-height: 45px;
    }

    .pulse {
      animation: pulse 1.7s infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 rgba(255, 179, 71, 0); }

    @media (max-width: 960px) {
      .shell { grid-template-columns: 1fr; }
      .panel { order: -1; padding: 10px; }
      .tower-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        max-height: 42vh;
        overflow: auto;
      }
      .tower-option { min-height: 44px; }
      .hud { flex-wrap: wrap; }
      .status-chip { max-width: 100%; margin-left: 0; text-align: left; }
      .under-canvas { grid-template-columns: 1fr; }
      .actions .icon-btn { min-height: 44px; font-size: 20px; }
      .stats-card { min-height: 44px; }
    }
  </style>
</head>

    function resizeCanvas() {
      const wrap = canvas.parentElement;
      const inFullscreen = document.fullscreenElement === canvas;
      const availW = inFullscreen ? window.innerWidth : (wrap ? wrap.clientWidth : window.innerWidth);
      const availH = inFullscreen ? window.innerHeight : (wrap ? wrap.clientHeight : window.innerHeight);
      const aspect = 16 / 9;
      let cssW = availW;
      let cssH = availH;
      if (!inFullscreen) {
        if (cssW / cssH > aspect) {
          cssW = cssH * aspect;
        } else {
          cssH = cssW / aspect;
        }
      }
      dpr = window.devicePixelRatio || 1;
      canvas.style.width = `${cssW}px`;
      canvas.style.height = `${cssH}px`;
      canvas.width = Math.round(cssW * dpr);
      canvas.height = Math.round(cssH * dpr);
      scaleX = canvas.width / BASE_W;
      scaleY = canvas.height / BASE_H;
      ctx.imageSmoothingEnabled = true;
    }

    function pruneCloudValue(value, defaults = undefined) {
      if (Array.isArray(value)) {
        if (!value.length && Array.isArray(defaults) && !defaults.length) return undefined;
        return value.map((entry) => pruneCloudValue(entry));
      }
      if (!value || typeof value !== "object") {
        return defaults !== undefined && value === defaults ? undefined : value;
      }
      const out = {};
      for (const [key, inner] of Object.entries(value)) {
        const nextDefaults = defaults && typeof defaults === "object" && !Array.isArray(defaults) ? defaults[key] : undefined;
        const pruned = pruneCloudValue(inner, nextDefaults);
        if (pruned !== undefined) out[key] = pruned;
      }
      return Object.keys(out).length ? out : undefined;
    }

    function compactTowerForCloud(tower) {
      const base = towerTypes[tower.type] || {};
      const out = { type: tower.type, x: tower.x, y: tower.y };
      const defaults = { cooldown: 0.1, angle: -Math.PI / 2, level: 1, totalInvested: base.cost, shotCount: 0, upgradeFx: 0 };
      for (const key of CLOUD_TOWER_FIELDS) {
        if (tower[key] == null) continue;
        const defaultValue = defaults[key] ?? base[key];
        if (defaultValue !== undefined && tower[key] === defaultValue) continue;
        out[key] = tower[key];
      }
      return out;
    }

    function restoreTowerFromCloud(tower) {
      const base = towerTypes[tower.type] || {};
      return {
        cooldown: 0.1,
        angle: -Math.PI / 2,
        level: 1,
        totalInvested: base.cost,
        ...base,
        ...tower
      };
    }

    function compactProjectileForCloud(projectile) {
      const out = {};
      for (const key of CLOUD_PROJECTILE_FIELDS) {
        if (projectile[key] == null) continue;
        if (key === "color" && projectile[key] === towerTypes[projectile.type]?.color) continue;
        if (key === "hitRadius" && projectile[key] === getProjectileHitRadius({ type: projectile.type, splash: projectile.splash || 0 })) continue;
        out[key] = projectile[key];
      }
      return out;
    }

    function restoreProjectileFromCloud(projectile) {
      return {
        ...projectile,
        color: projectile.color ?? towerTypes[projectile.type]?.color
      };
    }

    function remapCloudValue(value) {
      if (Array.isArray(value)) return value.map(remapCloudValue);
      if (!value || typeof value !== "object") return value;
      const out = {};
      for (const [key, inner] of Object.entries(value)) {
        out[CLOUD_KEY_MAP[key] || key] = remapCloudValue(inner);
      }
      return out;
    }

    function restoreCloudValue(value) {
      if (Array.isArray(value)) return value.map(restoreCloudValue);
      if (!value || typeof value !== "object") return value;
      const out = {};
      for (const [key, inner] of Object.entries(value)) {
        out[CLOUD_KEY_MAP_REVERSE[key] || key] = restoreCloudValue(inner);
      }
      return out;
    }

    let state = null;
    let isLoopRunning = false;

    function getUiLayout() {
      const topBarH = 30;
      const sideW = 212;
      const bottomH = 58;
      const pad = 6;
      return {
        topBarH,
        sideW,
        bottomH,
        pad,
        buildX: W - sideW + pad,
        buildY: topBarH + pad,
        buildW: sideW - pad * 2,
        buildH: H - topBarH - bottomH - pad * 2,
        actionsY: H - bottomH + 4,
        actionsH: bottomH - 12
      };
    }

    function getWorldTransform() {
      const layout = getUiLayout();
      const playX = 0;
      const playY = layout.topBarH;
      const playW = W - layout.sideW;
      const playH = H - layout.bottomH - layout.topBarH;
      const scale = Math.min(playW / BASE_W, playH / BASE_H);
      const ox = playX + (playW - BASE_W * scale) / 2;
      const oy = playY + (playH - BASE_H * scale) / 2;
      return { scale, ox, oy, playX, playY, playW, playH };
    }

    function screenToWorld(sx, sy) {
      const wt = state?.worldTransform || getWorldTransform();
      const inside = sx >= wt.playX && sx <= wt.playX + wt.playW && sy >= wt.playY && sy <= wt.playY + wt.playH;
      return {
        x: (sx - wt.ox) / wt.scale,
        y: (sy - wt.oy) / wt.scale,
        inside
      };
    }

    function bytesToBase64Url(bytes) {
      let binary = "";
      for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
      return btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
    }

    function base64UrlToBytes(text) {
      const normalized = text.replace(/-/g, "+").replace(/_/g, "/");
      const padded = normalized + "=".repeat((4 - (normalized.length % 4 || 4)) % 4);
      const binary = atob(padded);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return bytes;
    }

    function encodeCloudSave(payload) {
      try {
        const compactState = {
          ...payload.state,
          towers: payload.state.towers.map(compactTowerForCloud),
          projectiles: payload.state.projectiles.map(compactProjectileForCloud)
        };
        const prunedState = pruneCloudValue(compactState, CLOUD_STATE_DEFAULTS) || {};
        const compactPayload = { v: payload.version, s: remapCloudValue(prunedState) };
        const json = JSON.stringify(compactPayload);
        const encoded = bytesToBase64Url(new TextEncoder().encode(json));
        return `TD1-${encoded}`;
      } catch (err) {
        return "";
      }
    }

    function buildCloudSaveLink(code) {
      try {
        const url = new URL(window.location.href);
        url.searchParams.set("cloudSave", code);
        url.hash = "";
        return url.toString();
      } catch (err) {
        return code;
      }
    }

    function extractCloudSaveCode(input) {
      if (!input || typeof input !== "string") return "";
      const trimmed = input.trim();
      if (/^TD[12][-.]/.test(trimmed)) return trimmed;
      try {
        const url = new URL(trimmed);
        return url.searchParams.get("cloudSave") || "";
      } catch (err) {
        return "";
      }
    }

    async function decompressBytes(bytes) {
      if (typeof DecompressionStream === "undefined") return null;
      const ds = new DecompressionStream("deflate-raw");
      const writer = ds.writable.getWriter();
      await writer.write(bytes);
      await writer.close();
      return new TextDecoder().decode(await new Response(ds.readable).arrayBuffer());
    }

    async function decodeCloudSave(code) {
      if (!code || typeof code !== "string") return null;
      const trimmed = code.trim();
      try {
        if (trimmed.startsWith("TD2-")) {
          const json = await decompressBytes(base64UrlToBytes(trimmed.slice(4)));
          if (!json) return null;
          const payload = JSON.parse(json);
          const restored = restoreCloudValue(payload.s);
          return {
            version: payload.v,
            state: {
              ...CLOUD_STATE_DEFAULTS,
              ...restored,
              towers: (restored.towers || []).map(restoreTowerFromCloud),
              projectiles: (restored.projectiles || []).map(restoreProjectileFromCloud)
            }
          };
        }
        if (trimmed.startsWith("TD1-")) {
          const json = new TextDecoder().decode(base64UrlToBytes(trimmed.slice(4)));
          const payload = JSON.parse(json);
          if (payload.v == null) return payload;
          const restored = restoreCloudValue(payload.s);
          return {
            version: payload.v,
            state: {
              ...CLOUD_STATE_DEFAULTS,
              ...restored,
              towers: (restored.towers || []).map(restoreTowerFromCloud),
              projectiles: (restored.projectiles || []).map(restoreProjectileFromCloud)
            }
          };
        }
        if (trimmed.startsWith("TD1.")) {
          const json = decodeURIComponent(escape(atob(trimmed.slice(4))));
          return JSON.parse(json);
        }
      } catch (err) {
        return null;
      }
      return null;
    }

    function exportCloudSave() {
      const payload = buildSavePayload();
      const code = encodeCloudSave(payload);
      if (!code) {
        state.message = "Cloud save failed.";
        state.messageAt = Date.now();
        updateButtons();
        return;
      }
      const cloudLink = buildCloudSaveLink(code);
      try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(cloudLink).then(() => {
            state.message = "Cloud save link copied.";
            state.messageAt = Date.now();
            updateButtons();
          }).catch(() => {
            window.prompt("Copy cloud save link", cloudLink);
            state.message = "Cloud save link ready.";
            state.messageAt = Date.now();
            updateButtons();
          });
          return;
        } else {
          window.prompt("Copy cloud save link", cloudLink);
          state.message = "Cloud save link ready.";
        }
      } catch (err) {
        window.prompt("Copy cloud save link", cloudLink);
        state.message = "Cloud save link ready.";
      }
      state.messageAt = Date.now();
      updateButtons();
    }

    async function importCloudSave() {
      const input = window.prompt("Paste cloud save code or link");
      if (!input) return;
      const code = extractCloudSaveCode(input);
      if (!code) {
        state.message = "Cloud save invalid.";
        state.messageAt = Date.now();
        updateButtons();
        return;
      }
      const payload = await decodeCloudSave(code);
      if (!payload || !applySavePayload(payload)) {
        state.message = "Cloud save invalid.";
        state.messageAt = Date.now();
        updateButtons();
        return;
      }
      if (!isLoopRunning) startLoop();
    }

    async function tryAutoLoadCloudSaveFromUrl() {
      let code = "";
      try {
        code = new URL(window.location.href).searchParams.get("cloudSave") || "";
      } catch (err) {
        return false;
      }
      if (!code) return false;
      const payload = await decodeCloudSave(code);
      if (!payload || !applySavePayload(payload)) {
        state.message = "Cloud save link invalid.";
        state.messageAt = Date.now();
        updateButtons();
        return false;
      }
      try {
        const url = new URL(window.location.href);
        url.searchParams.delete("cloudSave");
        window.history.replaceState({}, "", url.toString());
      } catch (err) {
        // Ignore URL cleanup issues; the loaded game is what matters.
      }
      state.message = "Cloud save loaded.";
      state.messageAt = Date.now();
      updateButtons();
      return true;
    }

    function rebuildWaveStatus(loaded) {
      if (loaded.waveStatus && Object.keys(loaded.waveStatus).length > 0) {
        return clonePlainData(loaded.waveStatus);
      }
      const restored = {};
      for (let wave = 1; wave <= (loaded.clearedWave || 0); wave++) {
        restored[String(wave)] = { remaining: 0, rewarded: true };
      }
      for (const enemy of loaded.enemies || []) {
        const wave = String(enemy.spawnWave || loaded.wave || 0);
        if (!restored[wave]) restored[wave] = { remaining: 0, rewarded: false };
        restored[wave].remaining += 1;
      }
      if (loaded.waveInProgress && (loaded.toSpawn || 0) > 0) {
        const wave = String(loaded.wave || 0);
        if (!restored[wave]) restored[wave] = { remaining: 0, rewarded: false };
        restored[wave].remaining += loaded.toSpawn;
      }
      return restored;
    }

    function applySavePayload(payload) {
      if (!payload || payload.version !== 1 || !payload.state) return false;
      const loaded = payload.state;
      const now = Date.now();
      const savedMeteorCooldownMs = Number.isFinite(loaded.meteorCooldownMs) ? Math.max(0, loaded.meteorCooldownMs) : null;
      const savedMeteorReadyAt = Number.isFinite(loaded.meteorReadyAt) ? loaded.meteorReadyAt : 0;
      resetGame();
      state = {
        ...state,
        ...loaded,
        towers: (loaded.towers || []).map((t) => ({ ...t })),
        enemies: (loaded.enemies || []).map((e) => ({ ...e })),
        projectiles: (loaded.projectiles || []).map((p) => ({ ...p })),
        particles: (loaded.particles || []).map((p) => ({ ...p })),
        hazards: (loaded.hazards || []).map((h) => ({ ...h })),
        meteorEffects: (loaded.meteorEffects || []).map((fx) => ({ ...fx })),
        waveStatus: rebuildWaveStatus(loaded),
        selectionLines: [],
        hoverBuild: null
      };
      const towerIndex = Number.isInteger(loaded.selectedTowerIndex) ? loaded.selectedTowerIndex : -1;
      const enemyIndex = Number.isInteger(loaded.selectedEnemyIndex) ? loaded.selectedEnemyIndex : -1;
      state.meteorReadyAt = savedMeteorCooldownMs !== null
        ? now + savedMeteorCooldownMs
        : savedMeteorReadyAt > now
        ? savedMeteorReadyAt
        : 0;
      state.selectedTower = towerIndex >= 0 && towerIndex < state.towers.length ? state.towers[towerIndex] : null;
      state.selectedEnemy = enemyIndex >= 0 && enemyIndex < state.enemies.length ? state.enemies[enemyIndex] : null;
      if (state.screen !== "play" && state.screen !== "start") state.screen = "play";
      if (state.screen === "start") state.paused = false;
      state.pauseStartedAt = state.paused ? Date.now() : 0;
      state.message = "Game loaded.";
      state.messageAt = Date.now();
      updateHUD();
      updateButtons();
      updateSelectionStats();
      return true;
    }

    function loadGameFromSlot(slot) {
      try {
        const raw = localStorage.getItem(getSlotKey(slot));
        if (!raw) {
          state.message = `Slot ${slot} empty.`;
          state.messageAt = Date.now();
          updateButtons();
          return;
        }
        const payload = JSON.parse(raw);
        if (!applySavePayload(payload)) {
          state.message = "Save corrupted.";
          state.messageAt = Date.now();
          updateButtons();
          return;
        }
        if (!isLoopRunning) startLoop();
      } catch (err) {
        state.message = "Load failed.";
        state.messageAt = Date.now();
        updateButtons();
      }
    }

    function openSlotMenu(mode) {

      state.menuFrom = state.screen;
      state.pendingSlot = null;

    function closeSlotMenu() {
      state.menuMode = null;
      state.menuFrom = null;

    function openEncyclopedia(tab = "towers", key = null) {
      state.menuMode = "encyclopedia";
      state.menuFrom = state.screen;
      state.encyclopediaTab = tab;
      state.encyclopediaKey = key || (tab === "enemies" ? "basic" : towerOrder[0]);
      state.encyclopediaTowerLevel = Math.max(1, Math.min(10, state.encyclopediaTowerLevel || 1));
      const initialEnemyWave = ENEMY_FIRST_WAVE[state.encyclopediaKey] || 1;
      state.encyclopediaEnemyWave = Math.max(1, Math.min(999, tab === "enemies" ? initialEnemyWave : (state.encyclopediaEnemyWave || 1)));

    function getTowerEncyclopediaEntries() {
      return towerOrder.map((type) => ({ key: type, type: "tower", ...towerTypes[type] }));
    }

    function getEnemyEncyclopediaEntries() {
      const wave = Math.max(1, Math.min(999, state.encyclopediaEnemyWave || 1));
      return Object.entries(enemyCatalog).map(([key, info]) => {
        const enemy = newEnemy(key, key === "finalBoss" ? Math.max(100, wave) : wave);
        return { key, type: "enemy", ...info, ...enemy };
      });

    function enemyAppearsInWave(kind, wave) {
      if (wave < 1) return false;
      const total = getWaveEnemyCount(wave);
      for (let i = 0; i < total; i++) {
        if (pickEnemyType(wave, i) === kind) return true;
      }
      return false;
    }

    function getEnemyPreviewWaves(kind, maxWave = 999) {
      const waves = [];
      const start = ENEMY_FIRST_WAVE[kind] || 1;
      for (let wave = start; wave <= maxWave; wave++) {
        if (enemyAppearsInWave(kind, wave)) waves.push(wave);
      }
      return waves;
    }

    function getTowerPreviewAtLevel(type, level) {
      const base = towerTypes[type];
      if (!base) return null;
      const tower = {
        type,
        cooldown: 0.1,
        angle: -Math.PI / 2,
        level: 1,
        totalInvested: base.cost,
        shotCount: 0,
        ...base
      };
      const cappedLevel = Math.max(1, Math.min(10, level || 1));
      while (tower.level < cappedLevel) {
        const upgradeCost = getUpgradeCost(tower);
        tower.totalInvested = (tower.totalInvested || tower.cost) + upgradeCost;
        const next = computeNextStats(tower);
        tower.level = next.level;
        tower.damage = next.damage;
        if (tower.splash != null) tower.splash = next.splash;
        tower.range = next.range;
        tower.fireRate = next.fireRate;
        tower.projectileSpeed = next.projectileSpeed;
        if (tower.slow != null) tower.slow = next.slow;
        if (tower.slowTime != null) tower.slowTime = next.slowTime;
        if (tower.poisonDps != null) tower.poisonDps = next.poisonDps;
        if (tower.poisonTime != null) tower.poisonTime = next.poisonTime;
        if (tower.burningDps != null) tower.burningDps = next.burningDps;
        if (tower.burningTime != null) tower.burningTime = next.burningTime;
        if (tower.ionMarkAmp != null) tower.ionMarkAmp = next.ionMarkAmp;
        if (tower.ionMarkTime != null) tower.ionMarkTime = next.ionMarkTime;
        if (tower.pellets != null) tower.pellets = next.pellets;
        if (tower.chainTargets != null) tower.chainTargets = next.chainTargets;
        if (tower.burstPierce != null) tower.burstPierce = next.burstPierce;
      }
      return tower;
    }

    function getEncyclopediaTowerDetailRows(towerPreview, nextPreview) {
      if (!towerPreview) return [];
      const rows = [
        { label: "Total Cost", value: `${towerPreview.totalInvested || towerPreview.cost}`, nextValue: nextPreview ? `${nextPreview.totalInvested || nextPreview.cost}` : null, decimals: 0 },
        { label: "Damage", value: towerPreview.damage, nextValue: nextPreview ? nextPreview.damage : null, decimals: 0 },
        { label: "DPS", value: towerPreview.damage / towerPreview.fireRate, nextValue: nextPreview ? (nextPreview.damage / nextPreview.fireRate) : null, decimals: 1 },
        { label: "Range", value: towerPreview.range, nextValue: nextPreview ? nextPreview.range : null, decimals: 0 },
        { label: "Rate", value: 1 / towerPreview.fireRate, nextValue: nextPreview ? (1 / nextPreview.fireRate) : null, decimals: 2, suffix: "/s" }
      ];
      if (towerPreview.splash) rows.push({ label: "Splash", value: towerPreview.splash, nextValue: nextPreview ? nextPreview.splash : null, decimals: 0 });
      if (towerPreview.slow) rows.push({ label: "Slow", value: 100 - towerPreview.slow * 100, nextValue: nextPreview ? (100 - nextPreview.slow * 100) : null, decimals: 0, suffix: "%" });
      if (towerPreview.slowTime) rows.push({ label: "Slow Time", value: towerPreview.slowTime, nextValue: nextPreview ? nextPreview.slowTime : null, decimals: 2, suffix: "s" });
      if (towerPreview.poisonDps) rows.push({ label: towerPreview.dotLabel || "Poison", value: towerPreview.poisonDps, nextValue: nextPreview ? nextPreview.poisonDps : null, decimals: 0, suffix: "/s" });
      if (towerPreview.poisonTime) rows.push({ label: `${towerPreview.dotLabel || "Poison"} Time`, value: towerPreview.poisonTime, nextValue: nextPreview ? nextPreview.poisonTime : null, decimals: 2, suffix: "s" });
      if (towerPreview.burningDps) rows.push({ label: "Burning", value: towerPreview.burningDps, nextValue: nextPreview ? nextPreview.burningDps : null, decimals: 0, suffix: "/s" });
      if (towerPreview.burningTime) rows.push({ label: "Burn Time", value: towerPreview.burningTime, nextValue: nextPreview ? nextPreview.burningTime : null, decimals: 2, suffix: "s" });
      if (towerPreview.chainTargets) rows.push({ label: "Chain", value: towerPreview.chainTargets, nextValue: nextPreview ? nextPreview.chainTargets : null, decimals: 0, prefix: "x" });
      if (towerPreview.ionMarkAmp) rows.push({ label: "Mark", value: (towerPreview.ionMarkAmp - 1) * 100, nextValue: nextPreview ? ((nextPreview.ionMarkAmp - 1) * 100) : null, decimals: 0, suffix: "%" });
      if (towerPreview.ionMarkTime) rows.push({ label: "Mark Time", value: towerPreview.ionMarkTime, nextValue: nextPreview ? nextPreview.ionMarkTime : null, decimals: 2, suffix: "s" });
      if (towerPreview.burstPierce) rows.push({ label: "Burst Pierce", value: towerPreview.burstPierce, nextValue: nextPreview ? nextPreview.burstPierce : null, decimals: 0 });
      if (towerPreview.pellets) rows.push({ label: "Projectiles", value: towerPreview.pellets, nextValue: nextPreview ? nextPreview.pellets : null, decimals: 0 });
      return rows;
    }

    function formatEncyclopediaRowValue(row, value) {
      const decimals = row.decimals || 0;
      const text = decimals > 0 ? Number(value).toFixed(decimals) : `${Math.round(value)}`;
      return `${row.prefix || ""}${text}${row.suffix || ""}`;
    }

    function formatEncyclopediaRowDelta(row) {
      if (row.nextValue == null) return "";
      const delta = row.nextValue - row.value;
      if (Math.abs(delta) < 0.0001) return "";
      const decimals = row.decimals || 0;
      const text = decimals > 0 ? delta.toFixed(decimals) : `${Math.round(delta)}`;
      return `+${row.prefix || ""}${text}${row.suffix || ""}`;
    }

    function drawWrappedText(text, x, y, maxWidth, lineHeight, maxLines = Infinity) {
      const words = String(text || "").split(/\s+/).filter(Boolean);
      const lines = [];
      let line = "";
      for (const word of words) {
        const test = line ? `${line} ${word}` : word;
        if (ctx.measureText(test).width <= maxWidth || !line) {
          line = test;
        } else {
          lines.push(line);
          line = word;
          if (lines.length >= maxLines) break;
        }
      }
      if (line && lines.length < maxLines) lines.push(line);
      for (let i = 0; i < lines.length; i++) {
        ctx.fillText(lines[i], x, y + i * lineHeight);
      }
      return lines.length;
    }

    function updateHUD() {
      return;
    }

    function updateButtons() {
      if (state.message !== lastStatusMessage) {
        lastStatusMessage = state.message;
        state.messageAt = Date.now();
      }
      sellBtn.disabled = state.paused || !state.selectedTower || state.gameOver || state.victory;
      const upgradeCostNow = state.selectedTower ? getUpgradeCost(state.selectedTower) : Infinity;
      upgradeBtn.disabled = state.paused || !state.selectedTower || state.gameOver || state.victory || state.gold < upgradeCostNow || (state.selectedTower && state.selectedTower.level >= 10);
      startWaveBtn.disabled = state.screen !== "play" || state.paused || state.waveInProgress || state.gameOver || state.victory || state.nextWaveDisabled;
      const secs = state.nextWaveDisabled ? "--" : Math.max(0, Math.ceil(state.nextWaveTimer));
      startWaveBtn.textContent = `▶${secs}s`;
      startWaveBtn.title = state.nextWaveDisabled
        ? "Next wave locked"
        : state.waveInProgress
        ? `Next wave in ${secs}s (Space/N)`
        : `Call Wave (${secs}s) (Space/N)`;
      pauseBtn.disabled = false;
      pauseBtn.textContent = (state.gameOver || state.victory) ? "↻" : (state.paused ? "▶" : "⏸");
      pauseBtn.title = (state.gameOver || state.victory) ? "Restart (P)" : (state.paused ? "Resume (P)" : "Pause (P)");
      const meteorCooldownMs = getMeteorCooldownMs();
      const meteorOnCooldown = meteorCooldownMs > 0;
      meteorBtn.disabled = state.paused || state.gameOver || state.victory || (meteorOnCooldown && !state.aimingMeteor);
      if (state.aimingMeteor) {
        meteorBtn.textContent = "✕";
      } else if (meteorOnCooldown) {
        meteorBtn.textContent = `☄${Math.ceil(meteorCooldownMs / 1000)}s`;
      } else {
        meteorBtn.textContent = "☄";
      }
      const meteorDamageNow = state.meteorDamage || METEOR_DAMAGE;
      meteorBtn.title = state.aimingMeteor
        ? "Cancel Meteor (Esc/M)"
        : `Meteor (M) DMG ${meteorDamageNow} R${METEOR_RADIUS} CD ${METEOR_CD_MS / 1000}s`;
      if (state.selectedTower) {
        const c = getUpgradeCost(state.selectedTower);
        upgradeBtn.title = state.selectedTower.level >= 10 ? "Max level reached" : `Upgrade (U) Lv.${state.selectedTower.level} ($${c})`;
        upgradeBtn.textContent = state.selectedTower.level >= 10 ? "MAX" : `⇧${c}`;
        const invested = state.selectedTower.totalInvested || state.selectedTower.cost;
        sellBtn.textContent = `$${Math.floor(invested * 0.7)}`;
        sellBtn.title = "Sell Selected (V)";
      } else {
        upgradeBtn.title = "Upgrade Selected (U)";
        upgradeBtn.textContent = "⇧";
        sellBtn.textContent = "$";
        sellBtn.title = "Sell Selected (V)";
      }
      updateSelectionStats();
    }

    function toggleAutoStartWave() {
      state.autoStartWave = !state.autoStartWave;
      state.message = state.autoStartWave ? "Auto wave enabled." : "Auto wave disabled.";
      state.messageAt = Date.now();
      updateButtons();
    }

    function toggleAutoUpgradeTower() {
      state.autoUpgradeTower = !state.autoUpgradeTower;
      state.message = state.autoUpgradeTower ? "Auto upgrade enabled." : "Auto upgrade disabled.";
      state.messageAt = Date.now();
      updateButtons();
    }

    function computeNextStats(t) {
      const earlyBoost = t.level < 5 ? (1.1 - t.level * 0.035) : 1;
      const nextLevel = t.level + 1;
      const minFireRate = t.type === "scatter" ? 0.05 : 0.1;
      const baseTower = towerTypes[t.type] || t;
      let fireRate = Math.max(minFireRate, t.fireRate * (0.895 - (earlyBoost - 1) * 0.12));
      if (t.type === "dart" && nextLevel >= 6) {
        fireRate = Math.max(0.12, fireRate * 0.93);
      } else if (t.type === "scatter") {
        fireRate = Math.max(minFireRate, fireRate * 0.94);
      } else if (t.type === "rail") {
        fireRate = Math.max(0.12, fireRate * 0.94);
      } else if (t.type === "mortar") {
        fireRate = Math.max(0.12, fireRate * 0.96);
      }

      const baseDps = baseTower.damage / Math.max(0.0001, baseTower.fireRate);
      const targetDps = baseDps * getUpgradeDpsMultiplier(nextLevel);
      const targetDamage = targetDps * fireRate;
      const minimumUpgradeDamage = t.damage * 1.02 + 1;
      const damage = Math.max(targetDamage, minimumUpgradeDamage);
      const splash = t.splash ? t.splash + (t.type === "mortar" ? 2 : 1.5) : 0;

      const range = t.range + 2 + (earlyBoost - 0.95) * 9;
      const projectileSpeed = t.projectileSpeed * (1.05 + (earlyBoost - 1) * 0.035);
      const slow = t.slow ? Math.max(0.35, t.slow - 0.04) : 0;
      const slowTime = t.slowTime ? t.slowTime + 0.12 : 0;
      const poisonDps = t.poisonDps ? t.poisonDps * (t.type === "venom" ? 1.54 : 1.22) : 0;
      const poisonTime = t.poisonTime ? t.poisonTime + 0.2 : 0;
      const burningDps = t.burningDps ? t.burningDps * (t.type === "ember" ? 1.5 : 1.22) : 0;
      const burningTime = t.burningTime ? t.burningTime + (t.type === "ember" ? 0.35 : 0.22) : 0;
      const markStep = t.type === "ion" ? 0.05 : 0.02;
      const ionMarkAmp = t.ionMarkAmp ? t.ionMarkAmp + markStep : 0;
      const ionMarkTime = t.ionMarkTime ? t.ionMarkTime + 0.15 : 0;
      const pellets = t.pellets ? (t.type === "scatter" && nextLevel % 5 === 0 ? t.pellets + 1 : t.pellets) : 0;
      const chainTargets = t.chainTargets ? (t.type === "storm" && nextLevel % 5 === 0 ? t.chainTargets + 1 : t.chainTargets) : 0;
      const burstPierce = t.burstPierce ? (t.type === "rail" && nextLevel % 5 === 0 ? t.burstPierce + 1 : t.burstPierce) : 0;

      return {
        level: nextLevel,
        damage,
        splash,
        fireRate,
        range,
        projectileSpeed,
        slow,
        slowTime,
        poisonDps,
        poisonTime,
        burningDps,
        burningTime,
        ionMarkAmp,
        ionMarkTime,
        pellets,
        chainTargets,
        burstPierce
      };
    }

    function getProjectedUpgrade(t) {
      const next = computeNextStats(t);
      const nextDamage = Math.round(next.damage);
      const nextSplash = next.splash ? Math.round(next.splash) : 0;
      return {
        level: next.level,
        damage: nextDamage,
        range: Math.round(next.range),
        rate: (1 / next.fireRate).toFixed(2),
        dps: (next.damage / next.fireRate).toFixed(1),
        splash: nextSplash,
        slow: t.slow ? next.slow : 0,
        poison: t.poisonDps ? Math.round(next.poisonDps) : 0,
        burning: t.burningDps ? Math.round(next.burningDps) : 0,
        chain: t.chainTargets ? next.chainTargets : 0,
        markAmp: t.ionMarkAmp ? `${Math.round(next.ionMarkAmp * 100)}%` : "",
        burstPierce: t.burstPierce ? next.burstPierce : 0,
        pellets: t.pellets ? next.pellets : 0
      };
    }

    function getTowerStatSuffix(t) {
      let extra = "";
      if (t.splash) extra += ` | Splash ${Math.round(t.splash)}`;
      if (t.slow) extra += ` | Slow ${(100 - t.slow * 100).toFixed(0)}%`;
      if (t.poisonDps) extra += ` | ${t.dotLabel || "Poison"} ${Math.round(t.poisonDps)}/s`;
      if (t.burningDps) extra += ` | Burning ${Math.round(t.burningDps)}/s`;
      if (t.pellets) extra += ` | Projectiles ${t.pellets}`;
      if (t.chainTargets) extra += ` | Chain x${t.chainTargets}`;
      if (t.ionMarkAmp) extra += ` | Mark +${Math.round((t.ionMarkAmp - 1) * 100)}%`;
      if (t.burstPierce) extra += ` | Burst Pierce ${t.burstPierce}`;
      return extra;
    }

    function getProjectedStatSuffix(baseTower, next) {
      let nextExtra = "";
      if (next.splash) nextExtra += ` | Splash ${next.splash}`;
      if (next.slow) nextExtra += ` | Slow ${(100 - next.slow * 100).toFixed(0)}%`;
      if (next.poison) nextExtra += ` | ${baseTower.dotLabel || "Poison"} ${next.poison}/s`;
      if (next.burning) nextExtra += ` | Burning ${next.burning}/s`;
      if (next.pellets) nextExtra += ` | Projectiles ${next.pellets}`;
      if (next.chain) nextExtra += ` | Chain x${next.chain}`;
      if (next.markAmp) nextExtra += ` | Mark +${Math.round(Number.parseInt(next.markAmp, 10) - 100)}%`;
      if (next.burstPierce) nextExtra += ` | Burst Pierce ${next.burstPierce}`;
      return nextExtra;
    }

    function updateSelectionStats() {
      if (state.selectedEnemy && !state.enemies.includes(state.selectedEnemy)) {
        state.selectedEnemy = null;
      }

      if (state.statsMode === "meteor") {
        const cd = Math.ceil(getMeteorCooldownMs() / 1000);
        const meteorDamageNow = state.meteorDamage || METEOR_DAMAGE;
        setSelectionLines([
          { text: `METEOR | DMG ${meteorDamageNow} | Radius ${METEOR_RADIUS}`, tone: "base" },
          { text: `Cooldown ${cd}s`, tone: "upgrade" }
        ]);
        return;
      }

      if (state.selectedTower) {
        const t = state.selectedTower;
        const shotsPerSec = (1 / t.fireRate).toFixed(2);
        const dps = (t.damage / t.fireRate).toFixed(1);
        const extra = getTowerStatSuffix(t);
        const next = getProjectedUpgrade(t);
        const nextExtra = getProjectedStatSuffix(t, next);
        if (t.level >= 10) {
          setSelectionLines([
            { text: `${t.name} Lv.${t.level} | DMG ${Math.round(t.damage)} | DPS ${dps} | Range ${Math.round(t.range)} | Rate ${shotsPerSec}/s${extra}`, tone: "base" },
            { text: "Max level reached.", tone: "upgrade" }
          ]);
        } else {
          setSelectionLines([
            { text: `${t.name} Lv.${t.level} | DMG ${Math.round(t.damage)} | DPS ${dps} | Range ${Math.round(t.range)} | Rate ${shotsPerSec}/s${extra}`, tone: "base" },
            { text: `Next Lv.${next.level} | DMG ${next.damage} | DPS ${next.dps} | Range ${next.range} | Rate ${next.rate}/s${nextExtra}`, tone: "upgrade" }
          ]);
        }
        return;
      }

      const hoverBuild = state.hoverBuild || state.selectedBuild;
      if (hoverBuild && towerTypes[hoverBuild]) {
        const base = towerTypes[hoverBuild];
        const t = {
          type: hoverBuild,
          cooldown: 0.1,
          angle: -Math.PI / 2,
          level: 1,
          totalInvested: base.cost,
          ...base
        };
        const shotsPerSec = (1 / t.fireRate).toFixed(2);
        const dps = (t.damage / t.fireRate).toFixed(1);
        const next = getProjectedUpgrade(t);
        const extra = getTowerStatSuffix(t);
        const nextExtra = getProjectedStatSuffix(t, next);
        setSelectionLines([
          { text: `${t.name} ($${t.cost}) | DMG ${Math.round(t.damage)} | DPS ${dps} | Range ${Math.round(t.range)} | Rate ${shotsPerSec}/s${extra}`, tone: "base" },
          { text: `Next Lv.${next.level} | DMG ${next.damage} | DPS ${next.dps} | Range ${next.range} | Rate ${next.rate}/s${nextExtra}`, tone: "upgrade" }
        ]);
        return;
      }

      if (state.selectedEnemy) {
        const e = state.selectedEnemy;
        let extra = "";
        if (e.armor) {
          extra += ` | Armor ${Math.round(e.armor * 100)}%`;
        }
        if (e.coreDamage && e.coreDamage > 1) extra += ` | Core DMG ${e.coreDamage}`;
        const enemyName = enemyCatalog[e.kind]?.name || e.kind.toUpperCase();
        setSelectionLines([
          { text: `${enemyName} | HP ${Math.max(0, Math.round(e.hp))}/${e.maxHp} | SPD ${Math.round(e.speed)} | Bounty ${e.reward}${extra}`, tone: "base" }
        ]);
        return;
      }

      setSelectionLines([]);
    }

    function getHpScale(wave) {
      const baseScale = (1.8 + wave * 0.48) * (1 + wave * 0.022);
      const midBoost = wave > 10 ? 1 + (wave - 10) * 0.013 : 1;
      const lateBoost = wave > 50 ? 1.003 : 1;
      return baseScale * midBoost * lateBoost;
    }

    function getWaveEnemyCount(wave) {
      const cap = 30 + Math.floor(wave / 10);
      return Math.min(cap, 11 + wave * 2);
    }

    function newEnemy(kind, wave) {
      const hpScale = getHpScale(wave);
      const speedScale = 1 + wave * 0.01;
      const post100RewardBoost = wave > 100 ? 1 + (wave - 100) * 0.01 : 1;
      const rewardScale = (1 + wave * 0.03) * post100RewardBoost;
      const base = {
        p: 0,
        seg: 0,
        x: path[0].x,
        y: path[0].y,
        spawnWave: wave,
        slowFactor: 1,
        slowTimer: 0,
        poisonDps: 0,
        poisonTimer: 0,
        burningDps: 0,
        burningTimer: 0,
        damageAmp: 1,
        damageAmpTimer: 0,
        damageAmpColor: "#f58cff"
      };
      if (kind === "swarm") {
        const maxHp = Math.round(75 * hpScale);
        return { ...base, kind, hp: maxHp, maxHp, speed: 126 * speedScale, reward: Math.round(5 * rewardScale), color: "#fff37a", r: 8 };
      }
      if (kind === "fast") {
        const maxHp = Math.round(120 * hpScale);
        return { ...base, kind, hp: maxHp, maxHp, speed: 104 * speedScale, reward: Math.round(7 * rewardScale), color: "#f4d35e", r: 10 };
      }
      if (kind === "armored") {
        const maxHp = Math.round(188 * hpScale);
        const armor = 0.28;
        return { ...base, kind, hp: maxHp, maxHp, speed: 51 * speedScale, reward: Math.round(18 * rewardScale), color: "#9bb5c9", r: 14, armor };
      }
      if (kind === "striker") {
        const maxHp = Math.round(120 * hpScale);
        const armor = 0.08;
        return { ...base, kind, hp: maxHp, maxHp, speed: 90 * speedScale, reward: Math.round(10 * rewardScale), color: "#ffb778", r: 11, armor };
      }
      if (kind === "bulwark") {
        const maxHp = Math.round(270 * hpScale);
        const armor = 0.36;
        return { ...base, kind, hp: maxHp, maxHp, speed: 45 * speedScale, reward: Math.round(22 * rewardScale), color: "#8aa0b8", r: 16, armor };
      }
      if (kind === "tank") {
        const maxHp = Math.round(225 * hpScale);
        const armor = 0.2;
        return { ...base, kind, hp: maxHp, maxHp, speed: 48 * speedScale, reward: Math.round(16 * rewardScale), color: "#f16f8a", r: 15, armor };
      }
      if (kind === "leech") {
        const maxHp = Math.round(180 * hpScale);
        const armor = 0.04;
        return { ...base, kind, hp: maxHp, maxHp, speed: 70 * speedScale, reward: Math.round(14 * rewardScale), color: "#73ffd4", r: 11, armor };
      }
      if (kind === "boss") {
        const maxHp = Math.round(532 * hpScale);
        const armor = 0.5;
        return { ...base, kind, hp: maxHp, maxHp, speed: 42 * speedScale, reward: Math.round(45 * rewardScale), color: "#c972ff", r: 18, armor, coreDamage: 3 };
      }
      if (kind === "finalBoss") {
        const phaseScale = 1 + Math.floor(wave / 100) * 0.35;
        const maxHp = Math.round(2500 * hpScale * phaseScale);
        const armor = 0.68;
        return { ...base, kind, hp: maxHp, maxHp, speed: 25 * speedScale, reward: Math.round(180 * rewardScale), color: "#7d68a8", r: 24, armor, coreDamage: 20 };
      }
      const basicBoost = wave > 10 ? 1.75 : 1;
      const maxHp = Math.round(88 * hpScale * basicBoost);
      return { ...base, kind: "basic", hp: maxHp, maxHp, speed: 72 * speedScale, reward: Math.round(9 * rewardScale), color: "#75e9a7", r: 12 };
    }

    function startWave(manual = true, reduceMeteorCd = manual) {
      if (state.screen !== "play" || state.gameOver || state.victory) return;
      const remainingWaveMs = Math.max(0, state.nextWaveTimer || 0) * 1000;
      const now = Date.now();
      state.wave += 1;
      state.meteorDamage = (state.wave - 1) ? Math.round(METEOR_DAMAGE * getHpScale(state.wave) / 2.3) : METEOR_DAMAGE;
      state.waveInProgress = true;
      state.waveReadyGlow = false;
      if (state.wave % 100 === 0) {
        state.nextWaveDisabled = true;
        state.nextWaveTimer = Infinity;
      } else {
        state.nextWaveDisabled = false;
        state.nextWaveTimer = WAVE_INTERVAL_S;
      }
      if (reduceMeteorCd && state.meteorReadyAt > now) {
        state.meteorReadyAt = Math.max(now, state.meteorReadyAt - remainingWaveMs);
      }

      const count = getWaveEnemyCount(state.wave);
      ensureWaveStatus(state.wave, count);
      state.toSpawn += count;
      if (state.spawnTimer <= 0) state.spawnTimer = 0.36;
      state.message = state.wave % 100 === 0
        ? `Wave ${state.wave} final boss engaged.`
        : manual
          ? `Wave ${state.wave} called early. Hold the line.`
          : `Wave ${state.wave} has begun.`;

      updateHUD();
      updateButtons();
    }

    function pickWavePattern(wave) {
      if (wave % 100 === 0) return "finalBoss";
      const cycle = wave % 10;
      if (wave >= 10 && cycle === 0) return "bossRush";
      if (cycle === 1) return "basic";
      if (cycle === 2) return "strikerRaid";
      if (cycle === 3) return "leech";
      if (cycle === 4) return "blitz";
      if (cycle === 5) return "fortressLine";
      if (cycle === 6) return "toxicBloom";
      if (cycle === 7) return "runnerMix";
      if (cycle === 8) return "armorColumn";
      return "swarmFlood";
    }

    function pickEnemyType(wave, idx) {
      if (wave <= 2) return "basic";
      const pattern = pickWavePattern(wave);
      if (pattern === "finalBoss") {
        const total = getWaveEnemyCount(wave);
        if (idx >= total - 1) return "finalBoss";
        return FINAL_BOSS_WAVE_TYPES[idx % FINAL_BOSS_WAVE_TYPES.length];
      }
      if (pattern === "bossRush") {
        if (idx % 10 === 0) return "boss";
        if (idx % 4 === 0) return "bulwark";
        return "armored";
      }
      if (pattern === "swarmFlood") {
        if (idx % 8 === 0) return "fast";
        return "swarm";
      }
      if (pattern === "armorColumn") {
        if (idx % 8 === 0) return "bulwark";
        if (idx % 3 === 0) return "tank";
        return "armored";
      }
      if (pattern === "strikerRaid") {
        if (idx % 5 === 0) return "leech";
        if (idx % 9 === 0) return "fast";
        return "striker";
      }
      if (pattern === "blitz") {
        if (idx % 3 === 0) return "striker";
        if (idx % 2 === 0) return "fast";
        return "swarm";
      }
      if (pattern === "runnerMix") {
        if (idx % 5 === 0) return "striker";
        if (idx % 2 === 0) return "basic";
        return "fast";
      }
      if (pattern === "fortressLine") {
        if (idx % 5 === 0) return "bulwark";
        if (idx % 3 === 0) return "armored";
        return "tank";
      }
      if (pattern === "toxicBloom") {
        if (idx % 3 === 0) return "leech";
        return "tank";
      }
      if (pattern === "leech") {
        if (idx % 2 === 0) return "basic";
        return "leech";
      }
    }

    function spawnEnemyBatch(dt) {
      if (!state.waveInProgress || state.toSpawn <= 0) return;
      state.spawnTimer -= dt;
      if (state.spawnTimer <= 0) {
        const total = getWaveEnemyCount(state.wave);
        const spawnedIndex = total - state.toSpawn;
        state.enemies.push(newEnemy(pickEnemyType(state.wave, spawnedIndex), state.wave));
        state.toSpawn -= 1;
        const baseGap = Math.max(0.13, 0.47 - state.wave * 0.015);
        state.spawnTimer = baseGap;
      }
    }

    function distance(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function ensureWaveStatus(wave, total = 0) {
      const key = String(wave);
      if (state.waveStatus[key]) return state.waveStatus[key];
      const status = { remaining: total, rewarded: false };
      state.waveStatus[key] = status;
      return status;
    }

    function markWaveEnemyResolved(wave) {
      const status = ensureWaveStatus(wave);
      status.remaining = Math.max(0, (status.remaining || 0) - 1);
    }

    function awardWaveClearBonus(wave) {
      const status = ensureWaveStatus(wave);
      if (status.rewarded || status.remaining > 0) return false;
      status.rewarded = true;
      state.clearedWave = Math.max(state.clearedWave, wave);
      state.waveReadyGlow = wave === state.wave;
      if (wave % 100 === 0 && wave !== 100) {
        state.nextWaveDisabled = false;
        state.nextWaveTimer = WAVE_INTERVAL_S;
      }
      state.gold += 13 + wave * 6;
      state.score += 120 + wave * 18;
      state.message = `Wave ${wave} cleared. Bonus resources awarded.`;
      if (wave === 100) {
        state.victory = true;
        state.waveReadyGlow = false;
        state.message = "Victory! Core secured.";
      }
      updateHUD();
      updateButtons();
      return true;
    }

    function enemyAtEnd(enemy) {
      return enemy.seg >= path.length - 1;
    }

    function updateEnemies(dt) {
      for (let i = state.enemies.length - 1; i >= 0; i--) {
        const e = state.enemies[i];
        if (e.poisonTimer > 0) {
          e.poisonTimer -= dt;
          hitEnemy(e, e.poisonDps * dt, true, true);
          if (!state.enemies.includes(e)) continue;
        }
        if (e.burningTimer > 0) {
          e.burningTimer -= dt;
          hitEnemy(e, e.burningDps * dt, true, true);
          if (!state.enemies.includes(e)) continue;
        }
        if (e.slowTimer > 0) {
          e.slowTimer -= dt;
        } else {
          e.slowFactor = 1;
        }
        if (e.damageAmpTimer > 0) {
          e.damageAmpTimer -= dt;
        } else {
          e.damageAmp = 1;
          e.damageAmpColor = "#f58cff";
        }

        let move = e.speed * e.slowFactor * dt;
        while (move > 0 && e.seg < path.length - 1) {
          const a = path[e.seg];
          const b = path[e.seg + 1];
          const segLen = Math.hypot(b.x - a.x, b.y - a.y);
          const remain = segLen - e.p;
          if (move < remain) {
            e.p += move;
            move = 0;
          } else {
            move -= remain;
            e.seg += 1;
            e.p = 0;
          }
        }

        if (enemyAtEnd(e)) {
          state.enemies.splice(i, 1);
          markWaveEnemyResolved(e.spawnWave || state.wave);
          state.health -= e.coreDamage || 1;
          if (state.health <= 0) {
            state.health = 0;
            state.gameOver = true;
            state.message = "Core breached. Restart and try a new layout.";
            updateButtons();
          }
          updateHUD();
          continue;
        }

        const a = path[e.seg];
        const b = path[e.seg + 1];
        const segLen = Math.hypot(b.x - a.x, b.y - a.y);
        const t = segLen ? e.p / segLen : 0;
        e.x = a.x + (b.x - a.x) * t;
        e.y = a.y + (b.y - a.y) * t;
      }
    }

    function acquireTarget(tower) {
      let target = null;
      let bestProgress = -1;
      for (const enemy of state.enemies) {
        const d = Math.hypot(enemy.x - tower.x, enemy.y - tower.y);
        if (d > tower.range) continue;
        const progress = enemy.seg * 2000 + enemy.p;
        if (progress > bestProgress) {
          bestProgress = progress;
          target = enemy;
        }
      }
      return target;
    }

    function updateTowers(dt) {
      for (const tower of state.towers) {
        tower.cooldown -= dt;
        if (tower.cooldown > 0) continue;

        const target = acquireTarget(tower);
        if (!target) continue;
        tower.cooldown = tower.fireRate;

        const angle = Math.atan2(target.y - tower.y, target.x - tower.x);
        tower.angle = angle;

        const pellets = tower.pellets || 1;
        const spread = tower.spread || 0;
        for (let p = 0; p < pellets; p++) {
          const isBurstShot = tower.burstCycle && ((tower.shotCount || 0) + 1) % tower.burstCycle === 0;
          const isBurningShot = tower.burningCycle && ((tower.shotCount || 0) + 1) % tower.burningCycle === 0;
          const baseOffset = pellets > 1 ? ((p / (pellets - 1)) * 2 - 1) * spread : 0;
          const shotAngle = angle + baseOffset + (Math.random() - 0.5) * 0.03;
          state.projectiles.push({
            x: tower.x,
            y: tower.y,
            vx: Math.cos(shotAngle) * tower.projectileSpeed,
            vy: Math.sin(shotAngle) * tower.projectileSpeed,
            life: 1.8,
            type: tower.type,
            hitRadius: getProjectileHitRadius({ type: tower.type, splash: tower.splash || 0 }),
            damage: tower.damage,
            splash: tower.splash || 0,
            slow: tower.slow || 0,
            slowTime: tower.slowTime || 0,
            poisonDps: tower.poisonDps || 0,
            poisonTime: tower.poisonTime || 0,
            burningDps: isBurningShot ? tower.burningDps || 0 : 0,
            burningTime: isBurningShot ? tower.burningTime || 0 : 0,
            burningRadius: isBurningShot ? tower.burningRadius || 0 : 0,
            armorShred: tower.armorShred || 0,
            chainTargets: tower.chainTargets || 0,
            chainRange: tower.chainRange || 0,
            chainDamageFalloff: tower.chainDamageFalloff || 1,
            ionMarkAmp: tower.ionMarkAmp || 1,
            ionMarkTime: tower.ionMarkTime || 0,
            pierceLeft: isBurstShot ? tower.burstPierce || 0 : 0,
            color: tower.color
          });
        }
        tower.shotCount = (tower.shotCount || 0) + 1;
      }
    }

    function hitEnemy(enemy, damage, quiet = false, trueDamage = false) {
      const amp = enemy.damageAmpTimer > 0 ? enemy.damageAmp : 1;
      let reduced = damage;
      if (!trueDamage && enemy.armor) {
        reduced = damage * (1 - enemy.armor);
      }
      reduced = damage > 0 ? Math.max(1, reduced) : 0;
      enemy.hp -= reduced * amp;
      enemy.hp = Math.min(enemy.maxHp, enemy.hp);
      if (!quiet) {
        state.particles.push({ x: enemy.x, y: enemy.y, r: 5, life: 0.22, color: "#ffffff" });
      }
      if (enemy.hp <= 0) {
        markWaveEnemyResolved(enemy.spawnWave || state.wave);
        state.gold += enemy.reward;
        state.score += Math.round(enemy.maxHp * 0.9);
        burst(enemy.x, enemy.y, enemy.color, 10, 34);
        const idx = state.enemies.indexOf(enemy);
        if (idx >= 0) state.enemies.splice(idx, 1);
        updateHUD();
      }
    }

    function explode(x, y, radius, damage, color, slow, slowTime, trueDamage = false) {
      burst(x, y, color, 18, radius * 0.8);
      if (radius >= 40) burst(x, y, "#ffd18a", 10, radius * 0.55);
      for (const enemy of [...state.enemies]) {
        if (Math.hypot(enemy.x - x, enemy.y - y) <= radius) {
          hitEnemy(enemy, damage, false, trueDamage);
          if (slow) {
            enemy.slowFactor = slow;
            enemy.slowTimer = Math.max(enemy.slowTimer, slowTime);
            burst(enemy.x, enemy.y, "#b2d3ff", 4, 12);
          }
        }
      }
    }

    function spawnHazard(x, y, radius, dps, time, color) {
      state.hazards.push({ x, y, radius, dps, life: time, maxLife: time, color, age: 0, activeDelay: 0.08 });
    }

    function chainShock(origin, projectile) {
      if (!projectile.chainTargets || projectile.chainTargets <= 0) return;
      let from = origin;
      let damage = projectile.damage * projectile.chainDamageFalloff;
      const visited = new Set([origin]);
      for (let jump = 0; jump < projectile.chainTargets; jump++) {
        let next = null;
        let bestDist = Infinity;
        for (const enemy of state.enemies) {
          if (visited.has(enemy)) continue;
          const d = Math.hypot(enemy.x - from.x, enemy.y - from.y);
          if (d <= projectile.chainRange && d < bestDist) {
            bestDist = d;
            next = enemy;
          }
        }
        if (!next) break;
        visited.add(next);
        hitEnemy(next, damage);
        if (projectile.slow) {
          next.slowFactor = projectile.slow;
          next.slowTimer = Math.max(next.slowTimer, projectile.slowTime);
        }
        if (projectile.ionMarkAmp > 1) {
          next.damageAmp = Math.max(next.damageAmp || 1, projectile.ionMarkAmp);
          next.damageAmpTimer = Math.max(next.damageAmpTimer || 0, projectile.ionMarkTime);
          next.damageAmpColor = projectile.color || "#f58cff";
        }
        burst(next.x, next.y, "#8af7ff", 5, 20);
        from = next;
        damage *= projectile.chainDamageFalloff;
      }
    }

    function updateHazards(dt) {
      for (let i = state.hazards.length - 1; i >= 0; i--) {
        const h = state.hazards[i];
        h.age = (h.age || 0) + dt;
        h.life -= dt;
        if (h.life <= 0) {
          state.hazards.splice(i, 1);
          continue;
        }
        if (h.age >= (h.activeDelay || 0)) {
          for (const enemy of [...state.enemies]) {
            if (Math.hypot(enemy.x - h.x, enemy.y - h.y) <= h.radius) {
              hitEnemy(enemy, h.dps * dt, true, true);
              enemy.burningDps = Math.max(enemy.burningDps || 0, h.dps * 0.72);
              enemy.burningTimer = Math.max(enemy.burningTimer || 0, 0.45);
            }
          }
        }
      }
    }

    function updateProjectiles(dt) {
      for (let i = state.projectiles.length - 1; i >= 0; i--) {
        const p = state.projectiles[i];
        p.life -= dt;
        p.x += p.vx * dt;
        p.y += p.vy * dt;

        if (p.life <= 0 || p.x < -60 || p.y < -60 || p.x > W + 60 || p.y > H + 60) {
          state.projectiles.splice(i, 1);
          continue;
        }

        let didHit = false;
        for (const enemy of [...state.enemies]) {
          if (Math.hypot(enemy.x - p.x, enemy.y - p.y) <= getEnemyHitRadius(enemy) + getProjectileHitRadius(p)) {
            if (p.splash > 0) {
              explode(p.x, p.y, p.splash, p.damage, p.color, p.slow, p.slowTime);
            } else {
              const isPierceShot = p.pierceLeft > 0;
              hitEnemy(enemy, p.damage, false, isPierceShot);
              if (p.slow) {
                enemy.slowFactor = p.slow;
                enemy.slowTimer = Math.max(enemy.slowTimer, p.slowTime);
              }
              if (p.poisonDps) {
                enemy.poisonDps = Math.max(enemy.poisonDps, p.poisonDps);
                enemy.poisonTimer = Math.max(enemy.poisonTimer, p.poisonTime);
                burst(enemy.x, enemy.y, "#8bff9d", 5, 16);
              }
              if (p.armorShred > 0) {
                enemy.armor = Math.max(0, (enemy.armor || 0) - p.armorShred);
                burst(enemy.x, enemy.y, "#ffcc9a", 3, 8);
              }
              if (p.burningDps) {
                const r = p.burningRadius || 0;
                spawnHazard(enemy.x, enemy.y, r, p.burningDps, p.burningTime, "rgba(255,120,72,0.35)");
                burst(enemy.x, enemy.y, "#ff9c5f", 10, 22);
              }
              if (p.ionMarkAmp > 1) {
                enemy.damageAmp = Math.max(enemy.damageAmp || 1, p.ionMarkAmp);
                enemy.damageAmpTimer = Math.max(enemy.damageAmpTimer || 0, p.ionMarkTime);
                enemy.damageAmpColor = p.color || "#f58cff";
                burst(enemy.x, enemy.y, "#f58cff", 4, 12);
              }
              if (p.chainTargets > 0) {
                chainShock(enemy, p);
              }
              if (p.pierceLeft > 0) {
                p.pierceLeft -= 1;
                p.life -= 0.06;
                p.x += p.vx * 0.01;
                p.y += p.vy * 0.01;
                burst(enemy.x, enemy.y, "#ffd6d6", 5, 12);
                didHit = false;
              } else {
                didHit = true;
              }
            }
            if (p.pierceLeft <= 0) didHit = true;
            break;
          }
        }

        if (didHit) {
          state.projectiles.splice(i, 1);
        }
      }
    }

    function burst(x, y, color, count, spread) {
      for (let i = 0; i < count; i++) {
        const a = Math.random() * Math.PI * 2;
        const s = Math.random() * spread;
        state.particles.push({
          x,
          y,
          vx: Math.cos(a) * s,
          vy: Math.sin(a) * s,
          r: 2 + Math.random() * 2,
          life: 0.28 + Math.random() * 0.42,
          color
        });
      }
    }

    function getEnemyHitRadius(enemy) {
      if (!enemy) return 0;
      if (enemy.kind === "armored") return enemy.r * Math.SQRT2;
      if (enemy.kind === "fast") return enemy.r * 1.21;
      if (enemy.kind === "swarm" || enemy.kind === "striker" || enemy.kind === "bulwark" || enemy.kind === "boss") return enemy.r + 1;
      return enemy.r;
    }

    function getProjectileHitRadius(projectile) {
      if (!projectile) return 0;
      if (projectile.hitRadius != null) return projectile.hitRadius;
      if (projectile.type === "dart") return 6;
      if (projectile.type === "scatter") return 2;
      if (projectile.type === "rail") return 11;
      if (projectile.type === "storm") return 5.8;
      if (projectile.type === "ember") return 5.4;
      if (projectile.type === "venom") return 4.4;
      if (projectile.type === "frost") return 7;
      if (projectile.type === "ion") return 4.6;
      if (projectile.type === "mortar") return 5.7;
      return projectile.splash ? 5.5 : 3.8;
    }

    function updateParticles(dt) {
      for (let i = state.particles.length - 1; i >= 0; i--) {
        const p = state.particles[i];
        p.life -= dt;
        p.x += (p.vx || 0) * dt;
        p.y += (p.vy || 0) * dt;
        p.r *= 0.988;
        if (p.life <= 0) state.particles.splice(i, 1);
      }
    }

    function worldPos(evt) {
      const r = canvas.getBoundingClientRect();
      return {
        x: ((evt.clientX - r.left) / r.width) * BASE_W,
        y: ((evt.clientY - r.top) / r.height) * BASE_H
      };
    }

    function pointSegDist(px, py, x1, y1, x2, y2) {
      const dx = x2 - x1;
      const dy = y2 - y1;
      const len2 = dx * dx + dy * dy;
      if (len2 === 0) return Math.hypot(px - x1, py - y1);
      let t = ((px - x1) * dx + (py - y1) * dy) / len2;
      t = Math.max(0, Math.min(1, t));
      const x = x1 + t * dx;
      const y = y1 + t * dy;
      return Math.hypot(px - x, py - y);
    }

    function tooCloseToPath(x, y) {
      for (let i = 0; i < path.length - 1; i++) {
        const a = path[i];
        const b = path[i + 1];
        if (pointSegDist(x, y, a.x, a.y, b.x, b.y) < 20) return true;
      }
      return false;
    }

    function towerAt(x, y) {
      for (const t of state.towers) {
        if (Math.hypot(t.x - x, t.y - y) <= 18) return t;
      }
      return null;
    }

    function enemyAt(x, y) {
      for (let i = state.enemies.length - 1; i >= 0; i--) {
        const e = state.enemies[i];
        if (Math.hypot(e.x - x, e.y - y) <= getEnemyHitRadius(e)) return e;
      }
      return null;
    }

    function canPlace(x, y) {
      if (!buildSpotSet.has(`${x},${y}`)) return false;
      if (roadSpotSet.has(`${x},${y}`)) return false;
      if (towerAt(x, y)) return false;
      return true;
    }

    function addTower(type, x, y) {
      const t = towerTypes[type];
      if (!t || state.gold < t.cost) return false;

      const tower = {
        type,
        x,
        y,
        cooldown: 0.1,
        angle: -Math.PI / 2,
        level: 1,
        totalInvested: t.cost,
        ...t
      };
      state.towers.push(tower);
      state.gold -= t.cost;
      state.selectedTower = tower;
      state.selectedEnemy = null;
      state.selectedBuild = null;
      state.statsMode = "unit";
      state.message = `${t.name} online.`;
      updateHUD();
      updateButtons();
      return true;
    }

    function getUpgradeCost(tower) {
      const level = tower.level - 1;
      const earlyDiscount = level < 4 ? (0.58 + level * 0.09) : 1;
      const raw = tower.cost * 1.74 * Math.pow(1.2, level) * (1 + Math.max(0, level - 2) * 0.09) * earlyDiscount;
      return Math.ceil(raw / 5) * 5;
    }

    function getUpgradeDamageRamp(tower) {
      const level = tower.level - 1;
      const earlyDiscount = level < 4 ? (0.58 + level * 0.09) : 1;
      return Math.pow(1.2, level) * (1 + Math.max(0, level - 2) * 0.09) * earlyDiscount;
    }

    function getUpgradeDpsMultiplier(level) {
      const x = Math.max(0, level - 1);
      if (x === 0) return 1;
      const exponent = 0.607826 * x - 0.021994 * x * x;
      return Math.exp(exponent);
    }

    function upgradeTower() {
      if (!state.selectedTower || state.gameOver) return;
      const t = state.selectedTower;
      if (t.level >= 10) {
        state.message = "Max level reached.";
        updateButtons();
        return;
      }
      const upgradeCost = getUpgradeCost(t);
      if (state.gold < upgradeCost) {
        state.message = `Need ${upgradeCost} gold to upgrade.`;
        return;
      }
      state.gold -= upgradeCost;
      t.totalInvested = (t.totalInvested || t.cost) + upgradeCost;
      const next = computeNextStats(t);
      t.level = next.level;
      t.damage = next.damage;
      if (t.splash != null) t.splash = next.splash;
      t.range = next.range;
      t.fireRate = next.fireRate;
      t.projectileSpeed = next.projectileSpeed;
      if (t.slow != null) t.slow = next.slow;
      if (t.slowTime != null) t.slowTime = next.slowTime;
      if (t.poisonDps != null) t.poisonDps = next.poisonDps;
      if (t.poisonTime != null) t.poisonTime = next.poisonTime;
      if (t.burningDps != null) t.burningDps = next.burningDps;
      if (t.burningTime != null) t.burningTime = next.burningTime;
      if (t.ionMarkAmp != null) t.ionMarkAmp = next.ionMarkAmp;
      if (t.ionMarkTime != null) t.ionMarkTime = next.ionMarkTime;
      if (t.pellets != null) t.pellets = next.pellets;
      if (t.chainTargets != null) t.chainTargets = next.chainTargets;
      if (t.burstPierce != null) t.burstPierce = next.burstPierce;
      t.upgradeFx = 0.45;
      state.message = `${t.name} upgraded to Lv.${t.level}.`;
      updateHUD();
      updateButtons();
    }

    function tryAutoUpgradeSelectedTower() {
      if (!state.autoUpgradeTower || !state.selectedTower) return;
      if (state.paused || state.gameOver || state.victory) return;
      if (state.selectedTower.level >= 10) return;
      const cost = getUpgradeCost(state.selectedTower);
      if (state.gold < cost) return;
      upgradeTower();
    }

    function castMeteor(x, y) {
      const now = Date.now();
      if (now < state.meteorReadyAt) return false;
      state.meteorReadyAt = now + METEOR_CD_MS;
      state.aimingMeteor = false;
      state.meteorAimX = x;
      state.meteorAimY = y;
      state.statsMode = "unit";
      state.selectionLines = [];
      state.meteorEffects.push({ x, y, t: 0, impactAt: 0.34, done: false });
      state.message = "Meteor inbound...";
      updateButtons();
      return true;
    }

    function handleCanvasPress(x, y) {
      if (state.menuMode) {
        for (const btn of uiState.menuButtons) {
          if (hitRect(x, y, btn) && !btn.disabled) {
            if (btn.id === "encyclopediaTab") {
              openEncyclopedia(btn.tab, btn.key);
              return;
            }
            if (btn.id === "encyclopediaEntry") {
              state.encyclopediaKey = btn.key;
              if (state.encyclopediaTab === "enemies") {
                state.encyclopediaEnemyWave = ENEMY_FIRST_WAVE[btn.key] || 1;
              }
              return;
            }
            if (btn.id === "encyclopediaTowerLevelDelta") {
              state.encyclopediaTowerLevel = Math.max(1, Math.min(10, (state.encyclopediaTowerLevel || 1) + btn.delta));
              return;
            }
            if (btn.id === "encyclopediaEnemyWaveDelta") {
              const waves = getEnemyPreviewWaves(state.encyclopediaKey);
              if (!waves.length) return;
              const currentWave = state.encyclopediaEnemyWave || waves[0];
              let index = waves.findIndex((wave) => wave >= currentWave);
              if (index < 0) index = waves.length - 1;
              const step = btn.delta || 0;
              let nextIndex = index;
              if (Math.abs(step) > 1) {
                nextIndex = Math.max(0, Math.min(waves.length - 1, index + step));
              } else if (step < 0 && index > 0) {
                nextIndex = index - 1;
              } else if (step > 0 && index < waves.length - 1) {
                nextIndex = index + 1;
              }
              state.encyclopediaEnemyWave = waves[nextIndex];
              return;
            }
            if (btn.id === "menuBack") {
              closeSlotMenu();
              return;
            }
            if (btn.id === "confirmOverwrite") {
              saveGameToSlot(btn.slot);
              closeSlotMenu();
              return;
            }
            if (btn.id === "cancelOverwrite") {
              state.menuMode = "save";
              state.pendingSlot = null;
              return;
            }
            if (btn.id === "slot") {
              if (state.menuMode === "save") {
                if (hasSavedGame(btn.slot)) {
                  state.menuMode = "saveConfirm";
                  state.pendingSlot = btn.slot;
                  return;
                }
                saveGameToSlot(btn.slot);
              } else {
                loadGameFromSlot(btn.slot);
              }
              closeSlotMenu();
              return;
            }
          }
        }
        for (const btn of uiState.buttons) {
          if ((btn.id === "fullscreen" || btn.id === "closeMenu") && hitRect(x, y, btn) && !btn.disabled) {
            handleUiAction(btn.id);
            return;
          }
        }
        return;
      }
      if (state.gameOver) {
        for (const btn of uiState.buttons) {
          if ((btn.id === "pause" || btn.id === "fullscreen") && hitRect(x, y, btn) && !btn.disabled) {
            if (btn.id === "pause") {
              resetGame();
              state.screen = "play";
              state.messageAt = Date.now();
              startLoop();
            } else {
              handleUiAction(btn.id);
            }
            return;
          }
        }
        const btns = uiState.gameOverButtons || [];
        for (const btn of btns) {
          if (hitRect(x, y, btn) && !btn.disabled) {
            if (btn.id === "gameOverRestart") {
              resetGame();
              state.screen = "play";
              state.messageAt = Date.now();
              startLoop();
            }
            if (btn.id === "gameOverLoad") {
              openSlotMenu("load");
            }
            return;
          }
        }
        return;
      }
      if (state.victory) {
        for (const btn of uiState.buttons) {
          if ((btn.id === "pause" || btn.id === "fullscreen") && hitRect(x, y, btn) && !btn.disabled) {
            if (btn.id === "pause") {
              resetGame();
              state.screen = "play";
              state.messageAt = Date.now();
              startLoop();
            } else {
              handleUiAction(btn.id);
            }
            return;
          }
        }
        const btns = uiState.victoryButtons || [];
        for (const btn of btns) {
          if (hitRect(x, y, btn) && !btn.disabled) {
            if (btn.id === "victoryRestart") {
              resetGame();
              state.screen = "play";
              state.messageAt = Date.now();
              startLoop();
            }
            if (btn.id === "victoryContinue") {
              continueAfterVictory();
            }
            return;
          }
        }
        return;
      }
      if (state.screen === "start") {
        for (const btn of uiState.startButtons) {
          if (hitRect(x, y, btn) && !btn.disabled) {
            handleUiAction(btn.id);
            return;
          }
        }
        for (const btn of uiState.buttons) {
          if (btn.id === "fullscreen" && hitRect(x, y, btn) && !btn.disabled) {
            handleUiAction(btn.id);
            return;
          }
        }
        return;
      }
      if (state.paused) {
        for (const btn of uiState.pauseButtons) {
          if (hitRect(x, y, btn) && !btn.disabled) {
            handleUiAction(btn.id);
            return;
          }
        }
        for (const btn of uiState.buttons) {
          if ((btn.id === "pause" || btn.id === "fullscreen" || btn.id === "autoWave" || btn.id === "autoUpgrade") && hitRect(x, y, btn) && !btn.disabled) {
            handleUiAction(btn.id);
            return;
          }
        }
        return;
      }
      for (const btn of uiState.buttons) {
        if (hitRect(x, y, btn) && !btn.disabled) {
          handleUiAction(btn.id);
          return;
        }
      }
      for (const btn of uiState.buildButtons) {
        if (hitRect(x, y, btn) && !btn.disabled) {
          handleBuildSelect(btn.type);
          return;
        }
      }
      const world = screenToWorld(x, y);
      if (!world.inside) return;
      const gx = Math.round(world.x / grid) * grid;
      const gy = Math.round(world.y / grid) * grid;

      if (state.aimingMeteor) {
        castMeteor(world.x, world.y);
        return;
      }

      const clickedTower = towerAt(world.x, world.y);
      const clickedEnemy = enemyAt(world.x, world.y);
      if (clickedEnemy && !state.selectedBuild) {
        state.selectedEnemy = clickedEnemy;
        state.selectedTower = null;
        state.statsMode = "unit";
        state.message = `${clickedEnemy.kind.toUpperCase()} selected.`;
        updateButtons();
        return;
      }
      if (clickedTower && !state.selectedBuild) {
        state.selectedTower = clickedTower;
        state.selectedEnemy = null;
        state.statsMode = "unit";
        state.message = `${clickedTower.name} selected.`;
        updateButtons();
        return;
      }

      if (state.selectedBuild) {
        if (canPlace(gx, gy)) {
          addTower(state.selectedBuild, gx, gy);
        } else {
          state.selectedBuild = null;
          state.selectedEnemy = null;
          state.statsMode = "unit";
          state.message = "Build canceled.";
          updateButtons();
        }
      } else {
        state.selectedTower = null;
        state.selectedEnemy = null;
        state.statsMode = "unit";
        updateButtons();
      }
    }

    function hitRect(x, y, r) {
      return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h;
    }

    function handleBuildSelect(type) {
      if (state.gameOver || state.paused || state.victory) return;
      const t = towerTypes[type];
      if (!t || state.gold < t.cost) return;
      state.selectedBuild = state.selectedBuild === type ? null : type;
      if (state.selectedBuild) {
        state.selectedTower = null;
        state.selectedEnemy = null;
        state.statsMode = "unit";
      }
      updateButtons();
    }

    function handleUiAction(id) {
      if (id === "startWave") startWave();
      if (id === "pause") togglePause();
      if (id === "meteor") toggleMeteor();
      if (id === "upgrade") upgradeTower();
      if (id === "sell") sellSelected();
      if (id === "autoWave") toggleAutoStartWave();
      if (id === "autoUpgrade") toggleAutoUpgradeTower();
      if (id === "resume") togglePause();
      if (id === "restart") restartFromPause();
      if (id === "save") openSlotMenu("save");
      if (id === "load") openSlotMenu("load");
      if (id === "victoryContinue") continueAfterVictory();
      if (id === "encyclopedia") openEncyclopedia(state.encyclopediaTab, state.encyclopediaKey);
      if (id === "closeMenu") {
        const returnToGame = state.menuMode === "encyclopedia" && state.menuFrom === "play";
        closeSlotMenu();
        if (returnToGame && state.paused) togglePause();
      }
      if (id === "cloudSave") exportCloudSave();
      if (id === "cloudLoad") importCloudSave();
      if (id === "start") {
        state.screen = "play";
        state.message = "Set up quickly. First wave starts in 40s.";
        state.messageAt = Date.now();
        updateButtons();
      }
      if (id === "fullscreen") toggleFullscreen();
    }

    function updateHoverBuild() {
      if (state.screen !== "play") {
        state.hoverBuild = null;
        return;
      }
      const layout = getUiLayout();
      const x = mouse.screenX;
      const y = mouse.screenY;
      if (
        x < layout.buildX ||
        x > layout.buildX + layout.buildW ||
        y < layout.buildY ||
        y > layout.buildY + layout.buildH
      ) {
        state.hoverBuild = null;
        return;
      }
      const itemH = 41;
      const headerH = 28;
      const listY = layout.buildY + headerH + 6;
      if (y < listY) {
        state.hoverBuild = null;
        return;
      }
      const idx = Math.floor((y - listY) / itemH);
      const type = towerOrder[idx];
      state.hoverBuild = type || null;
      state.statsMode = "unit";
    }

    function sellSelected() {
      if (!state.selectedTower) return;
      const idx = state.towers.indexOf(state.selectedTower);
      if (idx >= 0) {
