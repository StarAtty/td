        const invested = state.selectedTower.totalInvested || state.selectedTower.cost;
        const value = Math.floor(invested * 0.8);
        state.gold += value;
        state.towers.splice(idx, 1);
        state.selectedTower = null;
        state.message = `Tower sold for ${value} gold.`;
        updateHUD();
        updateButtons();
      }
    }

    function toggleMeteor() {
      if (state.paused || state.gameOver || state.victory) return;
      state.statsMode = "meteor";
      const remainMs = getMeteorCooldownMs();
      if (remainMs > 0) {
        const remain = Math.ceil(remainMs / 1000);
        state.message = `Meteor cooldown: ${remain}s`;
        updateButtons();
        return;
      }
      state.aimingMeteor = !state.aimingMeteor;
      if (state.aimingMeteor && mouse) {
        state.meteorAimX = mouse.x;
        state.meteorAimY = mouse.y;
      }
      state.selectedBuild = null;
      state.selectedTower = null;
      if (!state.aimingMeteor) state.statsMode = "unit";
      if (!state.aimingMeteor) {
        state.selectionLines = [];
      }
      state.message = state.aimingMeteor ? "Click battlefield to call meteor." : "Meteor canceled.";
      updateButtons();
    }

    function togglePause() {
      if (state.gameOver) {
        resetGame();
        startLoop();
        return;
      }
      if (state.paused) {
        const pausedFor = state.pauseStartedAt ? Date.now() - state.pauseStartedAt : 0;
        if (pausedFor > 0 && state.meteorReadyAt > 0) {
          state.meteorReadyAt += pausedFor;
        }
        state.pauseStartedAt = 0;
        state.paused = false;
      } else {
        state.paused = true;
        state.pauseStartedAt = Date.now();
      }
      state.message = state.paused ? "Paused." : "Resumed.";
      updateButtons();
    }

    function restartFromPause() {
      resetGame();
      state.screen = "play";
      state.message = "Set up quickly. First wave starts in 40s.";
      state.messageAt = Date.now();
      startLoop();
    }

    function continueAfterVictory() {
      state.victory = false;
      state.gameOver = false;
      state.paused = false;
      state.pauseStartedAt = 0;
      state.menuMode = null;
      state.menuFrom = null;
      state.pendingSlot = null;
      state.nextWaveDisabled = false;
      state.waveReadyGlow = false;
      state.screen = "play";
      state.message = "Continuing beyond wave 100.";
      state.messageAt = Date.now();
      updateButtons();
      startLoop();
      startWave(true);
    }

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        if (canvas.requestFullscreen) {
          canvas.requestFullscreen({ navigationUI: "hide" }).catch(() => {});
        }
      } else {
        document.exitFullscreen().catch(() => {});
      }
    }

    function cheatCallWave100() {
      closeSlotMenu();
      state.screen = "play";
      state.paused = false;
      state.gameOver = false;
      state.victory = false;
      state.selectedBuild = null;
      state.selectedTower = null;
      state.selectedEnemy = null;
      state.hoverBuild = null;
      state.statsMode = "unit";
      state.selectionLines = [];
      state.aimingMeteor = false;
      state.enemies = [];
      state.projectiles = [];
      state.particles = [];
      state.hazards = [];
      state.meteorEffects = [];
      state.waveInProgress = false;
      state.toSpawn = 0;
      state.spawnTimer = 0;
      state.nextWaveDisabled = false;
      state.nextWaveTimer = WAVE_INTERVAL_S;
      state.waveReadyGlow = false;
      state.wave = 99;
      state.clearedWave = 99;
      state.waveStatus = {};
      for (let wave = 1; wave <= 99; wave++) {
        state.waveStatus[String(wave)] = { remaining: 0, rewarded: true };
      }
      startWave(true, false);
      state.message = "Cheat: wave 100 called.";
      state.messageAt = Date.now();
      updateHUD();
      updateButtons();
      if (!isLoopRunning) startLoop();
    }

    canvas.addEventListener("click", (evt) => {
      const { x, y } = worldPos(evt);
      handleCanvasPress(x, y);
    });
    canvas.addEventListener("touchstart", (evt) => {
      evt.preventDefault();
      if (!evt.touches.length) return;
      const p = worldPos(evt.touches[0]);
      mouse.x = p.x;
      mouse.y = p.y;
      handleCanvasPress(p.x, p.y);
    }, { passive: false });

    canvas.addEventListener("contextmenu", (evt) => {
      evt.preventDefault();
      if (state.selectedBuild || state.aimingMeteor) {
        state.selectedBuild = null;
        state.aimingMeteor = false;
        state.statsMode = "unit";
        state.selectionLines = [];
        state.message = "Action canceled.";
        updateButtons();
      }
    });

    window.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();
      const inGame = state.screen === "play" && !state.menuMode && !state.gameOver && !state.victory;
      if (e.ctrlKey && key === "]") {
        if (!inGame) return;
        state.gold += 10000;
        state.message = "Cheat gold +10000.";
        updateHUD();
        updateButtons();
        return;
      }
      if (e.ctrlKey && key === "'") {
        if (!inGame) return;
        state.wave = 100;
        state.clearedWave = 100;
        state.waveInProgress = false;
        state.toSpawn = 0;
        state.enemies = [];
        state.nextWaveDisabled = true;
        state.victory = true;
        state.message = "Victory forced.";
        updateHUD();
        updateButtons();
        return;
      }
      if (e.ctrlKey && key === "[") {
        if (!inGame) return;
        cheatCallWave100();
        return;
      }
      if (!inGame) return;
      if (key === "f") {
        toggleFullscreen();
        return;
      }
      if (key === "m") {
        if (state.paused) return;
        toggleMeteor();
        return;
      }
      if (key === "p") {
        togglePause();
        return;
      }
      if (key === "g") {
        toggleAutoStartWave();
        return;
      }
      if (key === "h") {
        toggleAutoUpgradeTower();
        return;
      }
      if (state.paused) return;
      for (let i = 0; i < towerHotkeys.length; i++) {
        if (towerHotkeys[i].includes(key) && towerButtons[i]) {
          const type = towerButtons[i].dataset.build;
          const t = towerTypes[type];
          if (!t) return;
          if (state.gameOver || state.paused || state.gold < t.cost) return;
          handleBuildSelect(type);
          return;
        }
      }
      if (key === "u") {
        upgradeTower();
        return;
      }
      if (key === "v") {
        sellSelected();
        return;
      }
      if (key === "escape") {
        if (state.selectedBuild || state.aimingMeteor) {
          state.selectedBuild = null;
          state.aimingMeteor = false;
          state.statsMode = "unit";
          state.selectionLines = [];
          state.message = "Action canceled.";
          updateButtons();
        }
        return;
      }
      if (e.key === " ") {
        e.preventDefault();
        if (startWaveBtn.disabled) return;
        startWave();
      }
    });

    function drawGrid() {
      ctx.save();
      ctx.strokeStyle = "rgba(165, 201, 255, 0.07)";
      ctx.lineWidth = 1;
      for (let x = 0; x < W; x += grid) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, H);
        ctx.stroke();
      }
      for (let y = 0; y < H; y += grid) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(W, y);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawMapDecor() {
      ctx.save();
      ctx.strokeStyle = "rgba(95, 162, 255, 0.14)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(64, 260);
      ctx.bezierCurveTo(180, 220, 230, 250, 320, 205);
      ctx.moveTo(540, 410);
      ctx.bezierCurveTo(640, 360, 700, 390, 860, 350);
      ctx.stroke();
      ctx.restore();
    }

    const buildSpots = [];
    for (let y = grid; y <= H; y += grid) {
      for (let x = grid; x <= W - grid; x += grid) {
        buildSpots.push({ x, y });
      }
    }
    const buildSpotSet = new Set(buildSpots.map((s) => `${s.x},${s.y}`));
    const roadSpotSet = new Set(
      buildSpots
        .filter((spot) => tooCloseToPath(spot.x, spot.y))
        .map((spot) => `${spot.x},${spot.y}`)
    );

    function drawBuildSpots() {
      ctx.save();
      for (const spot of buildSpots) {
        const blocked = roadSpotSet.has(`${spot.x},${spot.y}`);
        const occupied = !!towerAt(spot.x, spot.y);
        if (blocked) {
          ctx.fillStyle = "rgba(255, 99, 146, 0.18)";
          ctx.strokeStyle = "rgba(255, 145, 176, 0.4)";
        } else {
          ctx.fillStyle = occupied ? "rgba(100, 190, 255, 0.06)" : "rgba(77, 255, 226, 0.11)";
          ctx.strokeStyle = occupied ? "rgba(141, 183, 244, 0.2)" : "rgba(77, 255, 226, 0.35)";
        }
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.rect(spot.x - PAD_HALF, spot.y - PAD_HALF, PAD_HALF * 2, PAD_HALF * 2);
        ctx.fill();
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawPath() {
      ctx.save();
      ctx.lineCap = "round";
      ctx.lineJoin = "round";

      const grad = ctx.createLinearGradient(0, 60, W, 390);
      grad.addColorStop(0, "rgba(240,163,89,0.95)");
      grad.addColorStop(1, "rgba(240,99,146,0.9)");

      ctx.strokeStyle = "rgba(255, 255, 255, 0.14)";
      ctx.lineWidth = 44;
      ctx.beginPath();
      ctx.moveTo(path[0].x, path[0].y);
      for (let i = 1; i < path.length; i++) ctx.lineTo(path[i].x, path[i].y);
      ctx.stroke();

      ctx.strokeStyle = grad;
      ctx.lineWidth = 28;
      ctx.beginPath();
      ctx.moveTo(path[0].x, path[0].y);
      for (let i = 1; i < path.length; i++) ctx.lineTo(path[i].x, path[i].y);
      ctx.stroke();

      ctx.strokeStyle = "rgba(255,255,255,0.3)";
      ctx.setLineDash([10, 18]);
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(path[0].x, path[0].y);
      for (let i = 1; i < path.length; i++) ctx.lineTo(path[i].x, path[i].y);
      ctx.stroke();
      ctx.restore();
    }

    function drawCore() {
      const x = W - 6;
      const y = path[path.length - 1].y;
      const postVictoryPalette = state.wave > 100;
      ctx.save();
      ctx.translate(x, y);
      ctx.fillStyle = postVictoryPalette ? "rgba(24, 62, 44, 0.5)" : "rgba(20, 48, 65, 0.45)";
      ctx.beginPath();
      ctx.arc(0, 0, 40, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = postVictoryPalette ? "#2f8a63" : "#2f6f8a";
      ctx.beginPath();
      ctx.arc(0, 0, 23, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = postVictoryPalette ? "#a7f0c8" : "#8fc1d7";
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.restore();
    }

    function drawTowers() {
      for (const t of state.towers) {
        ctx.save();
        if (t === state.selectedTower) {
          ctx.strokeStyle = `${t.color}cc`;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(t.x, t.y, t.range, 0, Math.PI * 2);
          ctx.stroke();
        }

        ctx.translate(t.x, t.y);
        const nextShot = (t.shotCount || 0) + 1;
        const emberReady = t.burningCycle && nextShot % t.burningCycle === 0;
        const burstReady = t.burstCycle && nextShot % t.burstCycle === 0;
        const specialReady = emberReady || burstReady;
        if (specialReady) {
          ctx.globalAlpha = 0.22;
          ctx.fillStyle = t.color;
          ctx.beginPath();
          ctx.arc(0, 0, 18.5, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
        }
        if (t.type === "dart") {
          ctx.strokeStyle = "rgba(190, 204, 220, 0.4)";
          ctx.lineWidth = 1.2;
          for (let i = 0; i < 4; i++) {
            const a = performance.now() * 0.003 + i * (Math.PI / 2);
            ctx.beginPath();
            ctx.moveTo(Math.cos(a) * 8, Math.sin(a) * 8);
            ctx.lineTo(Math.cos(a) * 13, Math.sin(a) * 13);
            ctx.stroke();
          }
          ctx.fillStyle = "rgba(210, 221, 232, 0.22)";
          ctx.beginPath();
          ctx.moveTo(0, -13);
          ctx.lineTo(9, 0);
          ctx.lineTo(0, 13);
          ctx.lineTo(-9, 0);
          ctx.closePath();
          ctx.fill();
        }
        if (t.type === "scatter") {
          ctx.fillStyle = "rgba(255, 154, 216, 0.28)";
          for (let i = 0; i < 5; i++) {
            const a = t.angle + i * (Math.PI * 2 / 5);
            ctx.beginPath();
            ctx.ellipse(Math.cos(a) * 10, Math.sin(a) * 10, 5.2, 2.8, a, 0, Math.PI * 2);
            ctx.fill();
          }
        }
        if (t.type === "cannon") {
          ctx.fillStyle = "rgba(243, 211, 71, 0.2)";
          ctx.beginPath();
          ctx.arc(0, 0, 20, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = "rgba(255, 206, 102, 0.45)";
          ctx.lineWidth = 2;
          ctx.strokeRect(-9, -9, 18, 18);
        }
        if (t.type === "frost") {
          ctx.strokeStyle = "rgba(166, 185, 255, 0.6)";
          ctx.lineWidth = 1.4;
          for (let i = 0; i < 6; i++) {
            const a = t.angle + i * (Math.PI / 3);
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(Math.cos(a) * 14, Math.sin(a) * 14);
            ctx.stroke();
          }
          ctx.beginPath();
          ctx.arc(0, 0, 6, 0, Math.PI * 2);
          ctx.stroke();
        }
        if (t.type === "storm") {
          ctx.strokeStyle = "rgba(125, 217, 255, 0.48)";
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.arc(0, 0, 20, 0, Math.PI * 2);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(-7, -10);
          ctx.lineTo(-1, -2);
          ctx.lineTo(-6, 1);
          ctx.lineTo(2, 10);
          ctx.lineTo(0, 2);
          ctx.lineTo(6, -1);
          ctx.stroke();
        }
        if (t.type === "venom") {
          ctx.fillStyle = "rgba(135, 255, 148, 0.28)";
          ctx.beginPath();
          ctx.arc(-8, 4, 3.2, 0, Math.PI * 2);
          ctx.arc(0, -9, 2.6, 0, Math.PI * 2);
          ctx.arc(8, 1, 3, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = "rgba(92, 227, 112, 0.42)";
          ctx.lineWidth = 1.2;
          ctx.beginPath();
          ctx.moveTo(-8, 4);
          ctx.quadraticCurveTo(0, -4, 8, 1);
          ctx.stroke();
        }
        if (t.type === "rail") {
          ctx.strokeStyle = "rgba(255, 126, 126, 0.5)";
          ctx.lineWidth = 1.6;
          ctx.beginPath();
          ctx.moveTo(-13, -7);
          ctx.lineTo(12, -7);
          ctx.moveTo(-13, 7);
          ctx.lineTo(12, 7);
          ctx.moveTo(-9, 0);
          ctx.lineTo(10, 0);
          ctx.stroke();
          ctx.fillStyle = "rgba(255, 170, 170, 0.22)";
          ctx.fillRect(-10, -4, 16, 8);
        }
        if (t.type === "mortar") {
          ctx.strokeStyle = "rgba(219, 200, 165, 0.42)";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(0, 0, 22, 0, Math.PI * 2);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(-8, 10);
          ctx.lineTo(0, -12);
          ctx.lineTo(8, 10);
          ctx.stroke();
        }
        if (t.type === "ion") {
          ctx.strokeStyle = "rgba(114, 255, 208, 0.55)";
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.arc(0, 0, 21, 0, Math.PI * 2);
          ctx.stroke();
          ctx.beginPath();
          ctx.arc(0, 0, 10, 0, Math.PI * 2);
          ctx.stroke();
          for (let i = 0; i < 3; i++) {
            const a = performance.now() * 0.002 + (Math.PI * 2 * i) / 3;
            ctx.fillStyle = "#9fffe3";
            ctx.beginPath();
            ctx.arc(Math.cos(a) * 11, Math.sin(a) * 11, 2.4, 0, Math.PI * 2);
            ctx.fill();
          }
        }
        if ((t.type === "ember" && emberReady) || (t.type === "rail" && burstReady)) {
          const pulse = 0.5 + Math.sin(performance.now() * 0.01 + t.x * 0.03) * 0.5;
          ctx.globalAlpha = 0.14 + pulse * 0.2;
          ctx.fillStyle = t.color;
          ctx.beginPath();
          ctx.arc(0, 0, 22, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
        }
        if (t.type === "ember") {
          ctx.fillStyle = "#2f1b13";
          ctx.beginPath();
          ctx.moveTo(0, -10);
          ctx.lineTo(9, 0);
          ctx.lineTo(0, 10);
          ctx.lineTo(-9, 0);
          ctx.closePath();
          ctx.fill();
          ctx.fillStyle = "#ffb36a";
          ctx.beginPath();
          ctx.moveTo(0, -6);
          ctx.lineTo(5, 0);
          ctx.lineTo(0, 6);
          ctx.lineTo(-5, 0);
          ctx.closePath();
          ctx.fill();
        }
        ctx.fillStyle = "rgba(7, 17, 29, 0.95)";
        ctx.strokeStyle = t.color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, 0, 16, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        if (t.upgradeFx > 0) {
          ctx.globalAlpha = Math.min(1, t.upgradeFx * 2.2);
          ctx.strokeStyle = "#fff0a8";
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(0, 0, 20 + (1 - t.upgradeFx) * 24, 0, Math.PI * 2);
          ctx.stroke();
          ctx.globalAlpha = 1;
        }

        ctx.rotate(t.angle || 0);
        ctx.fillStyle = t.color;
        if (t.type === "dart") {
          ctx.beginPath();
          ctx.lineTo(-1.25, -2.5);
          ctx.lineTo(14, -2.5);
          ctx.lineTo(19, 0);
          ctx.lineTo(14, 2.5);
          ctx.lineTo(-1.25, 2.5);
          ctx.closePath();
          ctx.fill();
        } else if (t.type === "scatter") {
          const barrelCount = Math.max(1, t.pellets || 1);
          const barrelSpread = Math.min(0.5, 0.12 + barrelCount * 0.035);
          for (let i = 0; i < barrelCount; i++) {
            const spreadAngle = barrelCount === 1 ? 0 : ((i / (barrelCount - 1)) * 2 - 1) * barrelSpread;
            ctx.save();
            ctx.rotate(spreadAngle);
            ctx.beginPath();
            ctx.moveTo(0.625, -1.45);
            ctx.lineTo(16.2, -1.0);
            ctx.lineTo(19.2, 0);
            ctx.lineTo(16.2, 1.0);
            ctx.lineTo(0.625, 1.45);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
          }
        } else if (t.type === "cannon") {
          ctx.fillRect(-2, -4.2, 18, 8.4);
          ctx.fillStyle = "#f9e082";
          ctx.fillRect(10, -1.6, 7, 3.2);
        } else if (t.type === "frost") {
          ctx.beginPath();
          ctx.moveTo(-2, -2.7);
          ctx.lineTo(10, -2.7);
          ctx.lineTo(16, 0);
          ctx.lineTo(10, 2.7);
          ctx.lineTo(-2, 2.7);
          ctx.closePath();
          ctx.fill();
        } else if (t.type === "storm") {
          ctx.fillRect(-3, -3.5, 15, 7);
          ctx.beginPath();
          ctx.moveTo(12, -4.5);
          ctx.lineTo(18, 0);
          ctx.lineTo(12, 4.5);
          ctx.closePath();
          ctx.fill();
        } else if (t.type === "venom") {
          ctx.beginPath();
          ctx.moveTo(-3, -3);
          ctx.quadraticCurveTo(10, -5.5, 17, 0);
          ctx.quadraticCurveTo(10, 5.5, -3, 3);
          ctx.closePath();
          ctx.fill();
        } else if (t.type === "rail") {
          ctx.fillRect(-3, -2.5, 18, 5);
          ctx.fillRect(13, -1.1, 5, 2.2);
        } else if (t.type === "mortar") {
          ctx.fillRect(-3, -5, 10, 10);
          ctx.save();
          ctx.fillRect(-3, -4, 24, 8);
          ctx.restore();
        } else if (t.type === "ion") {
          ctx.fillRect(-1.5, -2.2, 8.5, 4.4);
          ctx.beginPath();
          ctx.arc(10, 0, 4.8, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "rgba(159, 255, 227, 0.75)";
          ctx.beginPath();
          ctx.arc(10, 0, 2.1, 0, Math.PI * 2);
          ctx.fill();
        } else if (t.type === "ember") {
          ctx.beginPath();
          ctx.arc(10, 0, 6, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "rgba(255, 186, 112, 0.85)";
          ctx.beginPath();
          ctx.arc(10, 0, 2.5, 0, Math.PI * 2);
          ctx.fill();
        } else {
          ctx.fillRect(-3, -4, 22, 8);
        }
        if (t.level > 1) {
          ctx.rotate(-(t.angle || 0));
          ctx.fillStyle = "#f5fbff";
          ctx.font = "700 10px 'Space Grotesk', sans-serif";
          ctx.textAlign = "center";
          ctx.fillText(`L${t.level}`, 0, 28);
          ctx.textAlign = "start";
        }
        ctx.restore();
      }
    }

    function drawPoly(x, y, radius, sides, rotation = 0) {
      ctx.beginPath();
      for (let i = 0; i < sides; i++) {
        const a = rotation + (i * Math.PI * 2) / sides;
        const px = x + Math.cos(a) * radius;
        const py = y + Math.sin(a) * radius;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
    }

    function pathRoundedRect(x, y, w, h, r) {
      const radius = Math.max(0, Math.min(r, w / 2, h / 2));
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + w - radius, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
      ctx.lineTo(x + w, y + h - radius);
      ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
      ctx.lineTo(x + radius, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
    }

    function drawEnemies() {
      for (const e of state.enemies) {
        ctx.save();
        ctx.translate(e.x, e.y);
        ctx.fillStyle = e.color;
        if (e.kind === "swarm") {
          drawPoly(0, 0, e.r + 1, 3, -Math.PI / 2);
          ctx.fill();
        } else if (e.kind === "striker") {
          drawPoly(0, 0, e.r + 1, 4, Math.PI / 4);
          ctx.fill();
          ctx.fillStyle = "#53331f";
          ctx.beginPath();
          ctx.arc(0, 0, e.r * 0.3, 0, Math.PI * 2);
          ctx.fill();
        } else if (e.kind === "fast") {
          ctx.save();
          ctx.rotate(Math.PI / 4);
          ctx.fillRect(-e.r * 0.85, -e.r * 0.85, e.r * 1.7, e.r * 1.7);
          ctx.restore();
        } else if (e.kind === "bulwark") {
          drawPoly(0, 0, e.r + 1, 8, Math.PI / 8);
          ctx.fill();
          ctx.strokeStyle = "#d3e0ec";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(-e.r * 0.55, 0);
          ctx.lineTo(e.r * 0.55, 0);
          ctx.moveTo(0, -e.r * 0.55);
          ctx.lineTo(0, e.r * 0.55);
          ctx.stroke();
        } else if (e.kind === "armored") {
          ctx.fillRect(-e.r, -e.r, e.r * 2, e.r * 2);
          ctx.strokeStyle = "#d6e4ef";
          ctx.lineWidth = 2;
          ctx.strokeRect(-e.r + 2, -e.r + 2, e.r * 2 - 4, e.r * 2 - 4);
        } else if (e.kind === "leech") {
          ctx.beginPath();
          ctx.arc(0, 0, e.r, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#173d3a";
          ctx.beginPath();
          ctx.arc(0, 0, e.r * 0.46, 0, Math.PI * 2);
          ctx.fill();
        } else if (e.kind === "boss") {
          drawPoly(0, 0, e.r + 1, 6, Math.PI / 6);
          ctx.fill();
        } else if (e.kind === "finalBoss") {
          drawPoly(0, 0, e.r + 3, 6, Math.PI / 6);
          ctx.fill();
          ctx.fillStyle = "rgba(53, 44, 73, 0.7)";
          drawPoly(0, 0, e.r * 0.76, 6, Math.PI / 6);
          ctx.fill();
          ctx.fillStyle = "rgba(216, 196, 255, 0.24)";
          drawPoly(0, 0, e.r * 0.54, 6, Math.PI / 6);
          ctx.fill();
          ctx.fillStyle = "#e0ccff";
          ctx.beginPath();
          ctx.arc(0, 0, e.r * 0.28, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = "#d8c2ff";
          ctx.lineWidth = 2.2;
          ctx.beginPath();
          ctx.arc(0, 0, e.r * 0.48, 0, Math.PI * 2);
          ctx.stroke();
          ctx.strokeStyle = "#44355e";
          ctx.lineWidth = 2.8;
          ctx.beginPath();
          ctx.moveTo(-e.r * 0.5, -e.r * 0.18);
          ctx.lineTo(e.r * 0.5, -e.r * 0.18);
          ctx.moveTo(-e.r * 0.5, e.r * 0.18);
          ctx.lineTo(e.r * 0.5, e.r * 0.18);
          ctx.stroke();
        } else {
          ctx.beginPath();
          ctx.arc(0, 0, e.r, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.strokeStyle = "rgba(0,0,0,0.4)";
        ctx.lineWidth = 2;
        if (e.kind === "armored") {
          ctx.strokeRect(-e.r, -e.r, e.r * 2, e.r * 2);
        } else if (e.kind === "bulwark") {
          drawPoly(0, 0, e.r + 1, 8, Math.PI / 8);
          ctx.stroke();
        } else if (e.kind === "striker") {
          drawPoly(0, 0, e.r + 1, 4, Math.PI / 4);
          ctx.stroke();
        } else if (e.kind === "fast") {
          ctx.save();
          ctx.rotate(Math.PI / 4);
          ctx.strokeRect(-e.r * 0.85, -e.r * 0.85, e.r * 1.7, e.r * 1.7);
          ctx.restore();
        } else if (e.kind === "swarm") {
          drawPoly(0, 0, e.r + 1, 3, -Math.PI / 2);
          ctx.stroke();
        } else if (e.kind === "boss") {
          drawPoly(0, 0, e.r + 1, 6, Math.PI / 6);
          ctx.stroke();
        } else if (e.kind === "finalBoss") {
          drawPoly(0, 0, e.r + 3, 6, Math.PI / 6);
          ctx.stroke();
        } else {
          ctx.beginPath();
          ctx.arc(0, 0, e.r, 0, Math.PI * 2);
          ctx.stroke();
        }

        const hpW = e.r * 2;
        const hpY = -e.r - 10;
        ctx.fillStyle = "rgba(10, 20, 30, 0.7)";
        ctx.fillRect(-hpW / 2, hpY, hpW, 4);
        ctx.fillStyle = "#75e9a7";
        ctx.fillRect(-hpW / 2, hpY, hpW * Math.max(0, e.hp / e.maxHp), 4);

        if (e.slowTimer > 0) {
          ctx.strokeStyle = "rgba(170, 201, 255, 0.8)";
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.arc(0, 0, e.r + 3, 0, Math.PI * 2);
          ctx.stroke();
        }
        if (e.poisonTimer > 0) {
          ctx.strokeStyle = "rgba(128, 255, 173, 0.85)";
          ctx.lineWidth = 1.3;
          ctx.setLineDash([3, 4]);
          ctx.beginPath();
          ctx.arc(0, 0, e.r + 5, 0, Math.PI * 2);
          ctx.stroke();
          ctx.setLineDash([]);
        }
        if (e.burningTimer > 0) {
          const f = 0.25 + Math.random() * 0.2;
          ctx.fillStyle = `rgba(255, 131, 72, ${f})`;
          ctx.beginPath();
          ctx.arc(0, 0, e.r + 2, 0, Math.PI * 2);
          ctx.fill();
        }
        if (e.damageAmpTimer > 0) {
          ctx.strokeStyle = e.damageAmpColor || "#f58cff";
          ctx.lineWidth = 1.4;
          ctx.beginPath();
          ctx.moveTo(0, -e.r - 8);
          ctx.lineTo(4, -e.r - 3);
          ctx.lineTo(-4, -e.r - 3);
          ctx.closePath();
          ctx.stroke();
        }
        ctx.restore();
      }
    }

    function drawProjectiles() {
      for (const p of state.projectiles) {
        ctx.save();
        const angle = Math.atan2(p.vy, p.vx);
        const tailX = p.x - p.vx * 0.02;
        const tailY = p.y - p.vy * 0.02;
        if (p.type !== "scatter" && p.type !== "ember") {
          ctx.strokeStyle = `${p.color}aa`;
          ctx.lineWidth = p.splash ? 2.2 : 1.5;
          ctx.beginPath();
          ctx.moveTo(tailX, tailY);
          ctx.lineTo(p.x, p.y);
          ctx.stroke();
        }
        ctx.translate(p.x, p.y);
        ctx.rotate(angle);
        ctx.fillStyle = p.color;
        if (p.type === "dart") {
          ctx.beginPath();
          ctx.moveTo(6, 0);
          ctx.lineTo(-3, -2.2);
          ctx.lineTo(-1.2, 0);
          ctx.lineTo(-3, 2.2);
          ctx.closePath();
          ctx.fill();
        } else if (p.type === "scatter") {
          ctx.beginPath();
          ctx.arc(0, 0, 2, 0, Math.PI * 2);
          ctx.fill();
        } else if (p.type === "rail") {
          ctx.fillRect(-8, -2.1, 16, 4.2);
          ctx.fillStyle = "rgba(255, 230, 230, 0.8)";
          ctx.fillRect(4.5, -1.25, 5.5, 2.5);
        } else if (p.type === "storm" || p.chainTargets > 0) {
          ctx.beginPath();
          ctx.moveTo(5, -4);
          ctx.lineTo(0, -1);
          ctx.lineTo(3, 0);
          ctx.lineTo(-5, 4);
          ctx.lineTo(-1, 1);
          ctx.lineTo(-3, 0);
          ctx.closePath();
          ctx.fill();
        } else if (p.type === "ember" || p.burningDps > 0) {
          ctx.beginPath();
          ctx.arc(0, 0, 5.4, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "rgba(255, 207, 139, 0.65)";
          ctx.beginPath();
          ctx.arc(-1.1, -1.1, 2.7, 0, Math.PI * 2);
          ctx.fill();
        } else if (p.type === "venom") {
          ctx.beginPath();
          ctx.arc(0, 0, 4.4, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "rgba(206, 255, 214, 0.75)";
          ctx.beginPath();
          ctx.arc(1, -1, 1.7, 0, Math.PI * 2);
          ctx.fill();
        } else if (p.type === "frost") {
          ctx.strokeStyle = "rgba(220, 236, 255, 0.85)";
          ctx.lineWidth = 1.2;
          ctx.beginPath();
          ctx.moveTo(7, 0);
          ctx.lineTo(1.5, -3.2);
          ctx.lineTo(-2.2, -1.8);
          ctx.lineTo(-5.5, 0);
          ctx.lineTo(-2.2, 1.8);
          ctx.lineTo(1.5, 3.2);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(-1, -3.3);
          ctx.lineTo(2.4, 0);
          ctx.lineTo(-1, 3.3);
          ctx.stroke();
        } else if (p.type === "ion") {
          ctx.strokeStyle = `${p.color}cc`;
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.arc(0, 0, 4.6, 0, Math.PI * 2);
          ctx.stroke();
          ctx.beginPath();
          ctx.arc(0, 0, 1.9, 0, Math.PI * 2);
          ctx.fill();
        } else if (p.type === "mortar" || p.splash > 0) {
          ctx.beginPath();
          ctx.arc(0, 0, 5.7, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "rgba(255, 241, 205, 0.6)";
          ctx.beginPath();
          ctx.arc(-1.5, -1.5, 2.2, 0, Math.PI * 2);
          ctx.fill();
        } else {
          ctx.beginPath();
          ctx.arc(0, 0, p.splash ? 5.5 : 3.8, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }
    }

    function drawParticles() {
      for (const p of state.particles) {
        ctx.save();
        ctx.globalAlpha = Math.max(0, p.life * 1.5);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function drawHazards() {
      for (const h of state.hazards) {
        ctx.save();
        if (h.age >= (h.activeDelay || 0)) {
          const activeAge = h.age - (h.activeDelay || 0);
          const boost = Math.exp(-activeAge * 3.2);
          const lifeRatio = h.maxLife ? Math.max(0, h.life / h.maxLife) : 1;
          const alpha = Math.min(0.5, Math.max(0.05, lifeRatio * 0.28 + boost * 0.22));
          const g = ctx.createRadialGradient(h.x, h.y, 8, h.x, h.y, h.radius);
          g.addColorStop(0, `rgba(255, 204, 150, ${alpha})`);
          g.addColorStop(1, `rgba(255, 93, 72, ${alpha})`);
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(h.x, h.y, h.radius, 0, Math.PI * 2);
          ctx.fill();
        }
        if (h.age < (h.activeDelay || 0)) {
          const p = h.age / (h.activeDelay || 0.08);
          ctx.strokeStyle = `rgba(255, 210, 150, ${1 - p})`;
          ctx.lineWidth = 2.2;
          ctx.beginPath();
          ctx.arc(h.x, h.y, h.radius * (0.25 + 0.85 * p), 0, Math.PI * 2);
          ctx.stroke();
          ctx.fillStyle = `rgba(255, 170, 120, ${0.35 * (1 - p)})`;
          ctx.beginPath();
          ctx.arc(h.x, h.y, h.radius * 0.35 * (1 - p), 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }
    }

    function drawPlacementGhost() {
      if (!state.selectedBuild || state.gameOver || state.aimingMeteor) return;
      const t = towerTypes[state.selectedBuild];
      if (!mouse || !mouse.inside) return;

      const x = Math.round(mouse.x / grid) * grid;
      const y = Math.round(mouse.y / grid) * grid;
      const ok = canPlace(x, y) && state.gold >= t.cost;

      ctx.save();
      ctx.globalAlpha = 0.75;
      ctx.strokeStyle = ok ? "rgba(129, 244, 149, 0.95)" : "rgba(255, 93, 125, 0.95)";
      ctx.fillStyle = ok ? "rgba(129, 244, 149, 0.15)" : "rgba(255, 93, 125, 0.15)";

      ctx.beginPath();
      ctx.arc(x, y, t.range, 0, Math.PI * 2);
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(x, y, 16, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }

    function drawMeteorMarker() {
      if (!state.aimingMeteor || !mouse || !mouse.inside) return;
      const now = Date.now();
      if (now < state.meteorReadyAt) return;
      const x = state.meteorAimX;
      const y = state.meteorAimY;

      ctx.save();
      ctx.strokeStyle = "rgba(255, 127, 80, 0.9)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(x, y, METEOR_RADIUS, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x - 14, y);
      ctx.lineTo(x + 14, y);
      ctx.moveTo(x, y - 14);
      ctx.lineTo(x, y + 14);
      ctx.stroke();
      ctx.restore();
    }

    function colorToRgba(color, alpha) {
      if (!color || color[0] !== "#" || color.length !== 7) return color;
      const r = parseInt(color.slice(1, 3), 16);
      const g = parseInt(color.slice(3, 5), 16);
      const b = parseInt(color.slice(5, 7), 16);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function darkenRgba(color, alpha, factor = 0.7) {
      const match = /^rgba\((\d+),\s*(\d+),\s*(\d+),\s*([0-9.]+)\)$/.exec(color || "");
      if (!match) return color;
      const r = Math.round(Number(match[1]) * factor);
      const g = Math.round(Number(match[2]) * factor);
      const b = Math.round(Number(match[3]) * factor);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function getButtonStyle(kind, disabled) {
      const styles = {
        base: { fill: ["rgba(17, 41, 68, 0.9)", "rgba(10, 27, 45, 0.9)"], stroke: "rgba(149, 194, 255, 0.45)" },
        primary: { fill: ["#1f5f94", "#194673"], stroke: "rgba(125, 203, 255, 0.6)" },
        warn: { fill: ["#653253", "#49253b"], stroke: "rgba(255, 143, 181, 0.6)" },
        upgrade: { fill: ["#9a5a1d", "#6f3f12"], stroke: "rgba(255, 185, 112, 0.7)" },
        sell: { fill: ["#a68f1f", "#796713"], stroke: "rgba(255, 234, 129, 0.7)" }
      };
      const palette = styles[kind] || styles.base;
      if (disabled) {
        const dark = palette.fill[1];
        const darkFill = dark.startsWith("#") ? colorToRgba(dark, 0.78) : dark;
        const darkStroke = darkenRgba(palette.stroke, 0.55);
        return { fill: [darkFill, darkFill], stroke: darkStroke || palette.stroke, text: "#8b9ab1" };
      }
      return { ...palette, text: "#e8f1ff" };
    }

    function drawUiButton(x, y, w, h, label, kind, disabled, glow = false) {
      const style = getButtonStyle(kind, disabled);
      const grad = ctx.createLinearGradient(x, y, x, y + h);
      grad.addColorStop(0, style.fill[0]);
      grad.addColorStop(1, style.fill[1]);
      ctx.save();
      if (glow) {
        ctx.shadowColor = "rgba(255, 179, 71, 0.6)";
        ctx.shadowBlur = 18;
      }
      ctx.fillStyle = grad;
      ctx.strokeStyle = style.stroke;
      ctx.lineWidth = disabled ? 1.2 : 1.6;
      ctx.beginPath();
      ctx.rect(x, y, w, h);
      ctx.fill();
      ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.fillStyle = style.text || "#e8f1ff";
      ctx.font = "700 13px 'Space Grotesk', sans-serif";
      ctx.textAlign = "center";
      ctx.fillText(label, x + w / 2, y + h / 2 + 4);
      ctx.textAlign = "start";
      ctx.restore();
    }

    function drawTopRightControls(showPause = true, pauseId = "pause") {
      const layout = getUiLayout();
      const btnW = 30;
      const btnH = 20;
      const btnGap = 6;
      const fsX = W - layout.pad - btnW;
      const pauseX = fsX - btnGap - btnW;
      const btnY = 6;
      const fsLabel = document.fullscreenElement ? "⤡" : "⤢";
      if (showPause) {
        drawUiButton(pauseX, btnY, btnW, btnH, pauseBtn.textContent, "base", false);
        uiState.buttons.push({ x: pauseX, y: btnY, w: btnW, h: btnH, id: pauseId, disabled: false });
      }
      drawUiButton(fsX, btnY, btnW, btnH, fsLabel, "base", false);
      uiState.buttons.push({ x: fsX, y: btnY, w: btnW, h: btnH, id: "fullscreen", disabled: false });
    }

    function drawCanvasUI() {
      uiState.buttons = [];
      uiState.buildButtons = [];
      uiState.pauseButtons = [];
      uiState.victoryButtons = [];
      uiState.startButtons = [];
      uiState.menuButtons = [];
      const layout = getUiLayout();

      if (state.screen === "start") {
        ctx.save();
        ctx.fillStyle = "rgba(6, 12, 20, 0.78)";
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = "#d9f0ff";
        ctx.font = "700 52px 'Bungee', sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("TD", W / 2, H / 2 - 40);
        ctx.fillStyle = "#b6c8e3";
        ctx.font = "600 16px 'Space Grotesk', sans-serif";
        ctx.fillText("Place towers. Stop the enemies. Protect the core.", W / 2, H / 2 - 10);
        const bw = 200;
        const bh = 40;
        const gap = 10;
        const totalH = bh * 4 + gap * 3;
        const bx = W / 2 - bw / 2;
        let by = H / 2 + 10;
        const buttons = [
          { id: "start", label: "Start", kind: "primary", disabled: false },
          { id: "load", label: "Load", kind: "primary", disabled: !hasSavedGame() },
          { id: "cloudLoad", label: "Cloud Load", kind: "primary", disabled: false },
          { id: "encyclopedia", label: "Encyclopedia", kind: "primary", disabled: false }
        ];
        for (const btn of buttons) {

      ctx.save();
      ctx.fillStyle = "rgba(7, 16, 28, 0.78)";

      ctx.moveTo(0, layout.topBarH - 0.5);

      ctx.fillText(`HP ${state.health}`, layout.pad + 90, 20);
      ctx.fillStyle = "#cbe3ff";
      ctx.fillText(`Wave ${state.wave}`, layout.pad + 150, 20);
      ctx.fillText(`Score ${state.score}`, layout.pad + 220, 20);

      const btnW = 30;
      const btnH = 20;
      const btnGap = 6;
      const fsX = W - layout.pad - btnW;

      const btnY = 6;

      uiState.buttons.push({ x: fsX, y: btnY, w: btnW, h: btnH, id: "fullscreen", disabled: false });

      const msg = state.message || "";
      const age = (Date.now() - (state.messageAt || Date.now())) / 1000;
      const opacity = msg ? (age < 1.4 ? 1 : Math.max(0, 1 - (age - 1.4) / 0.6)) : 0;
      ctx.globalAlpha = opacity;
      ctx.textAlign = "right";
      ctx.fillStyle = "#cfe3ff";
      ctx.fillText(msg, pauseX - 8, 20);
      ctx.textAlign = "start";
      ctx.globalAlpha = 1;
      ctx.restore();

      const buildList = towerButtons.map((btn) => btn.dataset.build);
      const itemH = 41;
      const headerH = 26;
      let by = layout.buildY;
      ctx.save();
      ctx.fillStyle = "rgba(12, 26, 40, 0.9)";
      ctx.beginPath();
      ctx.rect(layout.buildX, by, layout.buildW, headerH);
      ctx.fill();
      ctx.fillStyle = "#cfe4ff";
      ctx.font = "700 13px 'Space Grotesk', sans-serif";
      ctx.textBaseline = "middle";
      ctx.fillText("Build Towers", layout.buildX, by + headerH / 2);
      ctx.textBaseline = "alphabetic";
      ctx.restore();
      by += headerH + 6;
      const listTop = by;
      for (const type of buildList) {
        if (by + itemH > layout.buildY + layout.buildH) break;
        const t = towerTypes[type];
        const disabled = state.paused || state.gameOver || state.victory || state.gold < t.cost;
        const active = state.selectedBuild === type;
        ctx.save();
        ctx.fillStyle = disabled ? "rgba(9, 16, 26, 0.65)" : "rgba(12, 24, 38, 0.9)";
        if (active) ctx.fillStyle = "rgba(32, 54, 74, 0.92)";
        ctx.strokeStyle = active ? "rgba(129, 244, 149, 0.95)" : "rgba(160, 200, 255, 0.5)";
        ctx.lineWidth = active ? 1.6 : 1.2;
        ctx.beginPath();
        ctx.rect(layout.buildX, by, layout.buildW, itemH - 6);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = t.color;
        ctx.beginPath();
        ctx.arc(layout.buildX + 16, by + 18, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.textBaseline = "top";
        ctx.fillStyle = disabled ? "#8ea0b8" : "#e9f2ff";
        ctx.font = "600 11px 'Space Grotesk', sans-serif";
        ctx.fillText(`${t.name} ($${t.cost})`, layout.buildX + 30, by + 8);
        ctx.fillStyle = "#a9bfdc";
        ctx.font = "500 9.5px 'Space Grotesk', sans-serif";
        ctx.fillText(t.desc || "", layout.buildX + 30, by + 20);
        ctx.textBaseline = "alphabetic";
        ctx.restore();
        uiState.buildButtons.push({ x: layout.buildX, y: by, w: layout.buildW, h: itemH - 6, type, disabled });
        by += itemH;
      }

      const statsLines = state.selectionLines || [];
      const statsX = layout.pad;
      const statsY = H - layout.bottomH + 4;
      const statsW = W - layout.sideW - layout.pad * 2;
      const statsH = layout.actionsH;
      ctx.save();
      ctx.fillStyle = "rgba(9, 21, 35, 0.62)";
      ctx.strokeStyle = "rgba(170, 210, 255, 0.58)";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.rect(statsX, statsY, statsW, statsH);
      ctx.fill();
      ctx.stroke();
      ctx.font = "600 11px 'Space Grotesk', sans-serif";
      const lineH = 14;
      const textBlockH = Math.max(1, statsLines.length) * lineH;
      let ty = statsY + (statsH - textBlockH) / 2 + 10;
      ctx.textAlign = "left";
      for (const line of statsLines) {
        ctx.fillStyle = line.tone === "upgrade" ? "#ffb765" : "#c9dbf5";
        ctx.fillText(line.text, statsX + 10, ty);
        ty += lineH;
      }
      ctx.restore();

      const actions = [
        { id: "startWave", label: startWaveBtn.textContent, kind: "primary", disabled: startWaveBtn.disabled, glow: state.waveReadyGlow && !state.gameOver && !state.paused },
        { id: "meteor", label: meteorBtn.textContent, kind: "warn", disabled: meteorBtn.disabled },
        { id: "upgrade", label: upgradeBtn.textContent, kind: "upgrade", disabled: upgradeBtn.disabled },
        { id: "sell", label: sellBtn.textContent, kind: "sell", disabled: sellBtn.disabled }
      ];
      const bw = 58;
      const gap = 8;
      const rightPad = 10;
      const totalW = actions.length * bw + (actions.length - 1) * gap;
      let ax = W - layout.sideW - totalW - layout.pad - rightPad;
      const ay = layout.actionsY + (layout.actionsH - 32) / 2;
      for (const btn of actions) {
        drawUiButton(ax, ay, bw, 32, btn.label, btn.kind || "base", btn.disabled, btn.glow);
        uiState.buttons.push({ x: ax, y: ay, w: bw, h: 32, id: btn.id, disabled: btn.disabled });
        ax += bw + gap;
      }
    }

    function updateMeteorEffects(dt) {
      for (let i = state.meteorEffects.length - 1; i >= 0; i--) {
        const fx = state.meteorEffects[i];
        fx.t += dt;
        if (!fx.done && fx.t >= fx.impactAt) {
          fx.done = true;
          const meteorDamageNow = state.meteorDamage || METEOR_DAMAGE;
          explode(fx.x, fx.y, METEOR_RADIUS, meteorDamageNow, "#ff7f50", 0, 0, true);
          state.message = "Meteor impact!";
        }
        if (fx.t >= 1.1) state.meteorEffects.splice(i, 1);
      }
    }

    function drawMeteorEffects() {
      for (const fx of state.meteorEffects) {
        const p = Math.min(1, fx.t / fx.impactAt);
        const meteorX = fx.x;
        const meteorY = -90 + (fx.y + 90) * p;
        const meteorR = 4 + p * 10;
        ctx.save();
        ctx.strokeStyle = `rgba(255, 160, 90, ${0.6 * (1 - p)})`;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(meteorX, meteorY - 18);
        ctx.lineTo(fx.x, fx.y);
        ctx.stroke();
        ctx.fillStyle = "#ffcf8b";
        ctx.beginPath();
        ctx.arc(meteorX, meteorY, meteorR, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        if (fx.done) {
          const boom = 1 - (fx.t - fx.impactAt) / 0.55;
          if (boom > 0) {
            ctx.save();
            ctx.strokeStyle = `rgba(255, 127, 80, ${boom})`;
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.arc(fx.x, fx.y, METEOR_RADIUS * (1 - boom * 0.65), 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();
          }
        }
      }
    }

    function drawGameOver() {

      ctx.font = "600 18px 'Space Grotesk', sans-serif";

      const bw = 160;
      const bh = 38;
      const gap = 12;
      const totalW = bw * 2 + gap;
      const bx = W / 2 - totalW / 2;
      const by = H / 2 + 46;

    function drawEncyclopediaMenu() {
      const tab = state.encyclopediaTab || "towers";
      const entries = tab === "enemies" ? getEnemyEncyclopediaEntries() : getTowerEncyclopediaEntries();
      const selected = entries.find((entry) => entry.key === state.encyclopediaKey) || entries[0];
      if (!selected) return;
      state.encyclopediaKey = selected.key;
      const towerLevel = Math.max(1, Math.min(10, state.encyclopediaTowerLevel || 1));
      const validEnemyWaves = tab === "enemies" ? getEnemyPreviewWaves(selected.key) : [];
      const enemyWave = tab === "enemies"
        ? (validEnemyWaves.includes(state.encyclopediaEnemyWave) ? state.encyclopediaEnemyWave : (validEnemyWaves[0] || 1))
        : Math.max(1, Math.min(999, state.encyclopediaEnemyWave || 1));
      const towerPreview = tab === "towers" ? getTowerPreviewAtLevel(selected.key, towerLevel) : null;
      const nextTowerPreview = tab === "towers" && towerLevel < 10 ? getTowerPreviewAtLevel(selected.key, towerLevel + 1) : null;

      uiState.menuButtons = [];
      ctx.save();
      ctx.fillStyle = "rgba(3, 9, 16, 0.82)";
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = "#d9f0ff";
      ctx.font = "700 34px 'Bungee', sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("Encyclopedia", W / 2, 84);

      const panelX = 96;
      const panelY = 108;
      const panelW = W - panelX * 2;
      const panelH = H - 158;
      const listW = 270;
      const tabW = 126;
      const tabH = 32;
      const tabY = panelY;
      const leftTabX = panelX;
      const rightTabX = leftTabX + tabW + 10;
      drawUiButton(leftTabX, tabY, tabW, tabH, "Towers", tab === "towers" ? "primary" : "base", false);
      drawUiButton(rightTabX, tabY, tabW, tabH, "Enemies", tab === "enemies" ? "primary" : "base", false);
      uiState.menuButtons.push({ x: leftTabX, y: tabY, w: tabW, h: tabH, id: "encyclopediaTab", tab: "towers", key: towerOrder[0], disabled: false });
      uiState.menuButtons.push({ x: rightTabX, y: tabY, w: tabW, h: tabH, id: "encyclopediaTab", tab: "enemies", key: "basic", disabled: false });

      const bodyY = panelY + tabH + 14;
      const bodyH = panelH - tabH - 14;
      ctx.fillStyle = "rgba(8, 19, 31, 0.94)";
      ctx.strokeStyle = "rgba(170, 210, 255, 0.58)";
      ctx.lineWidth = 1.6;
      ctx.beginPath();
      ctx.rect(panelX, bodyY, panelW, bodyH);
      ctx.fill();
      ctx.stroke();

      const listX = panelX + 14;
      const listY = bodyY + 14;
      const listH = bodyH - 28;
      const detailX = listX + listW + 18;
      const detailW = panelW - (detailX - panelX) - 14;

      ctx.fillStyle = "rgba(10, 25, 40, 0.98)";
      ctx.strokeStyle = "rgba(120, 164, 214, 0.42)";
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.rect(listX, listY, listW, listH);
      ctx.fill();
      ctx.stroke();
      ctx.beginPath();
      ctx.rect(detailX, listY, detailW, listH);
      ctx.fill();
      ctx.stroke();

      ctx.fillStyle = "#8fb0d3";
      ctx.font = "700 11px 'Space Grotesk', sans-serif";
      ctx.textAlign = "left";
      ctx.fillText(tab === "towers" ? "Archives" : "Archives", listX + 14, listY + 18);
      ctx.fillText("Information", detailX + 16, listY + 18);

      const itemH = 36;
      const listInnerY = listY + 28;
      const listInnerH = listH - 40;
      const maxRows = 5;
      const columnCount = Math.max(1, Math.ceil(entries.length / maxRows));
      const columnGap = 8;
      const usableListW = listW - 24;
      const itemW = Math.max(108, Math.floor((usableListW - columnGap * (columnCount - 1)) / columnCount));
      entries.forEach((entry, idx) => {
        const col = Math.floor(idx / maxRows);
        const row = idx % maxRows;
        const x = listX + 12 + col * (itemW + columnGap);
        const y = listInnerY + row * itemH;
        const active = entry.key === selected.key;
        ctx.fillStyle = active ? "rgba(34, 63, 90, 0.98)" : "rgba(16, 30, 46, 0.98)";
        ctx.strokeStyle = active ? `${entry.color || "#ffbf7e"}cc` : "rgba(144, 184, 232, 0.28)";
        pathRoundedRect(x, y, itemW, itemH - 6, 10);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = entry.color || "#cfe3ff";
        ctx.beginPath();
        ctx.arc(x + 16, y + 16, 7, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#e9f2ff";
        ctx.font = "700 11px 'Space Grotesk', sans-serif";
        ctx.textAlign = "left";
        ctx.fillText(entry.name, x + 31, y + 18, itemW - 38);
        uiState.menuButtons.push({ x, y, w: itemW, h: itemH - 6, id: "encyclopediaEntry", key: entry.key, disabled: false });
      });

      ctx.fillStyle = selected.color || "#d9f0ff";
      ctx.font = "700 20px 'Bungee', sans-serif";
      ctx.fillText(selected.name, detailX + 16, listY + 48);
      const controlLabel = tab === "towers" ? `Lv ${towerLevel}` : `Wave ${enemyWave}`;
      const controlValue = tab === "towers" ? towerLevel : enemyWave;
      const decId = tab === "towers" ? "encyclopediaTowerLevelDelta" : "encyclopediaEnemyWaveDelta";
      const incId = decId;
      const minValue = tab === "towers" ? 1 : (validEnemyWaves[0] || 1);
      const maxValue = tab === "towers" ? 10 : (validEnemyWaves[validEnemyWaves.length - 1] || 999);
      const stepSmall = 1;
      const stepLarge = tab === "enemies" && selected.key !== "finalBoss" ? 10 : 0;
      const btnW = 30;
      const btnH = 24;
      const wideBtnW = 40;
      const valueW = tab === "towers" ? 56 : 84;
      const ctrlGap = 6;
      const totalControlW = btnW + (stepLarge ? ctrlGap + wideBtnW : 0) + ctrlGap + valueW + ctrlGap + btnW + (stepLarge ? ctrlGap + wideBtnW : 0);
      const controlX = detailX + detailW - 18 - totalControlW;
      const controlY = listY + 30;
      if (stepLarge) {
        drawUiButton(controlX, controlY, wideBtnW, btnH, "<<", "base", controlValue <= minValue);
        uiState.menuButtons.push({ x: controlX, y: controlY, w: wideBtnW, h: btnH, id: decId, delta: -stepLarge, disabled: controlValue <= minValue });
      }
      const minusX = controlX + (stepLarge ? wideBtnW + ctrlGap : 0);
      drawUiButton(minusX, controlY, btnW, btnH, tab === "enemies" ? "<" : "-", "base", controlValue <= minValue);
      uiState.menuButtons.push({ x: minusX, y: controlY, w: btnW, h: btnH, id: decId, delta: -stepSmall, disabled: controlValue <= minValue });
      ctx.fillStyle = "#e9f2ff";
      ctx.font = "700 12px 'Space Grotesk', sans-serif";
      ctx.textAlign = "center";
      const valueX = minusX + btnW + ctrlGap;
      ctx.fillText(controlLabel, valueX + valueW / 2, controlY + 16);
      const plusX = valueX + valueW + ctrlGap;
      drawUiButton(plusX, controlY, btnW, btnH, tab === "enemies" ? ">" : "+", "base", controlValue >= maxValue);
      uiState.menuButtons.push({ x: plusX, y: controlY, w: btnW, h: btnH, id: incId, delta: stepSmall, disabled: controlValue >= maxValue });
      if (stepLarge) {
        const plusLargeX = plusX + btnW + ctrlGap;
        drawUiButton(plusLargeX, controlY, wideBtnW, btnH, ">>", "base", controlValue >= maxValue);
        uiState.menuButtons.push({ x: plusLargeX, y: controlY, w: wideBtnW, h: btnH, id: incId, delta: stepLarge, disabled: controlValue >= maxValue });
      }
      ctx.textAlign = "left";
      ctx.fillStyle = "#b9cae2";
      ctx.font = "600 12px 'Space Grotesk', sans-serif";
      const descLines = drawWrappedText(selected.desc || "", detailX + 16, listY + 78, detailW - 34, 17, 3);
      const statsBoxY = listY + 84 + descLines * 17;
      const statsBoxH = listH - (statsBoxY - listY) - 38;
      ctx.fillStyle = "rgba(255,255,255,0.035)";
      pathRoundedRect(detailX + 14, statsBoxY, detailW - 28, statsBoxH, 14);
      ctx.fill();
      ctx.strokeStyle = "rgba(130, 173, 223, 0.26)";
      ctx.stroke();
      const detailRows = tab === "towers" && towerPreview
        ? getEncyclopediaTowerDetailRows(towerPreview, nextTowerPreview)
        : [
            { text: `HP ${selected.maxHp}` },
            { text: `Speed ${Math.round(selected.speed)}` },
            { text: `Bounty ${selected.reward}` },
            selected.armor ? { text: `Armor ${Math.round(selected.armor * 100)}%` } : null,
            selected.coreDamage ? { text: `Core Damage ${selected.coreDamage}` } : null
          ].filter(Boolean);
      ctx.fillStyle = "#8fb0d3";
      ctx.font = "700 14px 'Space Grotesk', sans-serif";
      ctx.fillText(tab === "towers" ? "Tower Stats" : "Enemy Stats", detailX + 30, statsBoxY + 26);
      let detailY = statsBoxY + 50;
      const statTextX = detailX + 30;
      const statDeltaX = detailX + Math.min(detailW - 72, 140);
      ctx.font = "600 12px 'Space Grotesk', sans-serif";
      for (const row of detailRows) {
        const baseText = row.text || `${row.label} ${formatEncyclopediaRowValue(row, row.value)}`;
        ctx.fillStyle = "#d8e7fb";
        ctx.fillText(baseText, statTextX, detailY);
        if (!row.text) {
          const deltaText = formatEncyclopediaRowDelta(row);
          if (deltaText) {
            ctx.fillStyle = row.label === "Total Cost" ? "#ffb765" : "#81f495";
            ctx.fillText(deltaText, statDeltaX, detailY);
          }
        }
        detailY += 19;
      }

      const backW = 140;
      const backH = 34;
      const backY = bodyY + bodyH + 12;
      drawUiButton(W / 2 - backW / 2, backY, backW, backH, "Back", "primary", false);
      uiState.menuButtons.push({ x: W / 2 - backW / 2, y: backY, w: backW, h: backH, id: "menuBack", disabled: false });
      ctx.textAlign = "start";
      ctx.restore();
      drawTopRightControls(state.menuFrom === "play", "closeMenu");
    }

    function drawSlotMenu() {
      if (!state.menuMode) return;
      if (state.menuMode === "encyclopedia") {
        drawEncyclopediaMenu();
        return;
      }
      uiState.menuButtons = [];
      ctx.save();
      ctx.fillStyle = "rgba(3, 9, 16, 0.72)";
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = "#d9f0ff";
      ctx.font = "700 36px 'Bungee', sans-serif";
      ctx.textAlign = "center";
      const isConfirm = state.menuMode === "saveConfirm";
      const title = isConfirm
        ? `Overwrite Slot ${state.pendingSlot || ""} ?`.trim()
        : (state.menuMode === "save" ? "Save Game" : "Load Game");
      const titleY = isConfirm ? (H / 2 - 12) : (H / 2 - 90);
      ctx.fillText(title, W / 2, titleY);

      if (isConfirm) {
        const bw = 170;
        const bh = 38;
        const gap = 12;
        const totalW = bw * 2 + gap;
        const bx = W / 2 - totalW / 2;
        const by = H / 2 + 22;
        drawUiButton(bx, by, bw, bh, "Overwrite", "warn", false);
        drawUiButton(bx + bw + gap, by, bw, bh, "Cancel", "primary", false);
        uiState.menuButtons.push({ x: bx, y: by, w: bw, h: bh, id: "confirmOverwrite", slot: state.pendingSlot, disabled: false });
        uiState.menuButtons.push({ x: bx + bw + gap, y: by, w: bw, h: bh, id: "cancelOverwrite", disabled: false });
        ctx.textAlign = "start";
        ctx.restore();
        return;
      }

      const bw = 240;
      const bh = 38;
      const colGap = 16;
      const rowGap = 12;
      const cols = 2;
      const rows = Math.ceil(SLOT_COUNT / cols);
      const totalW = bw * cols + colGap * (cols - 1);
      const totalH = bh * rows + rowGap * (rows - 1);
      const startX = W / 2 - totalW / 2;
      const startY = H / 2 - totalH / 2 + 2;
      for (let i = 1; i <= SLOT_COUNT; i++) {
        const disabled = state.menuMode === "load" && !hasSavedGame(i);
        const preview = getSlotPreview(i);
        const col = Math.floor((i - 1) / rows);
        const row = (i - 1) % rows;
        const bx = startX + col * (bw + colGap);
        const by = startY + row * (bh + rowGap);
        drawUiButton(bx, by, bw, bh, "", "primary", disabled);
        const textY = by + bh / 2 + 4;
        ctx.font = "700 12px 'Space Grotesk', sans-serif";
        ctx.textAlign = "left";
        const pad = 14;
        let tx = bx + pad;
        ctx.fillStyle = disabled ? "#8b9ab1" : "#cfe3ff";
        const base = `Slot ${i}  •  `;
        ctx.fillText(base, tx, textY);
        tx += ctx.measureText(base).width;
        if (!preview) {
          ctx.fillStyle = disabled ? "#8b9ab1" : "#9cb0cc";
          ctx.fillText("Empty", tx, textY);
        } else {
          ctx.fillStyle = disabled ? "#8b9ab1" : "#cfe3ff";
          const wave = `W${preview.wave}  •  `;
          ctx.fillText(wave, tx, textY);
          tx += ctx.measureText(wave).width;
          ctx.fillStyle = disabled ? "#8b9ab1" : "#ffd85a";
          const gold = `Gold ${preview.gold}  •  `;
          ctx.fillText(gold, tx, textY);
          tx += ctx.measureText(gold).width;
          ctx.fillStyle = disabled ? "#8b9ab1" : "#ff6a78";
          ctx.fillText(`HP ${preview.hp}`, tx, textY);
        }
        ctx.textAlign = "center";
        uiState.menuButtons.push({ x: bx, y: by, w: bw, h: bh, id: "slot", slot: i, disabled });
      }

      const backW = 140;
      const backH = 34;
      const backY = startY + totalH + 16;
      drawUiButton(W / 2 - backW / 2, backY, backW, backH, "Back", "primary", false);
      uiState.menuButtons.push({ x: W / 2 - backW / 2, y: backY, w: backW, h: backH, id: "menuBack", disabled: false });
      ctx.textAlign = "start";
      ctx.restore();
      drawTopRightControls(false);
    }

    const mouse = { x: W / 2, y: H / 2, screenX: W / 2, screenY: H / 2, inside: true };
    canvas.addEventListener("mousemove", (e) => {
      const p = worldPos(e);
      const w = screenToWorld(p.x, p.y);
      mouse.screenX = p.x;
      mouse.screenY = p.y;
      mouse.x = w.x;
      mouse.y = w.y;
      mouse.inside = w.inside;
      if (state.aimingMeteor && !state.paused && w.inside) {
        state.meteorAimX = w.x;
        state.meteorAimY = w.y;
      }
    });
    canvas.addEventListener("touchmove", (e) => {
      if (!e.touches.length) return;
      const p = worldPos(e.touches[0]);
      const w = screenToWorld(p.x, p.y);
      mouse.screenX = p.x;
      mouse.screenY = p.y;
      mouse.x = w.x;
      mouse.y = w.y;
      mouse.inside = w.inside;
      if (state.aimingMeteor && !state.paused && w.inside) {
        state.meteorAimX = w.x;
        state.meteorAimY = w.y;
      }
    }, { passive: true });

    canvas.addEventListener("mousedown", (e) => {
      if (!state.gameOver) return;
      const p = worldPos(e);
      const btns = uiState.gameOverButtons || [];
      for (const btn of btns) {
        if (btn.id === "gameOverRestart" && !btn.disabled && p.x >= btn.x && p.x <= btn.x + btn.w && p.y >= btn.y && p.y <= btn.y + btn.h) {
          resetGame();
          state.screen = "play";
          state.messageAt = Date.now();
          startLoop();
          break;
        }
      }
    });

    let lastTime = performance.now();
    let rafId = 0;

    function startLoop() {
      if (isLoopRunning) return;
      isLoopRunning = true;
      lastTime = performance.now();
      rafId = requestAnimationFrame(frame);
    }

    function step(dt) {
      if (!state.gameOver && !state.paused && state.screen === "play" && !state.victory) {
        if (!state.nextWaveDisabled) {
          state.nextWaveTimer -= dt;
          if (state.nextWaveTimer <= 0) startWave(false);
        }
        spawnEnemyBatch(dt);
        updateEnemies(dt);
        updateTowers(dt);
        for (const t of state.towers) {
          if (t.upgradeFx > 0) t.upgradeFx = Math.max(0, t.upgradeFx - dt);
        }
        updateProjectiles(dt);
        updateMeteorEffects(dt);
        updateParticles(dt);
        updateHazards(dt);
        tryAutoUpgradeSelectedTower();
      }

      if (state.waveInProgress && state.toSpawn <= 0) {
        state.waveInProgress = false;
      }

      let rewardedCurrentWave = false;
      for (const [waveKey, waveStatus] of Object.entries(state.waveStatus || {})) {
        const wave = Number(waveKey);
        if (!Number.isFinite(wave) || !waveStatus || waveStatus.rewarded || waveStatus.remaining > 0) continue;
        if (awardWaveClearBonus(wave) && wave === state.wave) rewardedCurrentWave = true;
      }

      const loadedClearedWaveReady = state.autoStartWave
        && state.wave > 0
        && !state.waveInProgress
        && state.enemies.length === 0
        && state.clearedWave >= state.wave
        && !state.nextWaveDisabled
        && !state.victory;

      if ((rewardedCurrentWave || loadedClearedWaveReady) && state.enemies.length === 0 && state.autoStartWave && !state.nextWaveDisabled && !state.victory) {
        state.waveReadyGlow = false;
        startWave(false, true);
      }

      if (!state.gameOver) {
        updateHoverBuild();
        updateButtons();
      }
    }

    function frame(t) {
      if (!isLoopRunning) return;
      const dt = Math.min(0.033, (t - lastTime) / 1000);
      lastTime = t;
      step(dt);
      render();
      rafId = requestAnimationFrame(frame);
    }

    function render() {
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0);
      const wt = getWorldTransform();
      state.worldTransform = wt;
      ctx.save();
      ctx.beginPath();
      ctx.rect(wt.playX, wt.playY, wt.playW, wt.playH);
      ctx.clip();
      ctx.translate(wt.ox, wt.oy);
      ctx.scale(wt.scale, wt.scale);
      drawGrid();
      drawMapDecor();
      drawPath();
      drawCore();
      drawBuildSpots();
      drawTowers();
      drawEnemies();
      drawProjectiles();
      drawHazards();
      drawMeteorEffects();
      drawParticles();
      drawPlacementGhost();
      drawMeteorMarker();
      ctx.restore();
      drawCanvasUI();
      drawPaused();
      drawGameOver();
      drawVictory();
      drawSlotMenu();
    }

    window.render_game_to_text = function renderGameToText() {
      const payload = {
        mode: state.screen,
        paused: state.paused,
        gameOver: state.gameOver,
        autoStartWave: state.autoStartWave,
        autoUpgradeTower: state.autoUpgradeTower,
        wave: state.wave,
        gold: Math.floor(state.gold),
        hp: state.health,
        nextWaveIn: Math.ceil(state.nextWaveTimer),
        meteorCooldown: Math.ceil(getMeteorCooldownMs() / 1000),
        selection: {
          build: state.selectedBuild,
          tower: state.selectedTower
            ? { type: state.selectedTower.type, level: state.selectedTower.level, x: Math.round(state.selectedTower.x), y: Math.round(state.selectedTower.y) }
            : null,
          enemy: state.selectedEnemy
            ? { type: state.selectedEnemy.kind, hp: Math.round(state.selectedEnemy.hp), x: Math.round(state.selectedEnemy.x), y: Math.round(state.selectedEnemy.y) }
            : null
        },
        towers: state.towers.map((t) => ({ type: t.type, level: t.level, x: Math.round(t.x), y: Math.round(t.y) })),
        enemies: state.enemies.map((e) => ({ type: e.kind, hp: Math.round(e.hp), x: Math.round(e.x), y: Math.round(e.y) })),
        note: "origin top-left, x right, y down"
      };
      return JSON.stringify(payload);
    };

    window.advanceTime = function advanceTime(ms) {
      const steps = Math.max(1, Math.round(ms / (1000 / 60)));
      for (let i = 0; i < steps; i++) {
        step(1 / 60);
      }
      render();
    };

    resetGame();
    startLoop();
    tryAutoLoadCloudSaveFromUrl();
  </script>
</body>
</html>
