<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #08111d;
      --panel: rgba(12, 28, 46, 0.75);
      --panel-border: rgba(116, 175, 255, 0.35);
      --accent: #31ffe6;
      --accent-2: #ffb347;
      --danger: #ff5d7d;
      --text: #e8f1ff;
      --muted: #9cb0cc;
      --good: #81f495;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Space Grotesk", system-ui, sans-serif;
      color: var(--text);
      background: #0f243a;
      display: flex;
      justify-content: center;
      padding: 8px;
    }

    .page {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .page-head {
      padding: 2px 2px 0;
    }

    .page-head,
    .hud,
    .under-canvas,
    .panel {
      display: none;
    }

    .shell {
      width: 100%;
      height: calc(100vh - 16px);
      display: grid;
      grid-template-columns: 1fr;
      gap: 0;
    }

    .game-wrap {
      overflow: hidden;
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.45), inset 0 0 24px rgba(49, 255, 230, 0.08);
      background: linear-gradient(160deg, rgba(11, 25, 43, 0.8), rgba(13, 29, 48, 0.95));
      display: flex;
      flex-direction: column;
      gap: 0;
      padding: max(6px, env(safe-area-inset-top)) max(6px, env(safe-area-inset-right)) max(6px, env(safe-area-inset-bottom)) max(6px, env(safe-area-inset-left));
      width: 100%;
      height: 100%;
      align-items: center;
      justify-content: center;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: linear-gradient(160deg, #0f243a, #101e2f 40%, #102237);
      touch-action: none;
    }

    .hud {
      display: flex;
      gap: 8px;
      flex-wrap: nowrap;
      align-items: center;
    }

    .chip {
      background: rgba(8, 20, 34, 0.8);
      border: 1px solid rgba(133, 180, 244, 0.35);
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      color: var(--muted);
    }

    .chip strong { color: var(--text); margin-left: 4px; }
    #gold { color: #ffd85a; }
    #health { color: #ff6a78; }

    .status-chip {
      margin-left: auto;
      text-align: right;
      max-width: 46%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #cde1ff;
      font-size: 12px;
      transition: opacity 260ms ease;
    }

    .pause-chip {
      border-radius: 999px;
      min-width: 38px;
      padding: 6px 10px;
      text-align: center;
      font-size: 16px;
      line-height: 1;
    }

    .panel {
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      background: var(--panel);
      backdrop-filter: blur(4px);
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    h1 {
      margin: 0;
      font-family: "Bungee", sans-serif;
      font-size: 22px;
      letter-spacing: 0.04em;
      color: var(--accent);
      text-shadow: 0 0 16px rgba(49, 255, 230, 0.32);
    }

    .sub {
      margin: 0;
      font-size: 13px;
      color: var(--muted);
    }

    .group-title {
      margin: 2px 0;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
    }

    .tower-grid {
      display: grid;
      gap: 8px;
    }

    .tower-option {
      display: flex;
      align-items: center;
      gap: 10px;
      text-align: left;
    }

    .tower-option.inactive {
      opacity: 0.45;
      cursor: not-allowed;
      border-color: rgba(149, 194, 255, 0.2);
    }

    .tower-option.inactive:hover {
      transform: none;
      border-color: rgba(149, 194, 255, 0.2);
      box-shadow: none;
    }

    .tower-art {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.28);
      flex: 0 0 28px;
    }

    .tower-art.dart { background: radial-gradient(circle at 35% 35%, #d3d9e1, #7c8794); }
    .tower-art.cannon { background: radial-gradient(circle at 40% 30%, #ffe2a3, #de7b1f); }
    .tower-art.frost { background: radial-gradient(circle at 35% 35%, #dce3ff, #7c8be8); }
    .tower-art.rail { background: radial-gradient(circle at 35% 35%, #ffc0c0, #d64f5d); }
    .tower-art.venom { background: radial-gradient(circle at 35% 35%, #c8ffd2, #35b151); }
    .tower-art.ember { background: radial-gradient(circle at 35% 35%, #ffd8a1, #de5f2e); }
    .tower-art.storm { background: radial-gradient(circle at 35% 35%, #d8f8ff, #4aa4dc); }
    .tower-art.mortar { background: radial-gradient(circle at 35% 35%, #f4efdd, #8e7d5e); }
    .tower-art.ion { background: radial-gradient(circle at 35% 35%, #dbfff2, #31ba9e); }
    .tower-art.scatter { background: radial-gradient(circle at 35% 35%, #ffe5f2, #d273b4); }

    .tower-copy {
      display: flex;
      flex-direction: column;
      gap: 1px;
      line-height: 1.25;
    }

    .tower-copy strong {
      font-size: 13px;
      color: var(--text);
    }

    .tower-copy span {
      font-size: 11px;
      color: var(--muted);
    }

    button {
      border: 1px solid rgba(149, 194, 255, 0.45);
      background: linear-gradient(180deg, rgba(17, 41, 68, 0.9), rgba(10, 27, 45, 0.9));
      border-radius: 11px;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      padding: 10px;
      cursor: pointer;
      text-align: left;
      transition: transform 0.18s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover:enabled {
      transform: translateY(-1px);
      border-color: var(--accent);
      box-shadow: 0 6px 14px rgba(49, 255, 230, 0.15);
    }

    button.active {
      border-color: var(--accent-2);
      box-shadow: inset 0 0 0 1px rgba(255, 179, 71, 0.55);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .actions {
      grid-template-columns: repeat(4, 1fr);
    }

    .icon-btn {
      text-align: center;
      font-size: 18px;
      padding: 9px 0;
      font-weight: 700;
    }

    .primary {
      text-align: center;
      background: linear-gradient(180deg, #1f5f94, #194673);
      border-color: rgba(125, 203, 255, 0.6);
      font-weight: 700;
    }

    .warn {
      background: linear-gradient(180deg, #653253, #49253b);
      border-color: rgba(255, 143, 181, 0.6);
    }

    .upgrade-btn {
      background: linear-gradient(180deg, #9a5a1d, #6f3f12);
      border-color: rgba(255, 185, 112, 0.7);
    }

    .sell-btn {
      background: linear-gradient(180deg, #a68f1f, #796713);
      border-color: rgba(255, 234, 129, 0.7);
    }

    .tip {
      margin-top: 2px;
      border-top: 1px dashed rgba(148, 193, 255, 0.35);
      padding-top: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.42;
    }

    .stats-card {
      border: 1px solid rgba(149, 194, 255, 0.3);
      background: rgba(9, 21, 35, 0.62);
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 11px;
      line-height: 1.28;
      color: #c9dbf5;
      min-height: 45px;
    }

    .upgrade-preview {
      color: #ffb765;
    }

    .under-canvas {
      margin-top: 8px;
      display: grid;
      grid-template-columns: 1fr 330px;
      gap: 8px;
      align-items: start;
    }

    .canvas-actions {
      margin-top: 0;
      min-height: 45px;
    }

    .pulse {
      animation: pulse 1.7s infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 rgba(255, 179, 71, 0); }
      50% { box-shadow: 0 0 22px rgba(255, 179, 71, 0.4); }
    }

    @media (max-width: 960px) {
      .shell { grid-template-columns: 1fr; }
      .panel { order: -1; padding: 10px; }
      .tower-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        max-height: 42vh;
        overflow: auto;
      }
      .tower-option { min-height: 44px; }
      .hud { flex-wrap: wrap; }
      .status-chip { max-width: 100%; margin-left: 0; text-align: left; }
      .under-canvas { grid-template-columns: 1fr; }
      .actions .icon-btn { min-height: 44px; font-size: 20px; }
      .stats-card { min-height: 44px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <main class="shell">
      <section class="game-wrap">
        <canvas id="game" width="1920" height="1080"></canvas>
      </section>
    </main>
  </div>
  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const towerOrder = ["dart", "scatter", "cannon", "frost", "storm", "venom", "ion", "ember", "rail", "mortar"];
    const towerButtons = towerOrder.map((type) => ({ dataset: { build: type } }));
    const towerHotkeys = [
      ["1", "q"], ["2", "w"], ["3", "e"], ["4", "r"], ["5", "a"],
      ["6", "s"], ["7", "d"], ["8", "f"], ["9", "z"], ["0", "x"]
    ];
    const startWaveBtn = { disabled: false, title: "", textContent: "" };
    const pauseBtn = { disabled: false, title: "", textContent: "" };
    const meteorBtn = { disabled: false, title: "", textContent: "" };
    const upgradeBtn = { disabled: false, title: "", textContent: "" };
    const sellBtn = { disabled: false, title: "", textContent: "" };
    let lastStatusMessage = "";

    const BASE_W = 960;
    const BASE_H = 560;
    let W = BASE_W;
    let H = BASE_H;
    let scaleX = 1;
    let scaleY = 1;
    let dpr = window.devicePixelRatio || 1;

    function resizeCanvas() {
      const wrap = canvas.parentElement;
      const inFullscreen = document.fullscreenElement === canvas;
      const availW = inFullscreen ? window.innerWidth : (wrap ? wrap.clientWidth : window.innerWidth);
      const availH = inFullscreen ? window.innerHeight : (wrap ? wrap.clientHeight : window.innerHeight);
      const aspect = 16 / 9;
      let cssW = availW;
      let cssH = availH;
      if (!inFullscreen) {
        if (cssW / cssH > aspect) {
          cssW = cssH * aspect;
        } else {
          cssH = cssW / aspect;
        }
      }
      dpr = window.devicePixelRatio || 1;
      canvas.style.width = `${cssW}px`;
      canvas.style.height = `${cssH}px`;
      canvas.width = Math.round(cssW * dpr);
      canvas.height = Math.round(cssH * dpr);
      scaleX = canvas.width / BASE_W;
      scaleY = canvas.height / BASE_H;
      ctx.imageSmoothingEnabled = true;
    }

    window.addEventListener("resize", resizeCanvas);
    document.addEventListener("fullscreenchange", resizeCanvas);
    resizeCanvas();
    const grid = 48;
    const PAD_HALF = 22;
    const METEOR_CD_MS = 120000;
    const WAVE_INTERVAL_S = 40;
    const METEOR_RADIUS = 56;
    const METEOR_DAMAGE = 180;
    const SAVE_KEY_PREFIX = "td-save-v1-slot";
    const SLOT_COUNT = 3;
    const uiState = { buttons: [], buildButtons: [], pauseButtons: [], startButtons: [], menuButtons: [] };

    const path = [
      { x: -48, y: 432 },
      { x: 96, y: 432 },
      { x: 96, y: 336 },
      { x: 240, y: 336 },
      { x: 240, y: 480 },
      { x: 432, y: 480 },
      { x: 432, y: 288 },
      { x: 336, y: 288 },
      { x: 336, y: 144 },
      { x: 528, y: 144 },
      { x: 528, y: 240 },
      { x: 672, y: 240 },
      { x: 672, y: 96 },
      { x: 816, y: 96 },
      { x: 816, y: 192 },
      { x: 912, y: 192 },
      { x: 912, y: 96 },
      { x: 1008, y: 96 }
    ];

    const towerTypes = {
      dart: {
        name: "Dart Node",
        desc: "Rapid single-target shots.",
        cost: 50,
        range: 136,
        fireRate: 0.33,
        damage: 36,
        color: "#aab6c4",
        projectileSpeed: 630
      },
      cannon: {
        name: "Pulse Cannon",
        desc: "Heavy splash damage.",
        cost: 350,
        range: 165,
        fireRate: 1.4,
        damage: 266,
        splash: 36,
        color: "#f3d347",
        projectileSpeed: 588
      },
      frost: {
        name: "Cryo Prism",
        desc: "Slows targets with chilled hits.",
        cost: 400,
        range: 176,
        fireRate: 0.5,
        damage: 54,
        slow: 0.76,
        slowTime: 1.0,
        color: "#a0a9ff",
        projectileSpeed: 720
      },
      rail: {
        name: "Rail Lance",
        desc: "Long-range piercing shells.",
        cost: 3600,
        range: 275,
        fireRate: 0.58,
        damage: 1250,
        burstCycle: 4,
        burstPierce: 3,
        color: "#ff7e7e",
        projectileSpeed: 1560
      },
      venom: {
        name: "Venom Spire",
        desc: "Poisons targets over time.",
        cost: 1000,
        range: 196,
        fireRate: 0.3,
        damage: 64,
        poisonDps: 160,
        poisonTime: 3.8,
        color: "#87ff94",
        projectileSpeed: 960
      },
      ember: {
        name: "Ember Forge",
        desc: "Armor shred and burning field.",
        cost: 2200,
        range: 196,
        fireRate: 0.72,
        damage: 118,
        armorShred: 0.04,
        burningCycle: 6,
        burningDps: 276,
        burningTime: 4.2,
        burningRadius: 62,
        dotLabel: "Burning",
        color: "#ff8f50",
        projectileSpeed: 595
      },
      storm: {
        name: "Storm Arc",
        desc: "Lightning chains across enemies.",
        cost: 550,
        range: 204,
        fireRate: 0.71,
        damage: 300,
        chainTargets: 2,
        chainRange: 108,
        chainDamageFalloff: 0.75,
        color: "#7dd9ff",
        projectileSpeed: 1280
      },
      mortar: {
        name: "Siege Mortar",
        desc: "Long-range bombardments.",
        cost: 6400,
        range: 284,
        fireRate: 1.47,
        damage: 2040,
        splash: 88,
        color: "#dbc8a5",
        projectileSpeed: 595
      },
      ion: {
        name: "Ion Lattice",
        desc: "Marks targets to amplify damage.",
        cost: 1200,
        range: 216,
        fireRate: 0.64,
        damage: 142,
        ionMarkAmp: 1.36,
        ionMarkTime: 3.6,
        color: "#72ffd0",
        projectileSpeed: 790
      },
      scatter: {
        name: "Scatter Bloom",
        desc: "Fires multiple projectiles at once.",
        cost: 220,
        range: 146,
        fireRate: 0.15,
        damage: 16,
        pellets: 3,
        spread: 0.18,
        color: "#ff9ad8",
        projectileSpeed: 640
      }
    };

    let state = null;
    let isLoopRunning = false;

    function getUiLayout() {
      const topBarH = 30;
      const sideW = 212;
      const bottomH = 58;
      const pad = 6;
      return {
        topBarH,
        sideW,
        bottomH,
        pad,
        buildX: W - sideW + pad,
        buildY: topBarH + pad,
        buildW: sideW - pad * 2,
        buildH: H - topBarH - bottomH - pad * 2,
        actionsY: H - bottomH + 4,
        actionsH: bottomH - 12
      };
    }

    function getWorldTransform() {
      const layout = getUiLayout();
      const playX = 0;
      const playY = layout.topBarH;
      const playW = W - layout.sideW;
      const playH = H - layout.bottomH - layout.topBarH;
      const scale = Math.min(playW / BASE_W, playH / BASE_H);
      const ox = playX + (playW - BASE_W * scale) / 2;
      const oy = playY + (playH - BASE_H * scale) / 2;
      return { scale, ox, oy, playX, playY, playW, playH };
    }

    function screenToWorld(sx, sy) {
      const wt = state?.worldTransform || getWorldTransform();
      const inside = sx >= wt.playX && sx <= wt.playX + wt.playW && sy >= wt.playY && sy <= wt.playY + wt.playH;
      return {
        x: (sx - wt.ox) / wt.scale,
        y: (sy - wt.oy) / wt.scale,
        inside
      };
    }

    function setSelectionLines(lines) {
      state.selectionLines = lines;
    }

    function resetGame() {
      state = {
        gold: 120,
        health: 20,
        wave: 0,
        score: 0,
        selectedBuild: null,
        selectedTower: null,
        selectedEnemy: null,
        hoverBuild: null,
        statsMode: "unit",
        towers: [],
        enemies: [],
        projectiles: [],
        particles: [],
        hazards: [],
        meteorEffects: [],
        selectionLines: [],
        waveInProgress: false,
        toSpawn: 0,
        spawnTimer: 0,
        nextWaveTimer: WAVE_INTERVAL_S,
        nextWaveDisabled: false,
        waveReadyGlow: false,
        clearedWave: 0,
        autoStartWave: false,
        autoUpgradeTower: false,
        meteorDamage: METEOR_DAMAGE,
        meteorReadyAt: 0,
        aimingMeteor: false,
        paused: false,
        messageAt: Date.now(),
        gameOver: false,
        victory: false,
        screen: "start",
        menuMode: null,
        menuFrom: null,
        pendingSlot: null,
        message: ""
      };
      updateHUD();
      updateButtons();
    }

    function getSlotKey(slot) {
      return `${SAVE_KEY_PREFIX}-${slot}`;
    }

    function hasSavedGame(slot = null) {
      try {
        if (slot) return !!localStorage.getItem(getSlotKey(slot));
        for (let i = 1; i <= SLOT_COUNT; i++) {
          if (localStorage.getItem(getSlotKey(i))) return true;
        }
        return false;
      } catch (err) {
        return false;
      }
    }

    function getSlotPreview(slot) {
      try {
        const raw = localStorage.getItem(getSlotKey(slot));
        if (!raw) return null;
        const payload = JSON.parse(raw);
        const s = payload && payload.state ? payload.state : null;
        if (!s) return null;
        return {
          wave: Number.isFinite(s.wave) ? s.wave : 0,
          gold: Number.isFinite(s.gold) ? Math.floor(s.gold) : 0,
          hp: Number.isFinite(s.health) ? s.health : 0
        };
      } catch (err) {
        return null;
      }
    }

    function buildSavePayload() {
      const selectedTowerIndex = state.selectedTower ? state.towers.indexOf(state.selectedTower) : -1;
      const selectedEnemyIndex = state.selectedEnemy ? state.enemies.indexOf(state.selectedEnemy) : -1;
      return {
        version: 1,
        savedAt: Date.now(),
        state: {
          gold: state.gold,
          health: state.health,
          wave: state.wave,
          score: state.score,
          selectedBuild: state.selectedBuild,
          statsMode: state.statsMode,
          waveInProgress: state.waveInProgress,
          toSpawn: state.toSpawn,
          spawnTimer: state.spawnTimer,
          nextWaveTimer: state.nextWaveTimer,
          nextWaveDisabled: state.nextWaveDisabled,
          waveReadyGlow: state.waveReadyGlow,
          clearedWave: state.clearedWave,
          autoStartWave: state.autoStartWave,
          autoUpgradeTower: state.autoUpgradeTower,
          meteorDamage: state.meteorDamage,
          meteorReadyAt: state.meteorReadyAt,
          aimingMeteor: state.aimingMeteor,
          paused: state.paused,
          gameOver: state.gameOver,
          victory: state.victory,
          screen: state.screen,
          message: state.message,
          towers: state.towers.map((t) => ({ ...t })),
          enemies: state.enemies.map((e) => ({ ...e })),
          projectiles: state.projectiles.map((p) => ({ ...p })),
          particles: state.particles.map((p) => ({ ...p })),
          hazards: state.hazards.map((h) => ({ ...h })),
          meteorEffects: state.meteorEffects.map((fx) => ({ ...fx })),
          selectedTowerIndex,
          selectedEnemyIndex
        }
      };
    }

    function saveGameToSlot(slot) {
      try {
        const payload = buildSavePayload();
        localStorage.setItem(getSlotKey(slot), JSON.stringify(payload));
        state.message = `Saved to Slot ${slot}.`;
      } catch (err) {
        state.message = "Save failed.";
      }
      state.messageAt = Date.now();
      updateButtons();
    }

    function encodeCloudSave(payload) {
      try {
        return `TD1.${btoa(unescape(encodeURIComponent(JSON.stringify(payload))))}`;
      } catch (err) {
        return "";
      }
    }

    function decodeCloudSave(code) {
      if (!code || typeof code !== "string") return null;
      const trimmed = code.trim();
      if (!trimmed.startsWith("TD1.")) return null;
      try {
        const json = decodeURIComponent(escape(atob(trimmed.slice(4))));
        return JSON.parse(json);
      } catch (err) {
        return null;
      }
    }

    async function exportCloudSave() {
      const payload = buildSavePayload();
      const code = encodeCloudSave(payload);
      if (!code) {
        state.message = "Cloud save failed.";
        state.messageAt = Date.now();
        updateButtons();
        return;
      }
      try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          await navigator.clipboard.writeText(code);
          state.message = "Cloud save code copied.";
        } else {
          window.prompt("Copy cloud save code", code);
          state.message = "Cloud save code ready.";
        }
      } catch (err) {
        window.prompt("Copy cloud save code", code);
        state.message = "Cloud save code ready.";
      }
      state.messageAt = Date.now();
      updateButtons();
    }

    function importCloudSave() {
      const code = window.prompt("Paste cloud save code");
      if (!code) return;
      const payload = decodeCloudSave(code);
      if (!payload || !applySavePayload(payload)) {
        state.message = "Cloud save invalid.";
        state.messageAt = Date.now();
        updateButtons();
        return;
      }
      if (!isLoopRunning) startLoop();
    }

    function applySavePayload(payload) {
      if (!payload || payload.version !== 1 || !payload.state) return false;
      const loaded = payload.state;
      resetGame();
      state = {
        ...state,
        ...loaded,
        towers: (loaded.towers || []).map((t) => ({ ...t })),
        enemies: (loaded.enemies || []).map((e) => ({ ...e })),
        projectiles: (loaded.projectiles || []).map((p) => ({ ...p })),
        particles: (loaded.particles || []).map((p) => ({ ...p })),
        hazards: (loaded.hazards || []).map((h) => ({ ...h })),
        meteorEffects: (loaded.meteorEffects || []).map((fx) => ({ ...fx })),
        selectionLines: [],
        hoverBuild: null
      };
      const towerIndex = Number.isInteger(loaded.selectedTowerIndex) ? loaded.selectedTowerIndex : -1;
      const enemyIndex = Number.isInteger(loaded.selectedEnemyIndex) ? loaded.selectedEnemyIndex : -1;
      state.selectedTower = towerIndex >= 0 && towerIndex < state.towers.length ? state.towers[towerIndex] : null;
      state.selectedEnemy = enemyIndex >= 0 && enemyIndex < state.enemies.length ? state.enemies[enemyIndex] : null;
      if (state.screen !== "play" && state.screen !== "start") state.screen = "play";
      if (state.screen === "start") state.paused = false;
      state.message = "Game loaded.";
      state.messageAt = Date.now();
      updateHUD();
      updateButtons();
      updateSelectionStats();
      return true;
    }

    function loadGameFromSlot(slot) {
      try {
        const raw = localStorage.getItem(getSlotKey(slot));
        if (!raw) {
          state.message = `Slot ${slot} empty.`;
          state.messageAt = Date.now();
          updateButtons();
          return;
        }
        const payload = JSON.parse(raw);
        if (!applySavePayload(payload)) {
          state.message = "Save corrupted.";
          state.messageAt = Date.now();
          updateButtons();
          return;
        }
        if (!isLoopRunning) startLoop();
      } catch (err) {
        state.message = "Load failed.";
        state.messageAt = Date.now();
        updateButtons();
      }
    }

    function openSlotMenu(mode) {
      state.menuMode = mode;
      state.menuFrom = state.screen;
      state.pendingSlot = null;
    }

    function closeSlotMenu() {
      state.menuMode = null;
      state.menuFrom = null;
      state.pendingSlot = null;
    }

    function updateHUD() {
      return;
    }

    function updateButtons() {
      if (state.message !== lastStatusMessage) {
        lastStatusMessage = state.message;
        state.messageAt = Date.now();
      }
      sellBtn.disabled = state.paused || !state.selectedTower || state.gameOver || state.victory;
      const upgradeCostNow = state.selectedTower ? getUpgradeCost(state.selectedTower) : Infinity;
      upgradeBtn.disabled = state.paused || !state.selectedTower || state.gameOver || state.victory || state.gold < upgradeCostNow || (state.selectedTower && state.selectedTower.level >= 10);
      startWaveBtn.disabled = state.screen !== "play" || state.paused || state.waveInProgress || state.gameOver || state.victory || state.nextWaveDisabled;
      const secs = state.nextWaveDisabled ? "--" : Math.max(0, Math.ceil(state.nextWaveTimer));
      startWaveBtn.textContent = `▶${secs}s`;
      startWaveBtn.title = state.nextWaveDisabled
        ? "Next wave locked"
        : state.waveInProgress
        ? `Next wave in ${secs}s (Space/N)`
        : `Call Wave (${secs}s) (Space/N)`;
      pauseBtn.disabled = false;
      pauseBtn.textContent = state.gameOver ? "↻" : (state.paused ? "▶" : "⏸");
      pauseBtn.title = state.gameOver ? "Restart (P)" : (state.paused ? "Resume (P)" : "Pause (P)");
      const meteorOnCooldown = Date.now() < state.meteorReadyAt;
      meteorBtn.disabled = state.paused || state.gameOver || state.victory || (meteorOnCooldown && !state.aimingMeteor);
      if (state.aimingMeteor) {
        meteorBtn.textContent = "✕";
      } else if (meteorOnCooldown) {
        meteorBtn.textContent = `☄${Math.ceil((state.meteorReadyAt - Date.now()) / 1000)}s`;
      } else {
        meteorBtn.textContent = "☄";
      }
      const meteorDamageNow = state.meteorDamage || METEOR_DAMAGE;
      meteorBtn.title = state.aimingMeteor
        ? "Cancel Meteor (Esc/M)"
        : `Meteor (M) DMG ${meteorDamageNow} R${METEOR_RADIUS} CD ${METEOR_CD_MS / 1000}s`;
      if (state.selectedTower) {
        const c = getUpgradeCost(state.selectedTower);
        upgradeBtn.title = state.selectedTower.level >= 10 ? "Max level reached" : `Upgrade (U) Lv.${state.selectedTower.level} ($${c})`;
        upgradeBtn.textContent = state.selectedTower.level >= 10 ? "MAX" : `⇧${c}`;
        const invested = state.selectedTower.totalInvested || state.selectedTower.cost;
        sellBtn.textContent = `$${Math.floor(invested * 0.7)}`;
        sellBtn.title = "Sell Selected (V)";
      } else {
        upgradeBtn.title = "Upgrade Selected (U)";
        upgradeBtn.textContent = "⇧";
        sellBtn.textContent = "$";
        sellBtn.title = "Sell Selected (V)";
      }
      updateSelectionStats();
    }

    function toggleAutoStartWave() {
      state.autoStartWave = !state.autoStartWave;
      state.message = state.autoStartWave ? "Auto wave enabled." : "Auto wave disabled.";
      state.messageAt = Date.now();
      updateButtons();
    }

    function toggleAutoUpgradeTower() {
      state.autoUpgradeTower = !state.autoUpgradeTower;
      state.message = state.autoUpgradeTower ? "Auto upgrade enabled." : "Auto upgrade disabled.";
      state.messageAt = Date.now();
      updateButtons();
    }

    function computeNextStats(t) {
      const earlyBoost = t.level < 5 ? (1.28 - t.level * 0.03) : 1;
      const nextLevel = t.level + 1;
      let fireRate = Math.max(0.12, t.fireRate * (0.91 - (earlyBoost - 1) * 0.12));
      if (t.type === "dart" && nextLevel >= 6) {
        fireRate = Math.max(0.12, fireRate * 0.94);
      } else if (t.type === "rail") {
        fireRate = Math.max(0.12, fireRate * 0.95);
      } else if (t.type === "mortar") {
        fireRate = Math.max(0.12, fireRate * 0.97);
      }

      let damage = t.damage * (1.2 + (earlyBoost - 1) * 0.65) + 6 + (nextLevel - 1) * 1.5;
      if (t.type === "venom") {
        damage = t.damage * (1.12 + (earlyBoost - 1) * 0.4) + 4 + (nextLevel - 1) * 0.9;
      } else if (t.type === "dart" && nextLevel >= 6) {
        const lateScale = 1.08 + (earlyBoost - 1) * 0.3;
        damage = t.damage * lateScale + 3 + (nextLevel - 1) * 0.81;
      } else if (t.type === "scatter" && nextLevel >= 5) {
        const lateScale = 1.04 + (earlyBoost - 1) * 0.2;
        damage = t.damage * lateScale + 2 + (nextLevel - 1) * 0.35;
      } else if (t.type === "rail") {
        damage = t.damage * (1.26 + (earlyBoost - 1) * 0.7) + 18 + (nextLevel - 1) * 3.2;
      } else if (t.type === "mortar") {
        damage = t.damage * (1.24 + (earlyBoost - 1) * 0.7) + 24 + (nextLevel - 1) * 4.2;
      }

      const range = t.range + 2 + (earlyBoost - 1) * 8;
      const projectileSpeed = t.projectileSpeed * (1.04 + (earlyBoost - 1) * 0.03);
      const slow = t.slow ? Math.max(0.35, t.slow - 0.04) : 0;
      const slowTime = t.slowTime ? t.slowTime + 0.12 : 0;
      const poisonDps = t.poisonDps ? t.poisonDps * (t.type === "venom" ? 1.45 : 1.3) : 0;
      const poisonTime = t.poisonTime ? t.poisonTime + 0.2 : 0;
      const burningDps = t.burningDps ? t.burningDps * (t.type === "ember" ? 1.42 : 1.3) : 0;
      const burningTime = t.burningTime ? t.burningTime + (t.type === "ember" ? 0.3 : 0.2) : 0;
      const markStep = t.type === "ion" ? 0.04 : 0.02;
      const ionMarkAmp = t.ionMarkAmp ? t.ionMarkAmp + markStep : 0;
      const ionMarkTime = t.ionMarkTime ? t.ionMarkTime + 0.15 : 0;
      const pellets = t.pellets ? (t.type === "scatter" && nextLevel % 5 === 0 ? t.pellets + 1 : t.pellets) : 0;
      const chainTargets = t.chainTargets ? (t.type === "storm" && nextLevel % 5 === 0 ? t.chainTargets + 1 : t.chainTargets) : 0;
      const burstPierce = t.burstPierce ? (t.type === "rail" && nextLevel % 5 === 0 ? t.burstPierce + 1 : t.burstPierce) : 0;

      return {
        level: nextLevel,
        damage,
        fireRate,
        range,
        projectileSpeed,
        slow,
        slowTime,
        poisonDps,
        poisonTime,
        burningDps,
        burningTime,
        ionMarkAmp,
        ionMarkTime,
        pellets,
        chainTargets,
        burstPierce
      };
    }

    function getProjectedUpgrade(t) {
      const next = computeNextStats(t);
      const nextDamage = Math.round(next.damage);
      const nextSplash = t.splash ? Math.round(t.splash) : 0;
      return {
        level: next.level,
        damage: nextDamage,
        range: Math.round(next.range),
        rate: (1 / next.fireRate).toFixed(2),
        dps: (next.damage / next.fireRate).toFixed(1),
        splash: nextSplash,
        slow: t.slow ? next.slow : 0,
        poison: t.poisonDps ? Math.round(next.poisonDps) : 0,
        burning: t.burningDps ? Math.round(next.burningDps) : 0,
        chain: t.chainTargets ? next.chainTargets : 0,
        markAmp: t.ionMarkAmp ? `${Math.round(next.ionMarkAmp * 100)}%` : "",
        burstPierce: t.burstPierce ? next.burstPierce : 0,
        pellets: t.pellets ? next.pellets : 0
      };
    }

    function getTowerStatSuffix(t) {
      let extra = "";
      if (t.splash) extra += ` | Splash ${Math.round(t.splash)}`;
      if (t.slow) extra += ` | Slow ${(100 - t.slow * 100).toFixed(0)}%`;
      if (t.poisonDps) extra += ` | ${t.dotLabel || "Poison"} ${Math.round(t.poisonDps)}/s`;
      if (t.burningDps) extra += ` | Burning ${Math.round(t.burningDps)}/s`;
      if (t.pellets) extra += ` | Projectiles ${t.pellets}`;
      if (t.chainTargets) extra += ` | Chain x${t.chainTargets}`;
      if (t.ionMarkAmp) extra += ` | Mark +${Math.round((t.ionMarkAmp - 1) * 100)}%`;
      if (t.burstPierce) extra += ` | Burst Pierce ${t.burstPierce}`;
      return extra;
    }

    function getProjectedStatSuffix(baseTower, next) {
      let nextExtra = "";
      if (next.splash) nextExtra += ` | Splash ${next.splash}`;
      if (next.slow) nextExtra += ` | Slow ${(100 - next.slow * 100).toFixed(0)}%`;
      if (next.poison) nextExtra += ` | ${baseTower.dotLabel || "Poison"} ${next.poison}/s`;
      if (next.burning) nextExtra += ` | Burning ${next.burning}/s`;
      if (next.pellets) nextExtra += ` | Projectiles ${next.pellets}`;
      if (next.chain) nextExtra += ` | Chain x${next.chain}`;
      if (next.markAmp) nextExtra += ` | Mark +${Math.round(Number.parseInt(next.markAmp, 10) - 100)}%`;
      if (next.burstPierce) nextExtra += ` | Burst Pierce ${next.burstPierce}`;
      return nextExtra;
    }

    function updateSelectionStats() {
      if (state.selectedEnemy && !state.enemies.includes(state.selectedEnemy)) {
        state.selectedEnemy = null;
      }

      if (state.statsMode === "meteor") {
        const cd = Math.max(0, Math.ceil((state.meteorReadyAt - Date.now()) / 1000));
        const meteorDamageNow = state.meteorDamage || METEOR_DAMAGE;
        setSelectionLines([
          { text: `METEOR | DMG ${meteorDamageNow} | Radius ${METEOR_RADIUS}`, tone: "base" },
          { text: `Cooldown ${cd}s`, tone: "upgrade" }
        ]);
        return;
      }

      if (state.selectedTower) {
        const t = state.selectedTower;
        const shotsPerSec = (1 / t.fireRate).toFixed(2);
        const dps = (t.damage / t.fireRate).toFixed(1);
        const extra = getTowerStatSuffix(t);
        const next = getProjectedUpgrade(t);
        const nextExtra = getProjectedStatSuffix(t, next);
        if (t.level >= 10) {
          setSelectionLines([
            { text: `${t.name} Lv.${t.level} | DMG ${Math.round(t.damage)} | DPS ${dps} | Range ${Math.round(t.range)} | Rate ${shotsPerSec}/s${extra}`, tone: "base" },
            { text: "Max level reached.", tone: "upgrade" }
          ]);
        } else {
          setSelectionLines([
            { text: `${t.name} Lv.${t.level} | DMG ${Math.round(t.damage)} | DPS ${dps} | Range ${Math.round(t.range)} | Rate ${shotsPerSec}/s${extra}`, tone: "base" },
            { text: `Next Lv.${next.level} | DMG ${next.damage} | DPS ${next.dps} | Range ${next.range} | Rate ${next.rate}/s${nextExtra}`, tone: "upgrade" }
          ]);
        }
        return;
      }

      const hoverBuild = state.hoverBuild || state.selectedBuild;
      if (hoverBuild && towerTypes[hoverBuild]) {
        const base = towerTypes[hoverBuild];
        const t = {
          type: hoverBuild,
          cooldown: 0.1,
          angle: -Math.PI / 2,
          level: 1,
          totalInvested: base.cost,
          ...base
        };
        const shotsPerSec = (1 / t.fireRate).toFixed(2);
        const dps = (t.damage / t.fireRate).toFixed(1);
        const next = getProjectedUpgrade(t);
        const extra = getTowerStatSuffix(t);
        const nextExtra = getProjectedStatSuffix(t, next);
        setSelectionLines([
          { text: `${t.name} ($${t.cost}) | DMG ${Math.round(t.damage)} | DPS ${dps} | Range ${Math.round(t.range)} | Rate ${shotsPerSec}/s${extra}`, tone: "base" },
          { text: `Next Lv.${next.level} | DMG ${next.damage} | DPS ${next.dps} | Range ${next.range} | Rate ${next.rate}/s${nextExtra}`, tone: "upgrade" }
        ]);
        return;
      }

      if (state.selectedEnemy) {
        const e = state.selectedEnemy;
        let extra = "";
        if (e.armor) {
          const flatDeflect = e.armorDeflect ?? e.armor * state.wave;
          extra += ` | Armor ${Math.round(e.armor * 100)}% + ${flatDeflect.toFixed(2)}`;
        }
        if (e.coreDamage && e.coreDamage > 1) extra += ` | Core DMG ${e.coreDamage}`;
        setSelectionLines([
          { text: `${e.kind.toUpperCase()} | HP ${Math.max(0, Math.round(e.hp))}/${e.maxHp} | SPD ${Math.round(e.speed)} | Bounty ${e.reward}${extra}`, tone: "base" }
        ]);
        return;
      }

      setSelectionLines([]);
    }

    function getHpScale(wave) {
      const baseScale = (1.78 + wave * 0.48) * (1 + wave * 0.022);
      const midBoost = wave > 10 ? 1 + (wave - 10) * 0.01 : 1;
      const lateBoost = wave > 50 ? 1 + (wave - 50) * 0.002 : 1;
      return baseScale * midBoost * lateBoost;
    }

    function getWaveEnemyCount(wave) {
      const cap = 30 + Math.floor(wave / 10);
      return Math.min(cap, 11 + wave * 2);
    }

    function newEnemy(kind, wave) {
      const hpScale = getHpScale(wave);
      const speedScale = 1 + wave * 0.01;
      const rewardScale = 1 + wave * 0.03;
      const base = {
        p: 0,
        seg: 0,
        x: path[0].x,
        y: path[0].y,
        spawnWave: wave,
        slowFactor: 1,
        slowTimer: 0,
        poisonDps: 0,
        poisonTimer: 0,
        burningDps: 0,
        burningTimer: 0,
        damageAmp: 1,
        damageAmpTimer: 0,
        damageAmpColor: "#f58cff"
      };
      if (kind === "swarm") {
        const maxHp = Math.round(75 * hpScale);
        return { ...base, kind, hp: maxHp, maxHp, speed: 126 * speedScale, reward: Math.round(5 * rewardScale), color: "#fff37a", r: 8 };
      }
      if (kind === "fast") {
        const maxHp = Math.round(120 * hpScale);
        return { ...base, kind, hp: maxHp, maxHp, speed: 104 * speedScale, reward: Math.round(7 * rewardScale), color: "#f4d35e", r: 10 };
      }
      if (kind === "armored") {
        const maxHp = Math.round(188 * hpScale);
        const armor = 0.28;
        return { ...base, kind, hp: maxHp, maxHp, speed: 51 * speedScale, reward: Math.round(18 * rewardScale), color: "#9bb5c9", r: 14, armor, armorDeflect: armor * wave };
      }
      if (kind === "striker") {
        const maxHp = Math.round(120 * hpScale);
        const armor = 0.08;
        return { ...base, kind, hp: maxHp, maxHp, speed: 90 * speedScale, reward: Math.round(10 * rewardScale), color: "#ffb778", r: 11, armor, armorDeflect: armor * wave };
      }
      if (kind === "bulwark") {
        const maxHp = Math.round(270 * hpScale);
        const armor = 0.36;
        return { ...base, kind, hp: maxHp, maxHp, speed: 45 * speedScale, reward: Math.round(22 * rewardScale), color: "#8aa0b8", r: 16, armor, armorDeflect: armor * wave };
      }
      if (kind === "tank") {
        const maxHp = Math.round(225 * hpScale);
        const armor = 0.2;
        return { ...base, kind, hp: maxHp, maxHp, speed: 48 * speedScale, reward: Math.round(16 * rewardScale), color: "#f16f8a", r: 15, armor, armorDeflect: armor * wave };
      }
      if (kind === "leech") {
        const maxHp = Math.round(180 * hpScale);
        const armor = 0.04;
        return { ...base, kind, hp: maxHp, maxHp, speed: 78 * speedScale, reward: Math.round(14 * rewardScale), color: "#73ffd4", r: 11, armor, armorDeflect: armor * wave };
      }
      if (kind === "boss") {
        const maxHp = Math.round(540 * hpScale);
        const armor = 0.5;
        return { ...base, kind, hp: maxHp, maxHp, speed: 42 * speedScale, reward: Math.round(45 * rewardScale), color: "#c972ff", r: 18, armor, armorDeflect: armor * wave, coreDamage: 3 };
      }
      const basicBoost = wave > 10 ? 1.75 : 1;
      const maxHp = Math.round(88 * hpScale * basicBoost);
      return { ...base, kind: "basic", hp: maxHp, maxHp, speed: 72 * speedScale, reward: Math.round(9 * rewardScale), color: "#75e9a7", r: 12 };
    }

    function startWave(manual = true) {
      if (state.screen !== "play" || state.gameOver || state.victory) return;
      state.wave += 1;
      state.meteorDamage = (state.wave - 1) ? Math.round(METEOR_DAMAGE * getHpScale(state.wave) / 2.3) : METEOR_DAMAGE;
      state.waveInProgress = true;
      state.waveReadyGlow = false;
      if (state.wave === 100) {
        state.nextWaveDisabled = true;
        state.nextWaveTimer = Infinity;
      } else {
        state.nextWaveDisabled = false;
        state.nextWaveTimer = WAVE_INTERVAL_S;
      }
      if (manual) {
        const now = Date.now();
        if (state.meteorReadyAt > now) {
          const earlyMs = Math.max(0, state.nextWaveTimer || 0) * 1000;
          state.meteorReadyAt = Math.max(now, state.meteorReadyAt - earlyMs);
        }
      }

      const count = getWaveEnemyCount(state.wave);
      state.toSpawn += count;
      if (state.spawnTimer <= 0) state.spawnTimer = 0.36;
      state.message = manual
        ? `Wave ${state.wave} called early. Hold the line.`
        : `Wave ${state.wave} has begun.`;

      updateHUD();
      updateButtons();
    }

    function pickWavePattern(wave) {
      const cycle = wave % 10;
      if (wave >= 10 && cycle === 0) return "bossRush";
      if (cycle === 1) return "basic";
      if (cycle === 2) return "strikerRaid";
      if (cycle === 3) return "leech";
      if (cycle === 4) return "blitz";
      if (cycle === 5) return "fortressLine";
      if (cycle === 6) return "toxicBloom";
      if (cycle === 7) return "runnerMix";
      if (cycle === 8) return "armorColumn";
      return "swarmFlood";
    }

    function pickEnemyType(wave, idx) {
      if (wave <= 2) return "basic";
      const pattern = pickWavePattern(wave);
      if (pattern === "bossRush") {
        if (idx % 10 === 0) return "boss";
        if (idx % 4 === 0) return "bulwark";
        return "armored";
      }
      if (pattern === "swarmFlood") {
        if (idx % 8 === 0) return "fast";
        return "swarm";
      }
      if (pattern === "armorColumn") {
        if (idx % 8 === 0) return "bulwark";
        if (idx % 3 === 0) return "tank";
        return "armored";
      }
      if (pattern === "strikerRaid") {
        if (idx % 5 === 0) return "leech";
        if (idx % 9 === 0) return "fast";
        return "striker";
      }
      if (pattern === "blitz") {
        if (idx % 3 === 0) return "striker";
        if (idx % 2 === 0) return "fast";
        return "swarm";
      }
      if (pattern === "runnerMix") {
        if (idx % 5 === 0) return "striker";
        if (idx % 2 === 0) return "basic";
        return "fast";
      }
      if (pattern === "fortressLine") {
        if (idx % 5 === 0) return "bulwark";
        if (idx % 3 === 0) return "armored";
        return "tank";
      }
      if (pattern === "toxicBloom") {
        if (idx % 3 === 0) return "leech";
        return "tank";
      }
      if (pattern === "leech") {
        if (idx % 2 === 0) return "basic";
        return "leech";
      }
    }

    function spawnEnemyBatch(dt) {
      if (!state.waveInProgress || state.toSpawn <= 0) return;
      state.spawnTimer -= dt;
      if (state.spawnTimer <= 0) {
        const total = getWaveEnemyCount(state.wave);
        const spawnedIndex = total - state.toSpawn;
        state.enemies.push(newEnemy(pickEnemyType(state.wave, spawnedIndex), state.wave));
        state.toSpawn -= 1;
        const baseGap = Math.max(0.13, 0.47 - state.wave * 0.015);
        state.spawnTimer = baseGap;
      }
    }

    function distance(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function enemyAtEnd(enemy) {
      return enemy.seg >= path.length - 1;
    }

    function updateEnemies(dt) {
      for (let i = state.enemies.length - 1; i >= 0; i--) {
        const e = state.enemies[i];
        if (e.poisonTimer > 0) {
          e.poisonTimer -= dt;
          hitEnemy(e, e.poisonDps * dt, true, true);
          if (!state.enemies.includes(e)) continue;
        }
        if (e.burningTimer > 0) {
          e.burningTimer -= dt;
          hitEnemy(e, e.burningDps * dt, true, true);
          if (!state.enemies.includes(e)) continue;
        }
        if (e.slowTimer > 0) {
          e.slowTimer -= dt;
        } else {
          e.slowFactor = 1;
        }
        if (e.damageAmpTimer > 0) {
          e.damageAmpTimer -= dt;
        } else {
          e.damageAmp = 1;
          e.damageAmpColor = "#f58cff";
        }

        let move = e.speed * e.slowFactor * dt;
        while (move > 0 && e.seg < path.length - 1) {
          const a = path[e.seg];
          const b = path[e.seg + 1];
          const segLen = Math.hypot(b.x - a.x, b.y - a.y);
          const remain = segLen - e.p;
          if (move < remain) {
            e.p += move;
            move = 0;
          } else {
            move -= remain;
            e.seg += 1;
            e.p = 0;
          }
        }

        if (enemyAtEnd(e)) {
          state.enemies.splice(i, 1);
          state.health -= e.coreDamage || 1;
          if (state.health <= 0) {
            state.health = 0;
            state.gameOver = true;
            state.message = "Core breached. Restart and try a new layout.";
            updateButtons();
          }
          updateHUD();
          continue;
        }

        const a = path[e.seg];
        const b = path[e.seg + 1];
        const segLen = Math.hypot(b.x - a.x, b.y - a.y);
        const t = segLen ? e.p / segLen : 0;
        e.x = a.x + (b.x - a.x) * t;
        e.y = a.y + (b.y - a.y) * t;
      }
    }

    function acquireTarget(tower) {
      let target = null;
      let bestProgress = -1;
      for (const enemy of state.enemies) {
        const d = Math.hypot(enemy.x - tower.x, enemy.y - tower.y);
        if (d > tower.range) continue;
        const progress = enemy.seg * 2000 + enemy.p;
        if (progress > bestProgress) {
          bestProgress = progress;
          target = enemy;
        }
      }
      return target;
    }

    function updateTowers(dt) {
      for (const tower of state.towers) {
        tower.cooldown -= dt;
        if (tower.cooldown > 0) continue;

        const target = acquireTarget(tower);
        if (!target) continue;
        tower.cooldown = tower.fireRate;

        const angle = Math.atan2(target.y - tower.y, target.x - tower.x);
        tower.angle = angle;

        const pellets = tower.pellets || 1;
        const spread = tower.spread || 0;
        for (let p = 0; p < pellets; p++) {
          const isBurstShot = tower.burstCycle && ((tower.shotCount || 0) + 1) % tower.burstCycle === 0;
          const isBurningShot = tower.burningCycle && ((tower.shotCount || 0) + 1) % tower.burningCycle === 0;
          const baseOffset = pellets > 1 ? ((p / (pellets - 1)) * 2 - 1) * spread : 0;
          const shotAngle = angle + baseOffset + (Math.random() - 0.5) * 0.03;
          state.projectiles.push({
            x: tower.x,
            y: tower.y,
            vx: Math.cos(shotAngle) * tower.projectileSpeed,
            vy: Math.sin(shotAngle) * tower.projectileSpeed,
            life: 1.8,
            type: tower.type,
            damage: tower.damage,
            splash: tower.splash || 0,
            slow: tower.slow || 0,
            slowTime: tower.slowTime || 0,
            poisonDps: tower.poisonDps || 0,
            poisonTime: tower.poisonTime || 0,
            burningDps: isBurningShot ? tower.burningDps || 0 : 0,
            burningTime: isBurningShot ? tower.burningTime || 0 : 0,
            burningRadius: isBurningShot ? tower.burningRadius || 0 : 0,
            armorShred: tower.armorShred || 0,
            chainTargets: tower.chainTargets || 0,
            chainRange: tower.chainRange || 0,
            chainDamageFalloff: tower.chainDamageFalloff || 1,
            ionMarkAmp: tower.ionMarkAmp || 1,
            ionMarkTime: tower.ionMarkTime || 0,
            pierceLeft: isBurstShot ? tower.burstPierce || 0 : 0,
            color: tower.color
          });
        }
        tower.shotCount = (tower.shotCount || 0) + 1;
      }
    }

    function hitEnemy(enemy, damage, quiet = false, trueDamage = false) {
      const amp = enemy.damageAmpTimer > 0 ? enemy.damageAmp : 1;
      let reduced = damage;
      if (!trueDamage && enemy.armor) {
        reduced = damage * (1 - enemy.armor) - (enemy.armorDeflect ?? enemy.armor * state.wave * 0.5);
      }
      reduced = Math.max(0, reduced);
      enemy.hp -= reduced * amp;
      enemy.hp = Math.min(enemy.maxHp, enemy.hp);
      if (!quiet) {
        state.particles.push({ x: enemy.x, y: enemy.y, r: 5, life: 0.22, color: "#ffffff" });
      }
      if (enemy.hp <= 0) {
        state.gold += enemy.reward;
        state.score += Math.round(enemy.maxHp * 0.9);
        burst(enemy.x, enemy.y, enemy.color, 10, 34);
        const idx = state.enemies.indexOf(enemy);
        if (idx >= 0) state.enemies.splice(idx, 1);
        updateHUD();
      }
    }

    function explode(x, y, radius, damage, color, slow, slowTime, trueDamage = false) {
      burst(x, y, color, 18, radius * 0.8);
      if (radius >= 40) burst(x, y, "#ffd18a", 10, radius * 0.55);
      for (const enemy of [...state.enemies]) {
        if (Math.hypot(enemy.x - x, enemy.y - y) <= radius) {
          hitEnemy(enemy, damage, false, trueDamage);
          if (slow) {
            enemy.slowFactor = slow;
            enemy.slowTimer = Math.max(enemy.slowTimer, slowTime);
            burst(enemy.x, enemy.y, "#b2d3ff", 4, 12);
          }
        }
      }
    }

    function spawnHazard(x, y, radius, dps, time, color) {
      state.hazards.push({ x, y, radius, dps, life: time, maxLife: time, color, age: 0, activeDelay: 0.08 });
    }

    function chainShock(origin, projectile) {
      if (!projectile.chainTargets || projectile.chainTargets <= 0) return;
      let from = origin;
      let damage = projectile.damage * projectile.chainDamageFalloff;
      const visited = new Set([origin]);
      for (let jump = 0; jump < projectile.chainTargets; jump++) {
        let next = null;
        let bestDist = Infinity;
        for (const enemy of state.enemies) {
          if (visited.has(enemy)) continue;
          const d = Math.hypot(enemy.x - from.x, enemy.y - from.y);
          if (d <= projectile.chainRange && d < bestDist) {
            bestDist = d;
            next = enemy;
          }
        }
        if (!next) break;
        visited.add(next);
        hitEnemy(next, damage);
        if (projectile.slow) {
          next.slowFactor = projectile.slow;
          next.slowTimer = Math.max(next.slowTimer, projectile.slowTime);
        }
        if (projectile.ionMarkAmp > 1) {
          next.damageAmp = Math.max(next.damageAmp || 1, projectile.ionMarkAmp);
          next.damageAmpTimer = Math.max(next.damageAmpTimer || 0, projectile.ionMarkTime);
          next.damageAmpColor = projectile.color || "#f58cff";
        }
        burst(next.x, next.y, "#8af7ff", 5, 20);
        from = next;
        damage *= projectile.chainDamageFalloff;
      }
    }

    function updateHazards(dt) {
      for (let i = state.hazards.length - 1; i >= 0; i--) {
        const h = state.hazards[i];
        h.age = (h.age || 0) + dt;
        h.life -= dt;
        if (h.life <= 0) {
          state.hazards.splice(i, 1);
          continue;
        }
        if (h.age >= (h.activeDelay || 0)) {
          for (const enemy of [...state.enemies]) {
            if (Math.hypot(enemy.x - h.x, enemy.y - h.y) <= h.radius) {
              hitEnemy(enemy, h.dps * dt, true, true);
              enemy.burningDps = Math.max(enemy.burningDps || 0, h.dps * 0.72);
              enemy.burningTimer = Math.max(enemy.burningTimer || 0, 0.45);
            }
          }
        }
      }
    }

    function updateProjectiles(dt) {
      for (let i = state.projectiles.length - 1; i >= 0; i--) {
        const p = state.projectiles[i];
        p.life -= dt;
        p.x += p.vx * dt;
        p.y += p.vy * dt;

        if (p.life <= 0 || p.x < -60 || p.y < -60 || p.x > W + 60 || p.y > H + 60) {
          state.projectiles.splice(i, 1);
          continue;
        }

        let didHit = false;
        for (const enemy of [...state.enemies]) {
          if (Math.hypot(enemy.x - p.x, enemy.y - p.y) <= enemy.r + 5) {
            if (p.splash > 0) {
              explode(p.x, p.y, p.splash, p.damage, p.color, p.slow, p.slowTime);
            } else {
              const isPierceShot = p.pierceLeft > 0;
              hitEnemy(enemy, p.damage, false, isPierceShot);
              if (p.slow) {
                enemy.slowFactor = p.slow;
                enemy.slowTimer = Math.max(enemy.slowTimer, p.slowTime);
              }
              if (p.poisonDps) {
                enemy.poisonDps = Math.max(enemy.poisonDps, p.poisonDps);
                enemy.poisonTimer = Math.max(enemy.poisonTimer, p.poisonTime);
                burst(enemy.x, enemy.y, "#8bff9d", 5, 16);
              }
              if (p.armorShred > 0) {
                enemy.armor = Math.max(0, (enemy.armor || 0) - p.armorShred);
                if (enemy.armorDeflect != null) {
                  const baseWave = enemy.spawnWave || state.wave;
                  enemy.armorDeflect = Math.max(0, enemy.armorDeflect - p.armorShred * baseWave);
                }
                burst(enemy.x, enemy.y, "#ffcc9a", 3, 8);
              }
              if (p.burningDps) {
                const r = p.burningRadius || 0;
                spawnHazard(enemy.x, enemy.y, r, p.burningDps, p.burningTime, "rgba(255,120,72,0.35)");
                burst(enemy.x, enemy.y, "#ff9c5f", 10, 22);
              }
              if (p.ionMarkAmp > 1) {
                enemy.damageAmp = Math.max(enemy.damageAmp || 1, p.ionMarkAmp);
                enemy.damageAmpTimer = Math.max(enemy.damageAmpTimer || 0, p.ionMarkTime);
                enemy.damageAmpColor = p.color || "#f58cff";
                burst(enemy.x, enemy.y, "#f58cff", 4, 12);
              }
              if (p.chainTargets > 0) {
                chainShock(enemy, p);
              }
              if (p.pierceLeft > 0) {
                p.pierceLeft -= 1;
                p.life -= 0.06;
                p.x += p.vx * 0.01;
                p.y += p.vy * 0.01;
                burst(enemy.x, enemy.y, "#ffd6d6", 5, 12);
                didHit = false;
              } else {
                didHit = true;
              }
            }
            if (p.pierceLeft <= 0) didHit = true;
            break;
          }
        }

        if (didHit) {
          state.projectiles.splice(i, 1);
        }
      }
    }

    function burst(x, y, color, count, spread) {
      for (let i = 0; i < count; i++) {
        const a = Math.random() * Math.PI * 2;
        const s = Math.random() * spread;
        state.particles.push({
          x,
          y,
          vx: Math.cos(a) * s,
          vy: Math.sin(a) * s,
          r: 2 + Math.random() * 2,
          life: 0.28 + Math.random() * 0.42,
          color
        });
      }
    }

    function updateParticles(dt) {
      for (let i = state.particles.length - 1; i >= 0; i--) {
        const p = state.particles[i];
        p.life -= dt;
        p.x += (p.vx || 0) * dt;
        p.y += (p.vy || 0) * dt;
        p.r *= 0.988;
        if (p.life <= 0) state.particles.splice(i, 1);
      }
    }

    function worldPos(evt) {
      const r = canvas.getBoundingClientRect();
      return {
        x: ((evt.clientX - r.left) / r.width) * BASE_W,
        y: ((evt.clientY - r.top) / r.height) * BASE_H
      };
    }

    function pointSegDist(px, py, x1, y1, x2, y2) {
      const dx = x2 - x1;
      const dy = y2 - y1;
      const len2 = dx * dx + dy * dy;
      if (len2 === 0) return Math.hypot(px - x1, py - y1);
      let t = ((px - x1) * dx + (py - y1) * dy) / len2;
      t = Math.max(0, Math.min(1, t));
      const x = x1 + t * dx;
      const y = y1 + t * dy;
      return Math.hypot(px - x, py - y);
    }

    function tooCloseToPath(x, y) {
      for (let i = 0; i < path.length - 1; i++) {
        const a = path[i];
        const b = path[i + 1];
        if (pointSegDist(x, y, a.x, a.y, b.x, b.y) < 20) return true;
      }
      return false;
    }

    function towerAt(x, y) {
      for (const t of state.towers) {
        if (Math.hypot(t.x - x, t.y - y) <= 18) return t;
      }
      return null;
    }

    function enemyAt(x, y) {
      for (let i = state.enemies.length - 1; i >= 0; i--) {
        const e = state.enemies[i];
        if (Math.hypot(e.x - x, e.y - y) <= e.r + 2) return e;
      }
      return null;
    }

    function canPlace(x, y) {
      if (!buildSpotSet.has(`${x},${y}`)) return false;
      if (roadSpotSet.has(`${x},${y}`)) return false;
      if (towerAt(x, y)) return false;
      return true;
    }

    function addTower(type, x, y) {
      const t = towerTypes[type];
      if (!t || state.gold < t.cost) return false;

      const tower = {
        type,
        x,
        y,
        cooldown: 0.1,
        angle: -Math.PI / 2,
        level: 1,
        totalInvested: t.cost,
        ...t
      };
      state.towers.push(tower);
      state.gold -= t.cost;
      state.selectedTower = tower;
      state.selectedEnemy = null;
      state.selectedBuild = null;
      state.statsMode = "unit";
      state.message = `${t.name} online.`;
      updateHUD();
      updateButtons();
      return true;
    }

    function getUpgradeCost(tower) {
      const level = tower.level - 1;
      const earlyDiscount = level < 4 ? (0.58 + level * 0.09) : 1;
      const raw = tower.cost * 1.72 * Math.pow(1.2, level) * (1 + Math.max(0, level - 2) * 0.09) * earlyDiscount;
      return Math.ceil(raw / 5) * 5;
    }

    function upgradeTower() {
      if (!state.selectedTower || state.gameOver) return;
      const t = state.selectedTower;
      if (t.level >= 10) {
        state.message = "Max level reached.";
        updateButtons();
        return;
      }
      const upgradeCost = getUpgradeCost(t);
      if (state.gold < upgradeCost) {
        state.message = `Need ${upgradeCost} gold to upgrade.`;
        return;
      }
      state.gold -= upgradeCost;
      t.totalInvested = (t.totalInvested || t.cost) + upgradeCost;
      const next = computeNextStats(t);
      t.level = next.level;
      t.damage = next.damage;
      t.range = next.range;
      t.fireRate = next.fireRate;
      t.projectileSpeed = next.projectileSpeed;
      if (t.slow != null) t.slow = next.slow;
      if (t.slowTime != null) t.slowTime = next.slowTime;
      if (t.poisonDps != null) t.poisonDps = next.poisonDps;
      if (t.poisonTime != null) t.poisonTime = next.poisonTime;
      if (t.burningDps != null) t.burningDps = next.burningDps;
      if (t.burningTime != null) t.burningTime = next.burningTime;
      if (t.ionMarkAmp != null) t.ionMarkAmp = next.ionMarkAmp;
      if (t.ionMarkTime != null) t.ionMarkTime = next.ionMarkTime;
      if (t.pellets != null) t.pellets = next.pellets;
      if (t.chainTargets != null) t.chainTargets = next.chainTargets;
      if (t.burstPierce != null) t.burstPierce = next.burstPierce;
      t.upgradeFx = 0.45;
      state.message = `${t.name} upgraded to Lv.${t.level}.`;
      updateHUD();
      updateButtons();
    }

    function tryAutoUpgradeSelectedTower() {
      if (!state.autoUpgradeTower || !state.selectedTower) return;
      if (state.paused || state.gameOver || state.victory) return;
      if (state.selectedTower.level >= 10) return;
      const cost = getUpgradeCost(state.selectedTower);
      if (state.gold < cost) return;
      upgradeTower();
    }

    function castMeteor(x, y) {
      const now = Date.now();
      if (now < state.meteorReadyAt) return false;
      state.meteorReadyAt = now + METEOR_CD_MS;
      state.aimingMeteor = false;
      state.statsMode = "unit";
      state.selectionLines = [];
      state.meteorEffects.push({ x, y, t: 0, impactAt: 0.34, done: false });
      state.message = "Meteor inbound...";
      updateButtons();
      return true;
    }

    function handleCanvasPress(x, y) {
      if (state.menuMode) {
        for (const btn of uiState.menuButtons) {
          if (hitRect(x, y, btn) && !btn.disabled) {
            if (btn.id === "menuBack") {
              closeSlotMenu();
              return;
            }
            if (btn.id === "confirmOverwrite") {
              saveGameToSlot(btn.slot);
              closeSlotMenu();
              return;
            }
            if (btn.id === "cancelOverwrite") {
              state.menuMode = "save";
              state.pendingSlot = null;
              return;
            }
            if (btn.id === "slot") {
              if (state.menuMode === "save") {
                if (hasSavedGame(btn.slot)) {
                  state.menuMode = "saveConfirm";
                  state.pendingSlot = btn.slot;
                  return;
                }
                saveGameToSlot(btn.slot);
              } else {
                loadGameFromSlot(btn.slot);
              }
              closeSlotMenu();
              return;
            }
          }
        }
        return;
      }
      if (state.gameOver) {
        for (const btn of uiState.buttons) {
          if ((btn.id === "pause" || btn.id === "fullscreen") && hitRect(x, y, btn) && !btn.disabled) {
            if (btn.id === "pause") {
              resetGame();
              state.screen = "play";
              state.messageAt = Date.now();
              startLoop();
            } else {
              handleUiAction(btn.id);
            }
            return;
          }
        }
        const btns = uiState.gameOverButtons || [];
        for (const btn of btns) {
          if (hitRect(x, y, btn) && !btn.disabled) {
            if (btn.id === "gameOverRestart") {
              resetGame();
              state.screen = "play";
              state.messageAt = Date.now();
              startLoop();
            }
            if (btn.id === "gameOverLoad") {
              openSlotMenu("load");
            }
            return;
          }
        }
        return;
      }
      if (state.victory) {
        for (const btn of uiState.buttons) {
          if ((btn.id === "pause" || btn.id === "fullscreen") && hitRect(x, y, btn) && !btn.disabled) {
            if (btn.id === "pause") {
              resetGame();
              state.screen = "play";
              state.messageAt = Date.now();
              startLoop();
            } else {
              handleUiAction(btn.id);
            }
            return;
          }
        }
        const btns = uiState.victoryButtons || [];
        for (const btn of btns) {
          if (hitRect(x, y, btn) && !btn.disabled) {
            if (btn.id === "victoryRestart") {
              resetGame();
              state.screen = "play";
              state.messageAt = Date.now();
              startLoop();
            }
            if (btn.id === "victoryContinue") {
              state.victory = false;
              state.nextWaveDisabled = false;
              startWave(true);
            }
            return;
          }
        }
        return;
      }
      if (state.screen === "start") {
        for (const btn of uiState.startButtons) {
          if (hitRect(x, y, btn) && !btn.disabled) {
            handleUiAction(btn.id);
            return;
          }
        }
        return;
      }
      if (state.paused) {
        for (const btn of uiState.pauseButtons) {
          if (hitRect(x, y, btn) && !btn.disabled) {
            handleUiAction(btn.id);
            return;
          }
        }
        for (const btn of uiState.buttons) {
          if ((btn.id === "pause" || btn.id === "fullscreen" || btn.id === "autoWave" || btn.id === "autoUpgrade") && hitRect(x, y, btn) && !btn.disabled) {
            handleUiAction(btn.id);
            return;
          }
        }
        return;
      }
      for (const btn of uiState.buttons) {
        if (hitRect(x, y, btn) && !btn.disabled) {
          handleUiAction(btn.id);
          return;
        }
      }
      for (const btn of uiState.buildButtons) {
        if (hitRect(x, y, btn) && !btn.disabled) {
          handleBuildSelect(btn.type);
          return;
        }
      }
      const world = screenToWorld(x, y);
      if (!world.inside) return;
      const gx = Math.round(world.x / grid) * grid;
      const gy = Math.round(world.y / grid) * grid;

      if (state.aimingMeteor) {
        castMeteor(world.x, world.y);
        return;
      }

      const clickedTower = towerAt(world.x, world.y);
      const clickedEnemy = enemyAt(world.x, world.y);
      if (clickedEnemy && !state.selectedBuild) {
        state.selectedEnemy = clickedEnemy;
        state.selectedTower = null;
        state.statsMode = "unit";
        state.message = `${clickedEnemy.kind.toUpperCase()} selected.`;
        updateButtons();
        return;
      }
      if (clickedTower && !state.selectedBuild) {
        state.selectedTower = clickedTower;
        state.selectedEnemy = null;
        state.statsMode = "unit";
        state.message = `${clickedTower.name} selected.`;
        updateButtons();
        return;
      }

      if (state.selectedBuild) {
        if (canPlace(gx, gy)) {
          addTower(state.selectedBuild, gx, gy);
        } else {
          state.selectedBuild = null;
          state.selectedEnemy = null;
          state.statsMode = "unit";
          state.message = "Build canceled.";
          updateButtons();
        }
      } else {
        state.selectedTower = null;
        state.selectedEnemy = null;
        state.statsMode = "unit";
        updateButtons();
      }
    }

    function hitRect(x, y, r) {
      return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h;
    }

    function handleBuildSelect(type) {
      if (state.gameOver || state.paused || state.victory) return;
      const t = towerTypes[type];
      if (!t || state.gold < t.cost) return;
      state.selectedBuild = state.selectedBuild === type ? null : type;
      if (state.selectedBuild) {
        state.selectedTower = null;
        state.selectedEnemy = null;
        state.statsMode = "unit";
      }
      updateButtons();
    }

    function handleUiAction(id) {
      if (id === "startWave") startWave();
      if (id === "pause") togglePause();
      if (id === "meteor") toggleMeteor();
      if (id === "upgrade") upgradeTower();
      if (id === "sell") sellSelected();
      if (id === "autoWave") toggleAutoStartWave();
      if (id === "autoUpgrade") toggleAutoUpgradeTower();
      if (id === "resume") togglePause();
      if (id === "restart") restartFromPause();
      if (id === "save") openSlotMenu("save");
      if (id === "load") openSlotMenu("load");
      if (id === "cloudSave") exportCloudSave();
      if (id === "cloudLoad") importCloudSave();
      if (id === "start") {
        state.screen = "play";
        state.message = "Set up quickly. First wave starts in 40s.";
        state.messageAt = Date.now();
        updateButtons();
      }
      if (id === "fullscreen") toggleFullscreen();
    }

    function updateHoverBuild() {
      if (state.screen !== "play") {
        state.hoverBuild = null;
        return;
      }
      const layout = getUiLayout();
      const x = mouse.screenX;
      const y = mouse.screenY;
      if (
        x < layout.buildX ||
        x > layout.buildX + layout.buildW ||
        y < layout.buildY ||
        y > layout.buildY + layout.buildH
      ) {
        state.hoverBuild = null;
        return;
      }
      const itemH = 41;
      const headerH = 28;
      const listY = layout.buildY + headerH + 6;
      if (y < listY) {
        state.hoverBuild = null;
        return;
      }
      const idx = Math.floor((y - listY) / itemH);
      const type = towerOrder[idx];
      state.hoverBuild = type || null;
      state.statsMode = "unit";
    }

    function sellSelected() {
      if (!state.selectedTower) return;
      const idx = state.towers.indexOf(state.selectedTower);
      if (idx >= 0) {
        const invested = state.selectedTower.totalInvested || state.selectedTower.cost;
        const value = Math.floor(invested * 0.8);
        state.gold += value;
        state.towers.splice(idx, 1);
        state.selectedTower = null;
        state.message = `Tower sold for ${value} gold.`;
        updateHUD();
        updateButtons();
      }
    }

    function toggleMeteor() {
      if (state.gameOver) return;
      state.statsMode = "meteor";
      const now = Date.now();
      if (now < state.meteorReadyAt) {
        const remain = Math.ceil((state.meteorReadyAt - now) / 1000);
        state.message = `Meteor cooldown: ${remain}s`;
        updateButtons();
        return;
      }
      state.aimingMeteor = !state.aimingMeteor;
      state.selectedBuild = null;
      state.selectedTower = null;
      if (!state.aimingMeteor) state.statsMode = "unit";
      if (!state.aimingMeteor) {
        state.selectionLines = [];
      }
      state.message = state.aimingMeteor ? "Click battlefield to call meteor." : "Meteor canceled.";
      updateButtons();
    }

    function togglePause() {
      if (state.gameOver) {
        resetGame();
        startLoop();
        return;
      }
      state.paused = !state.paused;
      state.message = state.paused ? "Paused." : "Resumed.";
      updateButtons();
    }

    function restartFromPause() {
      resetGame();
      state.screen = "play";
      state.message = "Set up quickly. First wave starts in 40s.";
      state.messageAt = Date.now();
      startLoop();
    }

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        if (canvas.requestFullscreen) {
          canvas.requestFullscreen({ navigationUI: "hide" }).catch(() => {});
        }
      } else {
        document.exitFullscreen().catch(() => {});
      }
    }

    canvas.addEventListener("click", (evt) => {
      const { x, y } = worldPos(evt);
      handleCanvasPress(x, y);
    });
    canvas.addEventListener("touchstart", (evt) => {
      evt.preventDefault();
      if (!evt.touches.length) return;
      const p = worldPos(evt.touches[0]);
      mouse.x = p.x;
      mouse.y = p.y;
      handleCanvasPress(p.x, p.y);
    }, { passive: false });

    canvas.addEventListener("contextmenu", (evt) => {
      evt.preventDefault();
      if (state.selectedBuild || state.aimingMeteor) {
        state.selectedBuild = null;
        state.aimingMeteor = false;
        state.statsMode = "unit";
        state.selectionLines = [];
        state.message = "Action canceled.";
        updateButtons();
      }
    });

    window.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();
      if (e.ctrlKey && key === "]") {
        state.gold += 10000;
        state.message = "Cheat gold +10000.";
        updateHUD();
        updateButtons();
        return;
      }
      if (e.ctrlKey && key === "'") {
        state.wave = 100;
        state.clearedWave = 100;
        state.waveInProgress = false;
        state.toSpawn = 0;
        state.enemies = [];
        state.nextWaveDisabled = true;
        state.victory = true;
        state.message = "Victory forced.";
        updateHUD();
        updateButtons();
        return;
      }
      if (key === "f") {
        toggleFullscreen();
        return;
      }
      if (key === "m") {
        toggleMeteor();
        return;
      }
      if (key === "p") {
        togglePause();
        return;
      }
      if (key === "g") {
        if (!state.gameOver && !state.victory) toggleAutoStartWave();
        return;
      }
      if (key === "h") {
        if (!state.gameOver && !state.victory) toggleAutoUpgradeTower();
        return;
      }
      if (state.paused) return;
      for (let i = 0; i < towerHotkeys.length; i++) {
        if (towerHotkeys[i].includes(key) && towerButtons[i]) {
          const type = towerButtons[i].dataset.build;
          const t = towerTypes[type];
          if (!t) return;
          if (state.gameOver || state.paused || state.gold < t.cost) return;
          handleBuildSelect(type);
          return;
        }
      }
      if (key === "u") {
        upgradeTower();
        return;
      }
      if (key === "v") {
        sellSelected();
        return;
      }
      if (key === "escape") {
        if (state.selectedBuild || state.aimingMeteor) {
          state.selectedBuild = null;
          state.aimingMeteor = false;
          state.statsMode = "unit";
          state.selectionLines = [];
          state.message = "Action canceled.";
          updateButtons();
        }
        return;
      }
      if (e.key === " ") {
        e.preventDefault();
        if (startWaveBtn.disabled) return;
        startWave();
      }
    });

    function drawGrid() {
      ctx.save();
      ctx.strokeStyle = "rgba(165, 201, 255, 0.07)";
      ctx.lineWidth = 1;
      for (let x = 0; x < W; x += grid) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, H);
        ctx.stroke();
      }
      for (let y = 0; y < H; y += grid) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(W, y);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawMapDecor() {
      ctx.save();
      ctx.strokeStyle = "rgba(95, 162, 255, 0.14)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(64, 260);
      ctx.bezierCurveTo(180, 220, 230, 250, 320, 205);
      ctx.moveTo(540, 410);
      ctx.bezierCurveTo(640, 360, 700, 390, 860, 350);
      ctx.stroke();
      ctx.restore();
    }

    const buildSpots = [];
    for (let y = grid; y <= H; y += grid) {
      for (let x = grid; x <= W - grid; x += grid) {
        buildSpots.push({ x, y });
      }
    }
    const buildSpotSet = new Set(buildSpots.map((s) => `${s.x},${s.y}`));
    const roadSpotSet = new Set(
      buildSpots
        .filter((spot) => tooCloseToPath(spot.x, spot.y))
        .map((spot) => `${spot.x},${spot.y}`)
    );

    function drawBuildSpots() {
      ctx.save();
      for (const spot of buildSpots) {
        const blocked = roadSpotSet.has(`${spot.x},${spot.y}`);
        const occupied = !!towerAt(spot.x, spot.y);
        if (blocked) {
          ctx.fillStyle = "rgba(255, 99, 146, 0.18)";
          ctx.strokeStyle = "rgba(255, 145, 176, 0.4)";
        } else {
          ctx.fillStyle = occupied ? "rgba(100, 190, 255, 0.06)" : "rgba(77, 255, 226, 0.11)";
          ctx.strokeStyle = occupied ? "rgba(141, 183, 244, 0.2)" : "rgba(77, 255, 226, 0.35)";
        }
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.rect(spot.x - PAD_HALF, spot.y - PAD_HALF, PAD_HALF * 2, PAD_HALF * 2);
        ctx.fill();
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawPath() {
      ctx.save();
      ctx.lineCap = "round";
      ctx.lineJoin = "round";

      const grad = ctx.createLinearGradient(0, 60, W, 390);
      grad.addColorStop(0, "rgba(240,163,89,0.95)");
      grad.addColorStop(1, "rgba(240,99,146,0.9)");

      ctx.strokeStyle = "rgba(255, 255, 255, 0.14)";
      ctx.lineWidth = 44;
      ctx.beginPath();
      ctx.moveTo(path[0].x, path[0].y);
      for (let i = 1; i < path.length; i++) ctx.lineTo(path[i].x, path[i].y);
      ctx.stroke();

      ctx.strokeStyle = grad;
      ctx.lineWidth = 28;
      ctx.beginPath();
      ctx.moveTo(path[0].x, path[0].y);
      for (let i = 1; i < path.length; i++) ctx.lineTo(path[i].x, path[i].y);
      ctx.stroke();

      ctx.strokeStyle = "rgba(255,255,255,0.3)";
      ctx.setLineDash([10, 18]);
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(path[0].x, path[0].y);
      for (let i = 1; i < path.length; i++) ctx.lineTo(path[i].x, path[i].y);
      ctx.stroke();
      ctx.restore();
    }

    function drawCore() {
      const x = W - 6;
      const y = path[path.length - 1].y;
      ctx.save();
      ctx.translate(x, y);
      ctx.fillStyle = state.wave >= 100 ? "rgba(24, 62, 44, 0.5)" : "rgba(20, 48, 65, 0.45)";
      ctx.beginPath();
      ctx.arc(0, 0, 40, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = state.wave >= 100 ? "#2f8a63" : "#2f6f8a";
      ctx.beginPath();
      ctx.arc(0, 0, 23, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = state.wave >= 100 ? "#a7f0c8" : "#8fc1d7";
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.restore();
    }

    function drawTowers() {
      for (const t of state.towers) {
        ctx.save();
        if (t === state.selectedTower) {
          ctx.strokeStyle = `${t.color}cc`;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(t.x, t.y, t.range, 0, Math.PI * 2);
          ctx.stroke();
        }

        ctx.translate(t.x, t.y);
        const nextShot = (t.shotCount || 0) + 1;
        const emberReady = t.burningCycle && nextShot % t.burningCycle === 0;
        const burstReady = t.burstCycle && nextShot % t.burstCycle === 0;
        const specialReady = emberReady || burstReady;
        if (specialReady) {
          ctx.globalAlpha = 0.22;
          ctx.fillStyle = t.color;
          ctx.beginPath();
          ctx.arc(0, 0, 18.5, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
        }
        if (t.type === "dart") {
          ctx.strokeStyle = "rgba(190, 204, 220, 0.4)";
          ctx.lineWidth = 1.2;
          for (let i = 0; i < 4; i++) {
            const a = performance.now() * 0.003 + i * (Math.PI / 2);
            ctx.beginPath();
            ctx.moveTo(Math.cos(a) * 8, Math.sin(a) * 8);
            ctx.lineTo(Math.cos(a) * 13, Math.sin(a) * 13);
            ctx.stroke();
          }
          ctx.fillStyle = "rgba(210, 221, 232, 0.22)";
          ctx.beginPath();
          ctx.moveTo(0, -13);
          ctx.lineTo(9, 0);
          ctx.lineTo(0, 13);
          ctx.lineTo(-9, 0);
          ctx.closePath();
          ctx.fill();
        }
        if (t.type === "scatter") {
          ctx.fillStyle = "rgba(255, 154, 216, 0.28)";
          for (let i = 0; i < 5; i++) {
            const a = t.angle + i * (Math.PI * 2 / 5);
            ctx.beginPath();
            ctx.ellipse(Math.cos(a) * 10, Math.sin(a) * 10, 5.2, 2.8, a, 0, Math.PI * 2);
            ctx.fill();
          }
        }
        if (t.type === "cannon") {
          ctx.fillStyle = "rgba(243, 211, 71, 0.2)";
          ctx.beginPath();
          ctx.arc(0, 0, 20, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = "rgba(255, 206, 102, 0.45)";
          ctx.lineWidth = 2;
          ctx.strokeRect(-9, -9, 18, 18);
        }
        if (t.type === "frost") {
          ctx.strokeStyle = "rgba(166, 185, 255, 0.6)";
          ctx.lineWidth = 1.4;
          for (let i = 0; i < 6; i++) {
            const a = t.angle + i * (Math.PI / 3);
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(Math.cos(a) * 14, Math.sin(a) * 14);
            ctx.stroke();
          }
          ctx.beginPath();
          ctx.arc(0, 0, 6, 0, Math.PI * 2);
          ctx.stroke();
        }
        if (t.type === "storm") {
          ctx.strokeStyle = "rgba(125, 217, 255, 0.48)";
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.arc(0, 0, 20, 0, Math.PI * 2);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(-7, -10);
          ctx.lineTo(-1, -2);
          ctx.lineTo(-6, 1);
          ctx.lineTo(2, 10);
          ctx.lineTo(0, 2);
          ctx.lineTo(6, -1);
          ctx.stroke();
        }
        if (t.type === "venom") {
          ctx.fillStyle = "rgba(135, 255, 148, 0.28)";
          ctx.beginPath();
          ctx.arc(-8, 4, 3.2, 0, Math.PI * 2);
          ctx.arc(0, -9, 2.6, 0, Math.PI * 2);
          ctx.arc(8, 1, 3, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = "rgba(92, 227, 112, 0.42)";
          ctx.lineWidth = 1.2;
          ctx.beginPath();
          ctx.moveTo(-8, 4);
          ctx.quadraticCurveTo(0, -4, 8, 1);
          ctx.stroke();
        }
        if (t.type === "rail") {
          ctx.strokeStyle = "rgba(255, 126, 126, 0.5)";
          ctx.lineWidth = 1.6;
          ctx.beginPath();
          ctx.moveTo(-13, -7);
          ctx.lineTo(12, -7);
          ctx.moveTo(-13, 7);
          ctx.lineTo(12, 7);
          ctx.moveTo(-9, 0);
          ctx.lineTo(10, 0);
          ctx.stroke();
          ctx.fillStyle = "rgba(255, 170, 170, 0.22)";
          ctx.fillRect(-10, -4, 16, 8);
        }
        if (t.type === "mortar") {
          ctx.strokeStyle = "rgba(219, 200, 165, 0.42)";
          ctx.lineWidth = 2;
